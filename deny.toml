# cargo-deny configuration for finstack workspace
# See https://embarkstudios.github.io/cargo-deny/ for full documentation

[graph]
# Enable workspace-level checks
all-features = true

[advisories]
# Check for security vulnerabilities in dependencies
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Transitive via nalgebra/simba; no safe upgrade path published by advisory.
    "RUSTSEC-2024-0436", # paste (unmaintained)
    # Transitive via polars; bincode team ceased development, no safe upgrade path.
    "RUSTSEC-2025-0141", # bincode (unmaintained)
]

[licenses]
# Allow MIT, Apache-2.0, and compatible licenses
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Deny multiple versions of the same crate (with some exceptions)
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

# Skip duplicate version check for common build dependencies
skip = []

skip-tree = []

[sources]
# Only allow crates from crates.io and git repositories
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
