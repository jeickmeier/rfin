# cargo-deny configuration for finstack workspace
# See https://embarkstudios.github.io/cargo-deny/ for full documentation

[graph]
# Enable workspace-level checks
all-features = true

[advisories]
# Check for security vulnerabilities in dependencies
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Transitive via nalgebra/simba; no safe upgrade path published by advisory.
    "RUSTSEC-2024-0436", # paste (unmaintained)
]

[licenses]
# Allow MIT, Apache-2.0, and compatible licenses
version = 2
# Keep the full permissive-license allow-list even when current deps don't use
# every entry; this avoids churn when transitive deps rotate licenses.
unused-allowed-license = "allow"
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Deny multiple versions of the same crate (with some exceptions)
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

# Skip duplicate version check for transitive dependencies we don't control.
skip = [
    # finstack-wasm pins getrandom 0.2 (with `js` feature) for its own wasm RNG path,
    # while ahash/rand_core on modern versions pull in getrandom 0.3 (`wasm_js`). Both
    # are required simultaneously until the 0.2 consumers upgrade. See
    # finstack-wasm/Cargo.toml for the explicit dual-dependency note.
    { name = "getrandom", version = "=0.2.17" },
    # `lru 0.16.4` still uses hashbrown 0.16, while indexmap/schemars moved to
    # hashbrown 0.17. Remove once `lru` upgrades.
    { name = "hashbrown", version = "=0.16.1" },
]

skip-tree = []

[sources]
# Only allow crates from crates.io and git repositories
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
