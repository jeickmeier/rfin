# Configuration for cargo-deny
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny all advisories by default
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "warn"
notice = "warn"

[licenses]
# We use a permissive license (Apache-2.0 OR MIT)
unlicensed = "deny"
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
copyleft = "deny"
allow-osi-fsf-free = "both"
default = "deny"

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# Skip certain crates that commonly have multiple versions
skip = [
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "syn" },
]

# Deny specific crates
deny = []

[sources]
# Deny crates from unknown registries
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

