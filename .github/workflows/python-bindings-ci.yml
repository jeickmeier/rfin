name: Python Bindings CI

on:
  pull_request:
    paths:
      - 'finstack-py/**'
      - 'finstack/**'
      - '.github/workflows/python-bindings-ci.yml'
  push:
    branches: [main, master]
    paths:
      - 'finstack-py/**'
      - 'finstack/**'
      - '.github/workflows/python-bindings-ci.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks (Format, Clippy, Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: finstack-py
      
      - name: Check Rust formatting
        run: cargo fmt --manifest-path finstack-py/Cargo.toml --check
      
      - name: Run Clippy
        run: cargo clippy --manifest-path finstack-py/Cargo.toml --all-targets -- -D warnings
      
      - name: Build check
        run: cargo check --manifest-path finstack-py/Cargo.toml --all-targets

  python-tests:
    name: Python Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: finstack-py
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: uv sync
      
      - name: Build extension module
        run: uv run maturin develop --release
      
      - name: Run Python tests
        run: uv run pytest finstack-py/tests/ -v --tb=short
      
      - name: Type check examples
        if: matrix.os == 'ubuntu-latest'
        run: uv run mypy finstack-py/examples/scripts/ || true
      
      - name: Lint Python code
        if: matrix.os == 'ubuntu-latest'
        run: uv run ruff check finstack-py/ || true

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: finstack-py
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: uv sync
      
      - name: Build extension module
        run: uv run maturin develop --release
      
      - name: Run benchmarks
        run: |
          uv run pytest finstack-py/tests/ --benchmark-only \
            --benchmark-json=benchmark-results.json || echo "No benchmarks found yet"
      
      - name: Store benchmark results
        if: success()
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true
          alert-threshold: '110%'

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: finstack-py
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: uv sync
      
      - name: Build extension module
        run: uv run maturin develop --release
      
      - name: Run tests with coverage
        run: |
          uv run pytest finstack-py/tests/ \
            --cov=finstack-py \
            --cov-report=xml \
            --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
          flags: python-bindings
          name: python-bindings-coverage

