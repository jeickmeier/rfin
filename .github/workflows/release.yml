name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Override the release tag. Defaults to a unique timestamped master tag."
        type: string
        required: false
      publish:
        description: "Publish artifacts"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Toolchain versions are pinned in mise.toml (single source of truth).
# CI uses jdx/mise-action@v2 to provision them, then runs raw commands.

jobs:
  # ── Python Wheels ───────────────────────────────────────────────
  build-wheels:
    name: Wheel / ${{ matrix.os }} / py${{ matrix.python }}
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish == 'true')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──
          - { os: linux-x64,   runner: ubuntu-latest,  target: x86_64,  python: "3.12", timeout: 30 }
          - { os: linux-x64,   runner: ubuntu-latest,  target: x86_64,  python: "3.13", timeout: 30 }
          - { os: linux-x64,   runner: ubuntu-latest,  target: x86_64,  python: "3.14", timeout: 30 }
          # ── Linux arm64 ──
          - { os: linux-arm64, runner: ubuntu-latest,  target: aarch64, python: "3.12", timeout: 30 }
          - { os: linux-arm64, runner: ubuntu-latest,  target: aarch64, python: "3.13", timeout: 30 }
          - { os: linux-arm64, runner: ubuntu-latest,  target: aarch64, python: "3.14", timeout: 30 }
          # ── macOS arm64 (Apple Silicon) ──
          - { os: macos-arm64, runner: macos-14,       target: aarch64, python: "3.12", timeout: 30 }
          - { os: macos-arm64, runner: macos-14,       target: aarch64, python: "3.13", timeout: 30 }
          - { os: macos-arm64, runner: macos-14,       target: aarch64, python: "3.14", timeout: 30 }
          # ── Windows x86_64 (MSVC is slower — larger timeout) ──
          - { os: windows-x64, runner: windows-latest, target: x64,     python: "3.12", timeout: 60 }
          - { os: windows-x64, runner: windows-latest, target: x64,     python: "3.13", timeout: 60 }
          - { os: windows-x64, runner: windows-latest, target: x64,     python: "3.14", timeout: 60 }

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Set up matrix Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >-
            --release
            --out dist
            --manifest-path finstack-py/Cargo.toml
            --interpreter python${{ matrix.python }}
          manylinux: "2_28"
          sccache: true

      - name: Smoke test wheel
        if: matrix.target != 'aarch64' || runner.os != 'Linux'
        run: |
          python -c "from pathlib import Path; import subprocess, sys; wheels = sorted(Path('dist').glob('finstack-*.whl')); assert len(wheels) == 1, f'Expected exactly one wheel in dist/, found: {wheels}'; subprocess.run([sys.executable, '-m', 'pip', 'install', str(wheels[0])], check=True)"
          python -c "from finstack import Money, Currency; m = Money(100.0, Currency('USD')); print(f'OK: {m}')"

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  # ── Source Distribution ─────────────────────────────────────────
  build-sdist:
    name: Source dist
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path finstack-py/Cargo.toml
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── WASM / npm Package ─────────────────────────────────────────
  build-wasm:
    name: WASM / npm
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Configure npm registry
        run: echo "registry=https://registry.npmjs.org/" > ~/.npmrc

      - name: Sync package.json version from Cargo.toml
        run: ./scripts/sync-versions

      - name: Build WASM targets
        working-directory: finstack-wasm
        run: |
          mkdir -p ../dist
          wasm-pack build --target web --release --out-dir pkg
          wasm-pack build --target nodejs --release --out-dir pkg-node
          touch pkg/.npmignore pkg-node/.npmignore
          tar -czf ../dist/finstack-wasm-web.tar.gz pkg
          tar -czf ../dist/finstack-wasm-nodejs.tar.gz pkg-node

      - name: Package npm tarball
        working-directory: finstack-wasm
        run: |
          npm pack --ignore-scripts
          mv finstack-wasm-*.tgz ../dist/

      - uses: actions/upload-artifact@v6
        with:
          name: wasm-builds
          path: |
            dist/finstack-wasm-*.tgz
            dist/finstack-wasm-web.tar.gz
            dist/finstack-wasm-nodejs.tar.gz

  # ── Publish ─────────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [build-wheels, build-sdist, build-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish == 'true')
    permissions:
      contents: write
    steps:
      - name: Resolve release metadata
        id: release
        run: |
          timestamp_tag="master-$(date -u +%Y%m%d-%H%M%S)"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "tag=${timestamp_tag}" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${timestamp_tag}" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lhR dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release.outputs.tag }}
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.release.outputs.target }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.make_latest }}
