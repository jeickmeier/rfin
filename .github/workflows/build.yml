name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rust-ci:
    name: Rust Build / Lint / Test
    runs-on: ubuntu-latest

    env:
      # Reduce parallelism to avoid OOM during linking
      CARGO_BUILD_JOBS: 1
      CARGO_PROFILE_DEV_DEBUG: 0
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          cache: true

      - name: Show toolchain
        run: rustc -Vv

      - name: Cargo fetch
        run: cargo fetch

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (core + statements)
        run: cargo clippy -p finstack-core -p finstack-statements --lib --tests --all-features -- -D warnings

      - name: Clippy (valuations)
        run: cargo clippy -p finstack-valuations --lib --tests --all-features -- -D warnings

      - name: Clippy (portfolio + scenarios + io)
        run: cargo clippy -p finstack-portfolio -p finstack-scenarios -p finstack-io --lib --tests --all-features -- -D warnings

      - name: Clean debug artifacts before tests
        run: cargo clean

      - name: Run tests (release mode for smaller binaries)
        run: cargo test --workspace --exclude finstack-py --features mc --lib --test '*'

  semver-checks:
    name: Semver Checks (finstack-core)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_PROFILE_DEV_DEBUG: 0
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"

    steps:
      - name: Checkout repository (full history for baseline)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          cache: true

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Run semver checks against master
        run: |
          git fetch origin master --tags
          cargo semver-checks check-release -p finstack-core --baseline-rev origin/master

  python-ci:
    name: Python Bindings Test
    runs-on: ubuntu-latest
    needs: rust-ci  # Run after Rust CI passes to catch Rust issues first

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_PROFILE_DEV_DEBUG: 0
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Create virtual environment
        run: uv venv

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          uv pip install maturin pytest

      - name: Build Python bindings
        run: |
          source .venv/bin/activate
          cd finstack-py
          maturin develop --release

      - name: Run Python tests
        run: |
          source .venv/bin/activate
          cd finstack-py
          pytest tests -v

  wasm-ci:
    name: WASM Bindings Test
    runs-on: ubuntu-latest
    needs: rust-ci  # Run after Rust CI passes to catch Rust issues first

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_PROFILE_DEV_DEBUG: 0
      RUSTFLAGS: "-C debuginfo=0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          targets: wasm32-unknown-unknown
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finstack-wasm/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: |
          cd finstack-wasm
          wasm-pack build --target web

      - name: Install npm dependencies
        run: |
          cd finstack-wasm
          npm ci

      - name: Run WASM tests
        run: |
          cd finstack-wasm
          npm run test

  benchmark:
    name: Benchmark Baseline
    runs-on: ubuntu-latest
    # Only run on pushes to master, not on PRs (to save CI time)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: rust-ci

    env:
      CARGO_BUILD_JOBS: 2
      RUSTFLAGS: "-C debuginfo=1"  # Keep some debug info for profiling

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          cache: true

      - name: Download previous benchmark baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}-

      - name: Run benchmarks
        run: |
          cargo bench --package finstack-core -- --noplot

      - name: Save benchmark baseline
        run: |
          cargo bench --package finstack-core -- --save-baseline main --noplot

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30

  benchmark-compare:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    # Only run on PRs to compare against baseline
    if: github.event_name == 'pull_request'
    needs: rust-ci

    env:
      CARGO_BUILD_JOBS: 2
      RUSTFLAGS: "-C debuginfo=1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          cache: true

      - name: Restore benchmark baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}-

      - name: Run benchmark comparison
        run: |
          # Run benchmarks and compare against baseline if it exists
          if [ -d "target/criterion" ]; then
            echo "Comparing against saved baseline..."
            cargo bench --package finstack-core -- --baseline main --noplot 2>&1 | tee benchmark-output.txt

            # Check for significant regressions (>15% slower)
            if grep -E "Performance has regressed" benchmark-output.txt; then
              echo "::error::Performance regression detected (>15% slower). Review benchmark results."
              exit 1
            fi
          else
            echo "No baseline found, running benchmarks without comparison..."
            cargo bench --package finstack-core -- --noplot
          fi
