name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rust-ci:
    name: Rust Build / Lint / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Show toolchain
        run: rustc -Vv

      - name: Cargo fetch
        run: cargo fetch

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude finstack-py --exclude finstack-wasm --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude finstack-py --exclude finstack-wasm --all-features --verbose

      - name: Build for SonarQube (release mode for better analysis)
        run: cargo build --workspace --exclude finstack-py --exclude finstack-wasm --release

      - name: Generate Cargo test coverage for SonarQube (optional)
        run: |
          cargo install cargo-tarpaulin || true
          cargo tarpaulin --workspace --exclude finstack-py --exclude finstack-wasm --out Xml

      - name: Upload coverage to artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cobertura.xml

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: rust-ci   # ensure CI runs first

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history improves analysis quality

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # required if self-hosted

      # Optional: fail job if Quality Gate is red
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
