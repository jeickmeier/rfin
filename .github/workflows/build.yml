name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rust-ci:
    name: Rust Build / Lint / Test
    runs-on: ubuntu-latest

    env:
      # Reduce parallelism to avoid OOM during linking
      CARGO_BUILD_JOBS: 1
      # Use GNU linker (bfd) instead of LLD - more memory efficient for large binaries
      # Also reduce codegen units to lower peak memory during compilation
      RUSTFLAGS: "-C linker=cc -C link-arg=-fuse-ld=bfd -C codegen-units=1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Show toolchain
        run: rustc -Vv

      - name: Cargo fetch
        run: cargo fetch

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude finstack-py --exclude finstack-wasm --lib --tests --all-features -- -D warnings

      - name: Clean debug artifacts before tests
        run: cargo clean

      - name: Run tests (release mode for smaller binaries)
        run: cargo test --workspace --exclude finstack-py --exclude finstack-wasm --lib --tests --all-features --release

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: rust-ci   # ensure CI runs first

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history improves analysis quality

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # Optional: fail job if Quality Gate is red
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
