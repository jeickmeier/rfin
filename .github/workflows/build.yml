name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Toolchain versions are pinned in files (single source of truth):
#   Rust:   rust-toolchain.toml
#   Python: .python-version
#   Node:   .nvmrc

jobs:
  # ============================================
  # CI Pipeline (matches make pre-commit-run / make test)
  # ============================================
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_INCREMENTAL: 1
      # Linker flags scoped to native target only — global RUSTFLAGS would
      # override finstack-wasm/.cargo/config.toml and break wasm32 builds.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"
      PYO3_PYTHON: python3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          # Disable default RUSTFLAGS="-D warnings" — global RUSTFLAGS overrides
          # per-target config in .cargo/config.toml (breaks wasm32 getrandom cfg).
          # Clippy already enforces -D warnings via the pre-commit hook.
          rustflags: ""

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Python Environment
        run: |
          make setup-python
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          uv pip install pre-commit
          make python-dev

      - name: Install WASM dependencies
        run: npm ci
        working-directory: finstack-wasm

      - name: Build WASM
        run: make wasm-build

      - name: Run Pre-commit Checks (Lint/Format)
        run: make pre-commit-run

      - name: Run All Tests
        run: make test

  # ============================================
  # Semver checks for API stability
  # ============================================
  semver-checks:
    name: Semver Checks (finstack-core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    needs: ci

    env:
      CARGO_BUILD_JOBS: 1
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"

    steps:
      - name: Checkout repository (full history for baseline)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Run semver checks against master
        run: |
          git fetch origin master --tags
          cargo semver-checks check-release -p finstack-core --baseline-rev origin/master

  # ============================================
  # Benchmark baseline (master only)
  # ============================================
  benchmark:
    name: Benchmark Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: ci

    env:
      CARGO_BUILD_JOBS: 2
      RUSTFLAGS: "-C debuginfo=1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Download previous benchmark baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}-

      - name: Run and save benchmark baseline
        run: cargo bench --package finstack-core -- --save-baseline main --noplot

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30

  # ============================================
  # Benchmark regression check (PRs only)
  # ============================================
  benchmark-compare:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    needs: ci

    env:
      CARGO_BUILD_JOBS: 2
      RUSTFLAGS: "-C debuginfo=1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Restore benchmark baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}-

      - name: Run benchmark comparison
        run: |
          # Run benchmarks and compare against baseline if it exists
          if [ -d "target/criterion" ]; then
            echo "Comparing against saved baseline..."
            cargo bench --package finstack-core -- --baseline main --noplot 2>&1 | tee benchmark-output.txt

            # Check for significant regressions (>15% slower)
            if grep -E "Performance has regressed" benchmark-output.txt; then
              echo "::error::Performance regression detected (>15% slower). Review benchmark results."
              exit 1
            fi
          else
            echo "No baseline found, running benchmarks without comparison..."
            cargo bench --package finstack-core -- --noplot
          fi
