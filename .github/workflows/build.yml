name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Toolchain versions are pinned in mise.toml (single source of truth).
# CI uses jdx/mise-action@v2 to provision them, then runs raw commands.

jobs:
  # ============================================
  # Lint — pre-commit checks (runs in parallel with tests)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install WASM dependencies
        run: npm ci --ignore-scripts
        working-directory: finstack-wasm

      - name: Set up Python environment
        run: |
          uv venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          uv sync --no-install-project

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit checks
        run: |
          uv run pre-commit run --all-files
          uv run pre-commit run --all-files --hook-stage pre-push

  # ============================================
  # Test Rust — cargo nextest
  # ============================================
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Run Rust tests
        run: cargo nextest run --workspace --exclude finstack-py --features mc --lib --test '*' --no-fail-fast

  # ============================================
  # Test Python — maturin build + pytest
  # ============================================
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"
      PYO3_PYTHON: python3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Set up Python environment
        run: |
          uv venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          uv sync --no-install-project

      - name: Build Python extension
        working-directory: finstack-py
        run: python -m maturin develop

      - name: Run Python tests
        run: uv run pytest -v

  # ============================================
  # Test WASM — wasm-pack build + test
  # ============================================
  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install WASM dependencies
        run: npm ci --ignore-scripts
        working-directory: finstack-wasm

      - name: Run WASM tests
        run: npm --prefix finstack-wasm run test

  # ============================================
  # Supply-chain security (cargo-deny): Rust advisories, licenses, bans
  # ============================================
  supply-chain:
    name: Supply-chain Security (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Run cargo-deny
        run: cargo deny check

  # ============================================
  # Supply-chain security (OSV-Scanner): cross-ecosystem CVE scan
  # Covers Cargo.lock, uv.lock, and package-lock.json against the OSV database.
  # Uses the PR-diff reusable workflow on pull_request (only reports newly
  # introduced vulns) and the full-scan reusable workflow on push to master.
  # ============================================
  osv-scan-pr:
    name: Supply-chain Security (OSV-Scanner, PR diff)
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      # Explicit lockfiles (stable; avoids walking into .worktree/ or other sibling checkouts).
      scan-args: |-
        --lockfile=Cargo.lock
        --lockfile=uv.lock
        --lockfile=finstack-wasm/package-lock.json

  osv-scan-full:
    name: Supply-chain Security (OSV-Scanner, full)
    if: github.event_name == 'push'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --lockfile=Cargo.lock
        --lockfile=uv.lock
        --lockfile=finstack-wasm/package-lock.json

  # ============================================
  # Semver checks for API stability
  # ============================================
  semver-checks:
    name: Semver Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    needs: [lint, test-rust, test-python, test-wasm]

    env:
      CARGO_BUILD_JOBS: 2
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"

    steps:
      - name: Checkout repository (full history for baseline)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      # Semver-check the stable public-API crates.
      - name: Run semver checks against master
        run: |
          git fetch origin master --tags
          cargo semver-checks check-release \
            -p finstack-core \
            -p finstack-valuations \
            -p finstack-portfolio \
            --baseline-rev origin/master
