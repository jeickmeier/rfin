name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Toolchain versions are pinned in files (single source of truth):
#   Rust:   rust-toolchain.toml
#   Python: .python-version
#   Node:   .nvmrc

jobs:
  # ============================================
  # Lint — pre-commit checks (runs in parallel with tests)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          rustflags: ""

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Python Environment
        run: |
          make setup-python
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          uv sync --no-install-project

      - name: Install WASM dependencies
        run: npm ci --ignore-scripts
        working-directory: finstack-wasm

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run Pre-commit Checks (Lint/Format)
        run: make pre-commit-run

  # ============================================
  # Test Rust — cargo nextest
  # ============================================
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          rustflags: ""

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run Rust tests
        run: make test-rust

  # ============================================
  # Test Python — maturin build + pytest
  # ============================================
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"
      PYO3_PYTHON: python3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          rustflags: ""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python Environment
        run: |
          make setup-python
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          uv sync --no-install-project

      - name: Build Python Extension
        run: cd finstack-py && python -m maturin develop

      - name: Run Python tests
        run: make test-python

  # ============================================
  # Test WASM — wasm-pack build + test
  # ============================================
  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_BUILD_JOBS: 2
      CARGO_INCREMENTAL: 1
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          rustflags: ""

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Install WASM dependencies
        run: npm ci --ignore-scripts
        working-directory: finstack-wasm

      - name: Run WASM tests
        run: make test-wasm

  # ============================================
  # Supply-chain security (cargo-deny)
  # ============================================
  supply-chain:
    name: Supply-chain Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny check

  # ============================================
  # Semver checks for API stability
  # ============================================
  semver-checks:
    name: Semver Checks (finstack-core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    needs: [lint, test-rust, test-python, test-wasm]

    env:
      CARGO_BUILD_JOBS: 2
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"

    steps:
      - name: Checkout repository (full history for baseline)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Run semver checks against master
        run: |
          git fetch origin master --tags
          cargo semver-checks check-release -p finstack-core --baseline-rev origin/master
