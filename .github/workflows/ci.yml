name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace --all-features --jobs 1
      - name: Test doc examples
        run: cargo test --workspace --doc --all-features --jobs 1

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 1
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --jobs 1
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
      - name: Check minimum coverage threshold (50%)
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --all-features --summary-only --jobs 1 | grep 'TOTAL' | awk '{print $10}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below minimum threshold of 50%"
            exit 1
          fi

  python:
    name: Python Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        run: pip install uv
      - name: Create virtual environment
        run: uv venv .venv-ci-test
      - name: Build and test Python bindings
        run: |
          . .venv-ci-test/bin/activate
          uv pip install maturin pytest
          cd finstack-py
          maturin build --release
          cd ..
          WHEEL=$(ls target/wheels/*.whl 2>/dev/null | head -n1)
          if [ -z "$WHEEL" ]; then
            echo "❌ No wheel found in target/wheels/"
            exit 1
          fi
          echo "Installing wheel: $WHEEL"
          uv pip install "$WHEEL" --force-reinstall
          python3 -c "import finstack; print('finstack imported successfully'); print('Available modules:', ', '.join(finstack.__all__))"
          cd finstack-py
          pytest tests/ -v
      - name: Cleanup
        if: always()
        run: rm -rf .venv-ci-test

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        working-directory: finstack-wasm
        run: wasm-pack build --target web --release
      - name: Verify WASM artifacts
        working-directory: finstack-wasm
        run: |
          ls -la pkg/
          test -f pkg/finstack_wasm_bg.wasm
          test -f pkg/finstack_wasm.js
          test -f pkg/finstack_wasm.d.ts
          test -f pkg/package.json
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run WASM tests
        working-directory: finstack-wasm
        run: wasm-pack test --node

  examples:
    name: Examples Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
      - name: Build all examples
        run: cargo build --workspace --examples
      - name: Verify examples directory
        run: |
          test -d finstack/examples || { echo "❌ Examples directory not found"; exit 1; }
          find finstack/examples -name "*.rs" -type f

  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --workspace --all-features
