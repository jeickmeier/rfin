name: WASM CI

on:
  pull_request:
    paths:
      - 'finstack-wasm/**'
      - 'finstack/core/**'
      - 'finstack/statements/**'
      - 'finstack/valuations/**'
      - 'finstack/scenarios/**'
      - 'finstack/portfolio/**'
      - '.github/workflows/wasm-ci.yml'
  push:
    branches: [master, main]
    paths:
      - 'finstack-wasm/**'
      - 'finstack/core/**'
      - 'finstack/statements/**'
      - 'finstack/valuations/**'
      - 'finstack/scenarios/**'
      - 'finstack/portfolio/**'
      - '.github/workflows/wasm-ci.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  wasm-build-test:
    name: WASM Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: finstack-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (for size optimization)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Format check
        run: cargo fmt --all -- --check
        working-directory: finstack-wasm

      - name: Clippy (WASM target)
        run: cargo clippy --target wasm32-unknown-unknown --all-features -- -D warnings
        working-directory: finstack-wasm

      - name: Build (web target)
        run: wasm-pack build --target web --out-dir pkg
        working-directory: finstack-wasm

      - name: Build (nodejs target)
        run: wasm-pack build --target nodejs --out-dir pkg-node
        working-directory: finstack-wasm

      - name: Run tests (headless Chrome)
        run: wasm-pack test --chrome --headless
        working-directory: finstack-wasm

      - name: Bundle size check
        run: |
          SIZE=$(stat -c%s pkg/finstack_wasm_bg.wasm)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Bundle size: $SIZE bytes ($SIZE_MB MB)"
          echo "WASM_SIZE=$SIZE" >> $GITHUB_ENV
          
          # Fail if bundle exceeds 5MB
          if [ $SIZE -gt 5242880 ]; then
            echo "::error::Bundle size ($SIZE_MB MB) exceeds 5MB limit"
            exit 1
          fi
        working-directory: finstack-wasm

      - name: Optimize with wasm-opt
        run: |
          cp pkg/finstack_wasm_bg.wasm pkg/finstack_wasm_bg.wasm.orig
          wasm-opt -Oz -o pkg/finstack_wasm_bg.wasm pkg/finstack_wasm_bg.wasm.orig
          ORIG_SIZE=$(stat -c%s pkg/finstack_wasm_bg.wasm.orig)
          OPT_SIZE=$(stat -c%s pkg/finstack_wasm_bg.wasm)
          SAVINGS=$(echo "scale=2; ($ORIG_SIZE - $OPT_SIZE) / $ORIG_SIZE * 100" | bc)
          echo "Original size: $ORIG_SIZE bytes"
          echo "Optimized size: $OPT_SIZE bytes"
          echo "Savings: $SAVINGS%"
        working-directory: finstack-wasm

      - name: Security audit
        run: cargo audit
        working-directory: finstack-wasm
        continue-on-error: true

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-packages
          path: |
            finstack-wasm/pkg/
            finstack-wasm/pkg-node/
          retention-days: 7

  wasm-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    needs: wasm-build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: finstack-wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finstack-wasm/examples/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        run: wasm-pack build --target web --out-dir pkg
        working-directory: finstack-wasm

      - name: Install example dependencies
        run: npm ci
        working-directory: finstack-wasm/examples

      - name: Build examples
        run: npm run build
        working-directory: finstack-wasm/examples

      - name: Upload example build
        uses: actions/upload-artifact@v4
        with:
          name: examples-dist
          path: finstack-wasm/examples/dist/
          retention-days: 7

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        working-directory: finstack-wasm

      - name: Check for outdated dependencies
        run: |
          cargo install cargo-outdated --locked
          cargo outdated --workspace --root-deps-only
        working-directory: finstack-wasm
        continue-on-error: true

