name: Code Formatting

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      check_only:
        description: 'Only check formatting without fixing'
        required: false
        default: false
        type: boolean
      rust_only:
        description: 'Format only Rust code'
        required: false
        default: false
        type: boolean
      python_only:
        description: 'Format only Python code'
        required: false
        default: false
        type: boolean
      wasm_only:
        description: 'Format only WASM/TS code'
        required: false
        default: false
        type: boolean
      ui_only:
        description: 'Format only UI/TS code'
        required: false
        default: false
        type: boolean
      create_pr:
        description: 'Create PR with formatting fixes'
        required: false
        default: false
        type: boolean

jobs:
  # Main formatting job
  format-code:
    name: Format and Lint Code
    runs-on: ubuntu-latest

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_INCREMENTAL: 1
      PYO3_PYTHON: python3
      CHECK_ONLY: ${{ github.event.inputs.check_only || 'false' }}

    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            finstack-wasm/package-lock.json
            finstack-ui/package-lock.json

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/uv.lock', 'pyproject.toml') }}

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            finstack-wasm/node_modules
            finstack-ui/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('finstack-wasm/package-lock.json', 'finstack-ui/package-lock.json') }}

      - name: Install dependencies
        run: |
          # Install Python dependencies
          uv sync --dev

          # Install Node.js dependencies
          cd finstack-wasm && npm ci && cd ..
          cd finstack-ui && npm ci && cd ..

      - name: Format Rust code
        if: github.event.inputs.python_only != 'true' && github.event.inputs.wasm_only != 'true' && github.event.inputs.ui_only != 'true'
        run: |
          if [[ "$CHECK_ONLY" == "true" ]]; then
            echo "🔍 Checking Rust formatting..."
            cargo fmt --all -- --check
            echo "🔍 Running Rust linter..."
            cargo clippy --workspace --all-targets --all-features -- -D warnings
          else
            echo "🔧 Formatting Rust code..."
            cargo fmt --all
            echo "🔧 Running Rust linter with auto-fixes..."
            cargo clippy --workspace --all-targets --all-features --fix --allow-dirty -- -D warnings
          fi

      - name: Format Python code
        if: github.event.inputs.rust_only != 'true' && github.event.inputs.wasm_only != 'true' && github.event.inputs.ui_only != 'true'
        run: |
          if [[ "$CHECK_ONLY" == "true" ]]; then
            echo "🔍 Checking Python formatting..."
            uv run ruff format . --check
            echo "🔍 Running Python linter..."
            uv run ruff check . --no-fix
          else
            echo "🔧 Formatting Python code..."
            uv run ruff format .
            echo "🔧 Running Python linter with auto-fixes..."
            uv run ruff check . --fix --unsafe-fixes
          fi

      - name: Format WASM/TypeScript code
        if: github.event.inputs.rust_only != 'true' && github.event.inputs.python_only != 'true' && github.event.inputs.ui_only != 'true'
        run: |
          cd finstack-wasm
          if [[ "$CHECK_ONLY" == "true" ]]; then
            echo "🔍 Checking WASM/TS formatting..."
            npm run format -- --check .
            echo "🔍 Running WASM/TS linter..."
            npm run lint
          else
            echo "🔧 Formatting WASM/TS code..."
            npm run format:fix .
            echo "🔧 Running WASM/TS linter with auto-fixes..."
            npm run lint:fix || true  # Allow lint fixes to fail gracefully
          fi
          cd ..

      - name: Format UI/TypeScript code
        if: github.event.inputs.rust_only != 'true' && github.event.inputs.python_only != 'true' && github.event.inputs.wasm_only != 'true'
        run: |
          cd finstack-ui
          if [[ "$CHECK_ONLY" == "true" ]]; then
            echo "🔍 Checking UI/TS formatting..."
            npm run format -- --check "**/*.{js,jsx,ts,tsx,json,md,css}"
            echo "🔍 Running UI/TS linter..."
            npm run lint
          else
            echo "🔧 Formatting UI/TS code..."
            npm run format:fix "**/*.{js,jsx,ts,tsx,json,md,css}"
            echo "🔧 Running UI/TS linter with auto-fixes..."
            npm run lint:fix || true  # Allow lint fixes to fail gracefully
          fi
          cd ..

      - name: Format Markdown files
        if: github.event.inputs.rust_only != 'true' && github.event.inputs.python_only != 'true' && github.event.inputs.wasm_only != 'true' && github.event.inputs.ui_only != 'true'
        run: |
          if [[ "$CHECK_ONLY" == "true" ]]; then
            echo "🔍 Checking Markdown formatting..."
            npx markdownlint-cli2 "**/*.md" "#node_modules" "#finstack-wasm/pkg" "#.git"
          else
            echo "🔧 Formatting Markdown files..."
            npx markdownlint-cli2 "**/*.md" "#node_modules" "#finstack-wasm/pkg" "#.git" --fix
          fi

      - name: Check for changes
        id: changes
        if: env.CHECK_ONLY != 'true'
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected after formatting:"
            git status --porcelain
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No formatting changes needed"
          fi

      - name: Commit formatting fixes
        if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "auto: apply code formatting fixes"
          git push

      - name: Create PR with formatting fixes
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.create_pr == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          BRANCH_NAME="format-fix-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "auto: apply code formatting fixes"
          git push origin $BRANCH_NAME

          gh pr create \
            --title "Code formatting fixes" \
            --body "This PR contains automatic code formatting fixes applied by the code-formatting workflow.

          Changes made:
          - Rust code formatting (rustfmt)
          - Rust linting fixes (clippy)
          - Python code formatting (ruff format)
          - Python linting fixes (ruff check)
          - TypeScript/JavaScript formatting (prettier)
          - TypeScript/JavaScript linting fixes (eslint)
          - Markdown formatting fixes

          Please review the changes before merging." \
            --base ${{ github.ref_name }} \
            --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload formatting diff
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: formatting-changes
          path: formatting.diff
          retention-days: 7

  # Check formatting only (fails fast)
  check-formatting:
    name: Check Code Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            finstack-wasm/package-lock.json
            finstack-ui/package-lock.json

      - name: Install dependencies
        run: |
          uv sync --dev
          cd finstack-wasm && npm ci && cd ..
          cd finstack-ui && npm ci && cd ..

      - name: Check all formatting
        run: |
          echo "🔍 Checking code formatting..."

          # Check Rust formatting
          echo "Checking Rust..."
          cargo fmt --all -- --check || { echo "❌ Rust code needs formatting"; exit 1; }

          # Check Python formatting
          echo "Checking Python..."
          uv run ruff format . --check || { echo "❌ Python code needs formatting"; exit 1; }

          # Check WASM/TS formatting
          echo "Checking WASM/TypeScript..."
          cd finstack-wasm
          npm run format -- --check . || { echo "❌ WASM/TS code needs formatting"; exit 1; }
          cd ..

          # Check UI/TS formatting
          echo "Checking UI/TypeScript..."
          cd finstack-ui
          npm run format -- --check "**/*.{js,jsx,ts,tsx,json,md,css}" || { echo "❌ UI/TS code needs formatting"; exit 1; }
          cd ..

          echo "✅ All code is properly formatted!"

  # Comment on PR with formatting status
  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [format-code, check-formatting]

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const formatResult = "${{ needs['format-code'].result }}";
            const checkResult = "${{ needs['check-formatting'].result }}";
            const hasChanges = "${{ needs['format-code'].outputs.has_changes }}" === 'true';

            let status = '✅';
            let message = 'All code formatting checks passed!';

            if (checkResult === 'failure') {
              status = '❌';
              message = 'Code formatting checks failed. Please run the formatter locally or push fixes.';
            } else if (hasChanges) {
              status = '⚠️';
              message = 'Code formatting fixes were applied. Please review the changes.';
            }

            const comment = `## 🎨 Code Formatting Status ${status}

            ${message}

            ### Formatting Tools Used:
            - **Rust**: rustfmt, clippy
            - **Python**: ruff format, ruff check
            - **TypeScript/JavaScript**: prettier, eslint
            - **Markdown**: markdownlint-cli2

            ### Local Setup:
            To format code locally, run:
            \`\`\`bash
            # Install pre-commit hooks
            pre-commit install

            # Run formatting manually
            pre-commit run --all-files
            \`\`\`

            ---
            *This comment was generated by the code-formatting workflow.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
