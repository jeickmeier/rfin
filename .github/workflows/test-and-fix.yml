name: Tests and Auto-Fix

on:
  push:
    branches: [ master, main ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      rust_only:
        description: 'Run only Rust tests'
        required: false
        default: false
        type: boolean
      python_only:
        description: 'Run only Python tests'
        required: false
        default: false
        type: boolean
      wasm_only:
        description: 'Run only WASM tests'
        required: false
        default: false
        type: boolean
      ui_only:
        description: 'Run only UI tests'
        required: false
        default: false
        type: boolean
      coverage:
        description: 'Generate coverage reports'
        required: false
        default: false
        type: boolean
      skip_slow:
        description: 'Skip slow tests'
        required: false
        default: false
        type: boolean
      create_pr:
        description: 'Create PR with auto-fixes (if needed)'
        required: false
        default: false
        type: boolean

jobs:
  # Main test and fix job
  test-and-fix:
    name: Tests and Auto-Fix
    runs-on: ubuntu-latest

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_INCREMENTAL: 1
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols -C linker=cc -C link-arg=-fuse-ld=bfd"
      PYO3_PYTHON: python3
      SKIP_SLOW: ${{ github.event.inputs.skip_slow || 'false' }}
      COVERAGE: ${{ github.event.inputs.coverage || 'false' }}
      VERBOSE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for potential PR creation
          fetch-depth: 0
          # Allow push to create PR branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          cache: true

      - name: Install Rust tools
        run: |
          cargo install cargo-nextest --locked
          cargo install cargo-llvm-cov --locked

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            finstack-wasm/package-lock.json
            finstack-ui/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit install

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/uv.lock', 'pyproject.toml') }}

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            finstack-wasm/node_modules
            finstack-ui/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('finstack-wasm/package-lock.json', 'finstack-ui/package-lock.json') }}

      - name: Build arguments
        id: args
        run: |
          ARGS=""
          if [[ "${{ github.event.inputs.rust_only }}" == "true" ]]; then
            ARGS="$ARGS --rust-only"
          fi
          if [[ "${{ github.event.inputs.python_only }}" == "true" ]]; then
            ARGS="$ARGS --python-only"
          fi
          if [[ "${{ github.event.inputs.wasm_only }}" == "true" ]]; then
            ARGS="$ARGS --wasm-only"
          fi
          if [[ "${{ github.event.inputs.ui_only }}" == "true" ]]; then
            ARGS="$ARGS --ui-only"
          fi
          if [[ "${{ github.event.inputs.coverage }}" == "true" ]]; then
            ARGS="$ARGS --coverage"
          fi
          if [[ "${{ github.event.inputs.skip_slow }}" == "true" ]]; then
            ARGS="$ARGS --skip-slow"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run tests and auto-fixes
        run: |
          ./run-tests-and-fix ${{ steps.args.outputs.args }}
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git status
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with fixes
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.create_pr == 'true'
        run: |
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Create and push branch
          BRANCH_NAME="auto-fix-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "auto: apply automated fixes from test workflow"
          git push origin $BRANCH_NAME

          # Create PR
          gh pr create \
            --title "Auto-fixes from test workflow" \
            --body "This PR contains automatic fixes applied by the test-and-fix workflow.

          Changes made:
          - Automated formatting fixes
          - Linting fixes
          - Other auto-corrected issues

          Please review the changes before merging." \
            --base ${{ github.ref_name }} \
            --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage reports
        if: env.COVERAGE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/llvm-cov/html/
            finstack-py/htmlcov/
            finstack-ui/coverage/
          retention-days: 7

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: .test-fix.log
          retention-days: 7

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read log file
            let logContent = "";
            try {
              logContent = fs.readFileSync('.test-fix.log', 'utf8');
            } catch (e) {
              logContent = "Log file not found";
            }

            // Extract summary
            const lines = logContent.split('\n');
            const summary = lines.slice(-20).join('\n');

            // Check if tests passed
            const hasChanges = '${{ steps.changes.outputs.has_changes }}' === 'true';

            const comment = `## 🤖 Test and Auto-Fix Results

            ${hasChanges ? '⚠️ Some issues were automatically fixed. Please review the changes.' : '✅ All checks passed without any fixes needed.'}

            <details>
            <summary>📋 Test Log Summary</summary>

            \`\`\`
            ${summary}
            \`\`\`

            </details>

            ---

            *This comment was generated by the test-and-fix workflow.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Quick check job (runs on every push without fixes)
  quick-check:
    name: Quick Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    env:
      CARGO_BUILD_JOBS: 1
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_INCREMENTAL: 1
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 8

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          cache: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Quick format check
        run: cargo fmt --all -- --check

      - name: Quick clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Quick tests (no slow)
        run: cargo nextest run --workspace --exclude finstack-py --features mc,test-utils --lib --test '*' --no-fail-fast
