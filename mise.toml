# Finstack developer environment & tasks
# ---------------------------------------
# Single source of truth for toolchain versions and developer tasks.
# Run `mise install` once to provision all tools, then `mise run <task>`
# (or `mise r <task>`) to drive the workflow. `mise tasks` lists everything.
#
# Naming convention: <domain>-<action>  (domains: rust, python, wasm, all)
#   - `rust-*`, `python-*`, `wasm-*`  — single-language tasks
#   - `all-*`                          — aggregates that fan out to all domains
#   - `*-fmt`                          — reformats AND applies auto-fixes (mutating)
#   - `*-lint`                         — check-only (CI-safe, no mutation)

[tools]
rust = { version = "1.91", components = "clippy,rustfmt", targets = "wasm32-unknown-unknown", profile = "minimal" }
python = "3.12"
node = "24"
uv = "latest"
"aqua:rustwasm/wasm-pack" = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-llvm-cov" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:maturin" = "latest"

[env]
CARGO_INCREMENTAL = "{{ env.CARGO_INCREMENTAL | default(value='1') }}"

# ─────────────────────────────────────────────────────────────────
# Aggregate (all-*) — fan out across rust + python + wasm
# ─────────────────────────────────────────────────────────────────

[tasks.all]
description = "Build, test, and lint everything (rust + python + wasm)"
depends = ["all-build", "all-test", "all-lint"]

[tasks.all-build]
description = "Build Rust workspace, Python bindings, and WASM package"
depends = ["rust-build", "python-build", "wasm-build"]

[tasks.all-test]
description = "Run all tests (Rust + Python + WASM)"
depends = ["rust-test", "python-test", "wasm-test"]

[tasks.all-fmt]
description = "Format + auto-fix Rust, Python, and WASM code (mutating)"
depends = ["rust-fmt", "python-fmt", "wasm-fmt"]

[tasks.all-lint]
description = "Lint Rust + Python + WASM (check-only, non-mutating)"
depends = ["rust-lint", "python-lint", "wasm-lint"]

[tasks.all-audit]
description = "Run security audits on Rust + Python"
depends = ["rust-audit", "python-audit"]

[tasks.all-update]
description = "Update Rust + Python dependencies"
depends = ["rust-update", "python-update"]

[tasks.all-clean]
description = "Remove build artifacts and virtualenvs"
run = [
  "cargo clean",
  '''python3 scripts/clean_workspace.py''',
]

[tasks.all-ci]
description = "Run CI-equivalent checks locally (wasm-build + pre-commit + all-test)"
depends = ["wasm-build", "pre-commit-run", "all-test"]

# ─────────────────────────────────────────────────────────────────
# Rust
# ─────────────────────────────────────────────────────────────────

[tasks.rust-build]
description = "Build all core Rust crates (excludes finstack-py, finstack-wasm)"
run = "cargo build --workspace --exclude finstack-py --exclude finstack-wasm"

[tasks.rust-build-prod]
description = "Release build without debug info"
env = { RUSTFLAGS = "-C debuginfo=0" }
run = "cargo build --workspace --exclude finstack-py --exclude finstack-wasm --release"

[tasks.rust-test]
description = "Run Rust tests via cargo-nextest"
run = "cargo nextest run --workspace --exclude finstack-py --features mc --lib --test '*' --no-fail-fast"

[tasks.rust-test-slow]
description = "Run Rust tests including ignored/slow ones"
run = "cargo nextest run --workspace --exclude finstack-py --features mc --lib --test '*' --run-ignored all --no-fail-fast"

[tasks.rust-test-cov]
description = "Run Rust tests with HTML coverage report"
run = """
mkdir -p target/llvm-cov/profraw
LLVM_PROFILE_FILE="$PWD/target/llvm-cov/profraw/default_%m_%p.profraw" \
  cargo llvm-cov --workspace --exclude finstack-py --exclude finstack-wasm --features mc \
    --ignore-filename-regex '(tests?/|target/|\\.cargo/|.*finstack-py/.*|.*finstack-wasm/.*)' \
    --html --output-dir target/llvm-cov
echo "HTML report: target/llvm-cov/html/index.html"
"""

[tasks.rust-fmt]
description = "Format + auto-fix Rust code (cargo fmt + clippy --fix, mutating)"
run = [
  "cargo fmt --all",
  "cargo clippy --all-targets --features mc --fix --allow-dirty -- -D warnings",
]

[tasks.rust-lint]
description = "Lint Rust (fmt --check + clippy, check-only)"
run = ["cargo fmt --all -- --check", "cargo clippy --all-targets --features mc"]

[tasks.rust-audit]
description = "Audit Rust dependencies via cargo-deny"
run = "cargo deny check"

[tasks.rust-update]
description = "Update Rust dependencies"
run = "cargo update"

# ─────────────────────────────────────────────────────────────────
# Python
# ─────────────────────────────────────────────────────────────────

[tasks.python-setup]
description = "Initialize Python virtual environment"
run = "uv venv"

[tasks.python-sync]
description = "Sync Python dev dependencies (uv sync --group dev)"
run = "uv sync --group dev"

[tasks.python-build]
description = "Build Python bindings in-place (pass --release for optimized build)"
usage = '''
flag "--release" help="Build with release profile (slower compile, faster runtime)"
'''
run = 'uv run --project finstack-py maturin develop --manifest-path finstack-py/Cargo.toml{% if flag(name="release") == "true" %} --release{% endif %}'

[tasks.python-test]
description = "Run Python tests"
run = "uv run pytest -v"

[tasks.python-test-cov]
description = "Run Python tests with HTML coverage report"
run = "uv run pytest -v --cov=finstack-py/finstack --cov-report=term-missing --cov-report=html:target/python-cov"

[tasks.python-fmt]
description = "Format + auto-fix Python code (ruff format + ruff check --fix, mutating)"
run = [
  "uv run --no-sync ruff format .",
  "uv run --no-sync ruff check . --fix --unsafe-fixes",
]

[tasks.python-lint]
description = "Lint Python (ruff format --check + ruff check, check-only)"
run = [
  "uv run --no-sync ruff format . --check",
  "uv run --no-sync ruff check . --no-fix",
]

[tasks.python-typecheck]
description = "Type-check Python bindings with ty + pyright"
run = [
  "uv run --no-sync ty check finstack-py/finstack",
  "uv run --no-sync pyright",
]

[tasks.python-verifytypes]
description = "Verify Python type completeness"
run = "uv run --no-sync pyright --verifytypes finstack --ignoreexternal"

[tasks.python-audit]
description = "Audit Python dependencies via bandit"
run = "uv run bandit -r finstack-py -c pyproject.toml"

[tasks.python-update]
description = "Update Python dependencies"
run = "uv lock --upgrade"

[tasks.python-docs]
description = "Build Python API docs (mkdocs)"
run = "uv run mkdocs build -f mkdocs.yml -d site/api/python"

[tasks.python-docs-serve]
description = "Serve Python API docs with live reload"
run = "uv run mkdocs serve -f mkdocs.yml"

[tasks.python-examples]
description = "Run Python example notebooks"
run = "uv run python finstack-py/examples/notebooks/run_all_notebooks.py"

# ─────────────────────────────────────────────────────────────────
# WASM
# ─────────────────────────────────────────────────────────────────

[tasks.wasm-build]
description = "Build WASM package (web target)"
run = "wasm-pack build finstack-wasm --target web"

[tasks.wasm-test]
description = "Run WASM package tests"
run = "npm --prefix finstack-wasm run test"

[tasks.wasm-test-cov]
description = "Run WASM binding tests with HTML coverage report"
run = """
mkdir -p target/wasm-cov/profraw
LLVM_PROFILE_FILE="$PWD/target/wasm-cov/profraw/default_%m_%p.profraw" \
  cargo llvm-cov -p finstack-wasm --lib \
    --ignore-filename-regex '(tests?/|target/|\\.cargo/)' \
    --html --output-dir target/wasm-cov
echo "HTML report: target/wasm-cov/html/index.html"
"""

[tasks.wasm-fmt]
description = "Format + auto-fix WASM/TS code (prettier + eslint --fix, mutating)"
run = [
  "npm --prefix finstack-wasm run format:fix",
  "npm --prefix finstack-wasm run lint:fix",
]

[tasks.wasm-lint]
description = "Lint WASM/TS code (prettier --check + eslint, check-only)"
run = [
  "npm --prefix finstack-wasm run format",
  "npm --prefix finstack-wasm run lint",
]

[tasks.wasm-pkg]
description = "Build WASM package (web + node targets)"
run = [
  "wasm-pack build finstack-wasm --target web --release --out-dir pkg",
  "wasm-pack build finstack-wasm --target nodejs --release --out-dir pkg-node",
  '''python -c "from pathlib import Path; [Path(p).touch() for p in ('finstack-wasm/pkg/.npmignore', 'finstack-wasm/pkg-node/.npmignore')]"''',
]

[tasks.wasm-gen-bindings]
description = "Export TypeScript types from Rust"
run = "cargo run -p finstack-wasm --bin ts_export --features ts_export"

# ─────────────────────────────────────────────────────────────────
# Packaging (wheels)
# ─────────────────────────────────────────────────────────────────

[tasks.wheel-local]
description = "Build wheel for current platform + Python"
run = "uv run maturin build --release --manifest-path finstack-py/Cargo.toml -o target/wheels"

[tasks.wheel-all]
description = "Build wheels for all locally-available Python versions"
run = "uv run maturin build --release --manifest-path finstack-py/Cargo.toml --find-interpreter -o target/wheels"

# ─────────────────────────────────────────────────────────────────
# Schemas
# ─────────────────────────────────────────────────────────────────

[tasks.rust-check-schemas]
description = "Verify JSON schemas match Rust types"
run = [
  "uv run python scripts/sync_instrument_schema_overrides.py",
  "cargo nextest run -p finstack-valuations schema_parity --no-fail-fast",
  "cargo test -p finstack-valuations test_instrument_schema_enum_parity --no-fail-fast",
  "cargo test -p finstack-valuations --test schema_audit --no-fail-fast",
]

[tasks.rust-gen-schemas]
description = "Regenerate typed JSON schemas from Rust types"
run = [
  "uv run python scripts/sync_instrument_schema_overrides.py",
  "cargo run -p finstack-valuations --bin gen_schemas",
]

[tasks.rust-sync-schemas]
description = "Apply local schema override sync"
run = "uv run python scripts/sync_instrument_schema_overrides.py"

# ─────────────────────────────────────────────────────────────────
# Pre-commit
# ─────────────────────────────────────────────────────────────────

[tasks.pre-commit-install]
description = "Install pre-commit hooks (commit + pre-push)"
run = [
  "uv run pre-commit install",
  "uv run pre-commit install --hook-type pre-push",
]

[tasks.pre-commit-run]
description = "Run all pre-commit hooks on the full tree"
run = [
  "uv run pre-commit run --all-files",
  "uv run pre-commit run --all-files --hook-stage pre-push",
]

[tasks.pre-commit-update]
description = "Autoupdate pre-commit hook versions"
run = "uv run pre-commit autoupdate"

# ─────────────────────────────────────────────────────────────────
# Benchmarks (Rust-only)
# ─────────────────────────────────────────────────────────────────

[tasks.rust-bench]
description = "Run Rust benchmarks (bench profile)"
run = "cargo bench --profile bench"

[tasks.rust-bench-baseline]
description = "Save benchmark baseline as 'main'"
run = "cargo bench -- --save-baseline main"

[tasks.rust-bench-compare]
description = "Compare current benchmarks against 'main' baseline"
run = "cargo bench -- --baseline main"
