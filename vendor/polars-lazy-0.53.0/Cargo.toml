[dependencies.arrow]
version = "0.53.0"
features = [
    "compute_aggregate",
    "compute_arithmetics",
    "compute_bitwise",
    "compute_boolean",
    "compute_boolean_kleene",
    "compute_comparison",
]
default-features = false
package = "polars-arrow"

[dependencies.bitflags]
version = "2"

[dependencies.chrono]
version = "<=0.4.41"
features = ["std"]
default-features = false

[dependencies.either]
version = "1.14"

[dependencies.futures]
version = "0.3.25"
optional = true

[dependencies.memchr]
version = "2.6"

[dependencies.polars-buffer]
version = "0.53.0"
default-features = false

[dependencies.polars-compute]
version = "0.53.0"
default-features = false

[dependencies.polars-core]
version = "0.53.0"
features = [
    "lazy",
    "zip_with",
    "random",
]
default-features = false

[dependencies.polars-expr]
version = "0.53.0"
default-features = false

[dependencies.polars-io]
version = "0.53.0"
features = ["lazy"]
default-features = false

[dependencies.polars-json]
version = "0.53.0"
optional = true
default-features = false

[dependencies.polars-mem-engine]
version = "0.53.0"
default-features = false

[dependencies.polars-ops]
version = "0.53.0"
features = ["chunked_ids"]
default-features = false

[dependencies.polars-plan]
version = "0.53.0"
default-features = false

[dependencies.polars-stream]
version = "0.53.0"
optional = true
default-features = false

[dependencies.polars-time]
version = "0.53.0"
optional = true
default-features = false

[dependencies.polars-utils]
version = "0.53.0"
default-features = false

[dependencies.pyo3]
version = "0.28"
optional = true

[dependencies.rayon]
version = "1.9"

[dependencies.tokio]
version = "1.44"
optional = true
default-features = false

[dev-dependencies.bytes]
version = "1.11"

[dev-dependencies.serde_json]
version = "1"

[build-dependencies.version_check]
version = "0.9.4"

[lints.clippy]
collapsible_if = "allow"
