[book]
authors = ["Jon Eickmeier"]
language = "en"
src = "src"
title = "Finstack Documentation"
description = "Deterministic Financial Computation Library - A comprehensive guide to using Finstack for financial modeling, valuations, and analysis"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/yourusername/finstack"
edit-url-template = "https://github.com/yourusername/finstack/edit/master/book/src/{path}"
additional-css = []
additional-js = []

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 1

[output.html.playground]
runnable = true
