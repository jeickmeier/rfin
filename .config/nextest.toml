[profile.default]
# Skip wasm-bindgen tests that require the wasm32 runner. These tests are executed
# via wasm-pack in their own pipeline; nextest cannot execute them because they
# emit .wasm artifacts instead of native binaries.

[[profile.default.overrides]]
filter = 'package(finstack-wasm)'
status = 'skip'
reason = 'finstack-wasm tests need wasm-pack/wasm32 runner, not nextest'

