[workspace]
members = [
    "finstack/core",
    "finstack/statements",
    "finstack/valuations",
    "finstack/scenarios",
    "finstack/portfolio",
    "finstack/io",
    "finstack/analysis",
    "finstack/structured-credit",
    "finstack-py",
    "finstack-wasm",
    "finstack"
]
resolver = "2"

# Exclude Python bindings from default builds to avoid requiring a Python env
default-members = [
    "finstack/core",
    "finstack/statements",
    "finstack/valuations",
    "finstack/scenarios",
    "finstack/portfolio",
    "finstack/io",
    "finstack/analysis",
    "finstack/structured-credit",
    "finstack-wasm",
    "finstack"
]

[workspace.package]
version = "0.3.0"
edition = "2021"
rust-version = "1.78"
authors = ["Jon Eickmeier (me@jeickmeier.com)"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rustfin/rfin"

[workspace.dependencies]
# Pin a single Polars version across the entire workspace
# Keep features minimal and Arrow-free; consumers use re-exports from core
polars = { version = "0.41", default-features = false, features = [
    "lazy",
    "temporal",
    "dtype-datetime",
    "dtype-duration",
    "fmt"
] }
