[package]
name = "finstack-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "WebAssembly bindings for Finstack - deterministic financial computation library"

[lib]
crate-type = ["cdylib"]

[dependencies]
finstack-core = { path = "../finstack/core" }
finstack-valuations = { path = "../finstack/valuations" }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
strum = { workspace = true }

# Month enum required by Date bindings
time = { version = "0.3", default-features = false }

[dependencies.web-sys]
version = "0.3"
features = ["console"]

[dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = ["console_error_panic_hook"]
console_error_panic_hook = ["dep:console_error_panic_hook"]

[dependencies.console_error_panic_hook]
version = "0.1"
optional = true

