[package]
name = "finstack-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "WebAssembly bindings for Finstack - deterministic financial computation library"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
finstack-core = { path = "../finstack/core" }
finstack-statements = { path = "../finstack/statements" }
finstack-valuations = { path = "../finstack/valuations" }
finstack-scenarios = { path = "../finstack/scenarios" }
finstack-portfolio = { path = "../finstack/portfolio", default-features = false, features = ["scenarios"] }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1"
js-sys = "0.3"
strum = { workspace = true }
indexmap = "2.0"

# Explicitly configure getrandom for WASM target with the wasm_js feature
getrandom = { version = "0.3", features = ["wasm_js"] }

# Month enum required by Date bindings
time = { version = "0.3", default-features = false }

[dependencies.web-sys]
version = "0.3"
features = ["console"]

[dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = ["console_error_panic_hook", "scenarios"]
scenarios = ["finstack-portfolio/scenarios"]
console_error_panic_hook = ["dep:console_error_panic_hook"]

[dependencies.console_error_panic_hook]
version = "0.1"
optional = true

