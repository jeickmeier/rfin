inline] pub const fn decimals(self) -\u003e u8 {\n        MINOR_UNITS[self.numeric() as usize]\n    }\n    /// ISO 4217 numeric code as `u16`.\n    #[inline] pub const fn numeric(self) -\u003e u16 { self as u16 }\n}\n\n","traces":[{"line":382,"address":[],"length":0,"stats":{"Line":21}},{"line":383,"address":[],"length":0,"stats":{"Line":21}},{"line":386,"address":[],"length":0,"stats":{"Line":28}}],"covered":3,"coverable":3},{"path":["/","Users","joneickmeier","projects","rfin","core","src","lib.rs"],"content":"#![cfg_attr(not(feature = \"std\"), no_std)]\n#![warn(missing_docs)]\n#![cfg_attr(docsrs, feature(doc_auto_cfg))]\n\n//! Zero-std financial primitives \u0026 date utilities for the **RustFin** ecosystem.\n//!\n//! This crate exposes lightweight, composable building-blocks that are\n//! commonly required in pricing engines and risk systems:\n//!\n//! * [`Currency`] – ISO-4217 codes with numeric identifiers and metadata\n//! * [`Money`] – type-safe monetary amounts that refuse to mix currencies\n//! * [`time`] – date/time scaffolding (business calendars, day-count, schedules)\n//!\n//! The implementation is `#![no_std]` by default and adds conveniences such as\n//! `std::error::Error` \u0026 `Display` impls when compiled with the **`std`** feature.\n//!\n//! # Quick start\n//! ```\n//! use rfin_core::{Currency, Money};\n//!\n//! // Parse ISO-4217 codes (case-insensitive)\n//! let eur = \"eur\".parse::\u003cCurrency\u003e().unwrap();\n//!\n//! // Perform arithmetic that refuses to mix currencies\n//! let subtotal = Money::eur(49.50);\n//! let tax      = Money::eur( 9.90);\n//! let total    = subtotal.checked_add(tax).unwrap();\n//! assert_eq!(format!(\"{}\", total), \"59.4 EUR\");\n//! ```\n//!\n//! # Cargo features\n//! | Feature       | Purpose                                            |\n//! |-------------- |----------------------------------------------------|\n//! | `std`         | Enables `std` trait impls (`Error`, `Display`, ...) |\n//! | `serde`       | `Serialize`/`Deserialize` for public types         |\n//! | `decimal128`  | `MoneyDecimal` using `rust_decimal::Decimal`       |\n//!\n//! # Minimum Supported Rust Version (MSRV)\n//! This crate targets **Rust 1.75**.  It is tested in CI and follows the\n//! standard *cargo-semver* guideline: MSRV may only bump in a **minor** release.\n//!\n//! ---\n//! _Released under the MIT license.  Contributions welcome!_\n\n#[cfg(feature = \"std\")]\nextern crate std;\n\n// Core modules\npub mod currency;\npub mod error;\npub mod money;\n\n/// Date \u0026 calendar helpers (facade over the `time` crate)\npub mod dates;\n\n// Re-export main error type for convenience\npub use error::Error;\n\n// Top-level re-exports of commonly used primitives for easier discovery\npub use crate::currency::Currency;\npub use crate::money::Money;\npub use crate::money::{DefaultMoney, MoneyF32, MoneyF64, MoneyI32, MoneyI64};\n\n// Top-level re-exports for ergonomic access – keeps `use` sites terse.\npub use crate::dates::DayCount;\npub use crate::dates::{Date, OffsetDateTime, PrimitiveDateTime};\npub use crate::dates::{DateExt, OffsetDateTimeExt};\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","src","money.rs"],"content":"//! Type-safe money amounts.\n//!\n//! Combines a numeric `amount` with a [`Currency`] code.\n//! Prevents mixing currencies; mismatches return `Error::CurrencyMismatch`.\n//!\n//! Example: `let total = rfin_core::Money::usd(19.99);`\n\nuse super::currency::Currency;\nuse crate::error::Error;\nuse core::fmt;\nuse core::ops::{Div, Mul};\nuse num_traits::Num;\n\n#[cfg(feature = \"decimal128\")]\nuse rust_decimal::Decimal;\n\n/// Numeric type accepted by [`Money`].\n///\n/// Must implement `Num + Copy + PartialEq + Display`.\n/// Auto-implemented for standard ints/floats and `rust_decimal::Decimal` (feature `decimal128`).\n///\n/// Example: `let cash: rfin_core::Money\u003cf64\u003e = rfin_core::Money::usd(1.0);`\npub trait MoneyAmount: Num + Copy + PartialEq + fmt::Display {}\n\nimpl\u003cT\u003e MoneyAmount for T where T: Num + Copy + PartialEq + fmt::Display {}\n\n/// Monetary amount tagged with a [`Currency`].\n///\n/// Guarantees arithmetic uses a single currency; mismatches yield `Error::CurrencyMismatch`.\n/// `F` is the numeric type (`f64` by default).\n///\n/// Example: `let price = rfin_core::Money::from_parts(100.0, rfin_core::Currency::USD);`\n#[derive(Debug, Clone, Copy, PartialEq)]\n#[cfg_attr(feature = \"serde\", derive(serde::Serialize, serde::Deserialize))]\npub struct Money\u003cF: MoneyAmount = f64\u003e {\n    amount: F,\n    currency: Currency,\n}\n\nimpl\u003cF: MoneyAmount\u003e Money\u003cF\u003e {\n    /// Creates a new `Money` value from an amount and currency.\n    ///\n    /// This is a const function, allowing usage in const contexts.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::{Money, Currency};\n    ///\n    /// const PRICE: Money = Money::from_parts(99.99, Currency::USD);\n    /// let dynamic_price = Money::from_parts(49.99, Currency::EUR);\n    /// ```\n    #[inline]\n    pub const fn from_parts(amount: F, currency: Currency) -\u003e Self {\n        Self { amount, currency }\n    }\n\n    /// Returns a reference to the amount of this money value.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// let money = Money::usd(42.50);\n    /// assert_eq!(*money.amount(), 42.50);\n    /// ```\n    #[inline]\n    pub const fn amount(\u0026self) -\u003e \u0026F {\n        \u0026self.amount\n    }\n\n    /// Returns the currency of this money value.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::{Money, Currency};\n    ///\n    /// let money = Money::eur(100.0);\n    /// assert_eq!(money.currency(), Currency::EUR);\n    /// ```\n    #[inline]\n    pub const fn currency(\u0026self) -\u003e Currency {\n        self.currency\n    }\n\n    /// Consumes the `Money` and returns the inner amount.\n    ///\n    /// This is useful when you need to extract the numeric value\n    /// and no longer need the currency information.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// let money = Money::usd(99.99);\n    /// let amount: f64 = money.into_amount();\n    /// assert_eq!(amount, 99.99);\n    /// ```\n    #[inline]\n    pub fn into_amount(self) -\u003e F {\n        self.amount\n    }\n\n    /// Decomposes the `Money` into a tuple of (amount, currency).\n    ///\n    /// This consumes the `Money` value and returns both components.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::{Money, Currency};\n    ///\n    /// let money = Money::usd(75.25);\n    /// let (amount, currency) = money.into_parts();\n    /// assert_eq!(amount, 75.25);\n    /// assert_eq!(currency, Currency::USD);\n    /// ```\n    #[inline]\n    pub fn into_parts(self) -\u003e (F, Currency) {\n        (self.amount, self.currency)\n    }\n\n    /// Adds two `Money` values, returning an error if currencies don't match.\n    ///\n    /// This method performs checked addition, ensuring that only money values\n    /// with the same currency can be added together. This prevents accidental\n    /// mixing of currencies in financial calculations.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`Error::CurrencyMismatch`] if the currencies differ.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::{Money, Currency, Error};\n    ///\n    /// // Same currency - succeeds\n    /// let a = Money::usd(100.0);\n    /// let b = Money::usd(50.0);\n    /// let sum = a.checked_add(b).unwrap();\n    /// assert_eq!(*sum.amount(), 150.0);\n    ///\n    /// // Different currencies - fails\n    /// let usd = Money::usd(100.0);\n    /// let eur = Money::eur(50.0);\n    /// assert!(matches!(\n    ///     usd.checked_add(eur),\n    ///     Err(Error::CurrencyMismatch { .. })\n    /// ));\n    /// ```\n    #[inline]\n    pub fn checked_add(self, rhs: Self) -\u003e Result\u003cSelf, Error\u003e {\n        if self.currency != rhs.currency {\n            return Err(Error::CurrencyMismatch {\n                expected: self.currency,\n                actual: rhs.currency,\n            });\n        }\n        Ok(Self {\n            amount: self.amount + rhs.amount,\n            currency: self.currency,\n        })\n    }\n\n    /// Subtracts two `Money` values, returning an error if currencies don't match.\n    ///\n    /// This method performs checked subtraction, ensuring that only money values\n    /// with the same currency can be subtracted. The second value is subtracted\n    /// from the first.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`Error::CurrencyMismatch`] if the currencies differ.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::{Money, Currency, Error};\n    ///\n    /// // Same currency - succeeds\n    /// let total = Money::usd(100.0);\n    /// let payment = Money::usd(30.0);\n    /// let remaining = total.checked_sub(payment).unwrap();\n    /// assert_eq!(*remaining.amount(), 70.0);\n    ///\n    /// // Different currencies - fails\n    /// let usd = Money::usd(100.0);\n    /// let eur = Money::eur(30.0);\n    /// assert!(matches!(\n    ///     usd.checked_sub(eur),\n    ///     Err(Error::CurrencyMismatch { .. })\n    /// ));\n    /// ```\n    ///\n    /// # Note on Negative Values\n    ///\n    /// This method allows the result to be negative, which can represent\n    /// debts or deficits in financial calculations:\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// let balance = Money::usd(50.0);\n    /// let charge = Money::usd(75.0);\n    /// let overdraft = balance.checked_sub(charge).unwrap();\n    /// assert_eq!(*overdraft.amount(), -25.0);\n    /// ```\n    #[inline]\n    pub fn checked_sub(self, rhs: Self) -\u003e Result\u003cSelf, Error\u003e {\n        if self.currency != rhs.currency {\n            return Err(Error::CurrencyMismatch {\n                expected: self.currency,\n                actual: rhs.currency,\n            });\n        }\n        Ok(Self {\n            amount: self.amount - rhs.amount,\n            currency: self.currency,\n        })\n    }\n}\n\n/// Convenience constructors for commonly used currencies.\n///\n/// These methods provide shortcuts for creating `Money` values in\n/// frequently used currencies without explicitly specifying the currency.\nimpl\u003cF: MoneyAmount\u003e Money\u003cF\u003e {\n    /// Creates a new `Money` value in US Dollars (USD).\n    ///\n    /// This is a convenience method equivalent to:\n    /// `Money::from_parts(amount, Currency::USD)`\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// let price = Money::usd(19.99);\n    /// let cents = Money::\u003ci64\u003e::usd(1999);  // Using cents as integers\n    /// ```\n    #[inline]\n    pub const fn usd(amount: F) -\u003e Self {\n        Self {\n            amount,\n            currency: Currency::USD,\n        }\n    }\n\n    /// Creates a new `Money` value in Euros (EUR).\n    ///\n    /// This is a convenience method equivalent to:\n    /// `Money::from_parts(amount, Currency::EUR)`\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// let price = Money::eur(49.99);\n    /// let cents = Money::\u003ci64\u003e::eur(4999);  // Using cents as integers\n    /// ```\n    #[inline]\n    pub const fn eur(amount: F) -\u003e Self {\n        Self {\n            amount,\n            currency: Currency::EUR,\n        }\n    }\n}\n\n/// Formats `Money` for display as \"amount currency\".\n///\n/// The format shows the numeric amount followed by the three-letter\n/// currency code, separated by a space.\n///\n/// # Examples\n///\n/// ```\n/// use rfin_core::Money;\n///\n/// let money = Money::usd(1234.56);\n/// assert_eq!(format!(\"{}\", money), \"1234.56 USD\");\n///\n/// let euros = Money::eur(99.0);\n/// assert_eq!(format!(\"{}\", euros), \"99 EUR\");\n///\n/// // Works with different numeric types\n/// let cents = Money::\u003ci64\u003e::usd(9999);\n/// assert_eq!(format!(\"{}\", cents), \"9999 USD\");\n/// ```\nimpl\u003cF: MoneyAmount\u003e fmt::Display for Money\u003cF\u003e {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{} {}\", self.amount, self.currency)\n    }\n}\n\n// Arithmetic operations with scalar values (currency preserved)\n\n/// Multiplication of `Money` by a scalar value.\n///\n/// Multiplying money by a scalar is useful for:\n/// - Calculating multiple quantities (e.g., price × quantity)\n/// - Applying percentage increases (e.g., amount × 1.1 for 10% increase)\n/// - Scaling financial values\n///\n/// The currency is preserved in the result.\nimpl\u003cF: MoneyAmount\u003e Mul\u003cF\u003e for Money\u003cF\u003e {\n    type Output = Self;\n\n    /// Multiplies the money amount by a scalar value.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// let unit_price = Money::usd(25.00);\n    /// let total = unit_price * 4.0;  // 4 items\n    /// assert_eq!(*total.amount(), 100.00);\n    ///\n    /// // Applying a percentage increase\n    /// let base = Money::eur(100.00);\n    /// let with_tax = base * 1.21;  // 21% tax\n    /// assert_eq!(*with_tax.amount(), 121.00);\n    /// ```\n    #[inline]\n    fn mul(self, rhs: F) -\u003e Self::Output {\n        Self {\n            amount: self.amount * rhs,\n            currency: self.currency,\n        }\n    }\n}\n\n/// Division of `Money` by a scalar value.\n///\n/// Dividing money by a scalar is useful for:\n/// - Splitting amounts equally (e.g., bill ÷ number of people)\n/// - Calculating unit prices (e.g., total ÷ quantity)\n/// - Applying percentage discounts (e.g., amount ÷ 1.1 to remove 10% markup)\n///\n/// The currency is preserved in the result.\nimpl\u003cF: MoneyAmount\u003e Div\u003cF\u003e for Money\u003cF\u003e {\n    type Output = Self;\n\n    /// Divides the money amount by a scalar value.\n    ///\n    /// # Examples\n    ///\n    /// ```\n    /// use rfin_core::Money;\n    ///\n    /// // Splitting a bill\n    /// let total_bill = Money::usd(120.00);\n    /// let per_person = total_bill / 4.0;\n    /// assert_eq!(*per_person.amount(), 30.00);\n    ///\n    /// // Calculating unit price\n    /// let bulk_price = Money::eur(250.00);\n    /// let unit_price = bulk_price / 10.0;\n    /// assert_eq!(*unit_price.amount(), 25.00);\n    /// ```\n    ///\n    /// # Panics\n    ///\n    /// Panics if `rhs` is zero (same behavior as the underlying numeric type).\n    #[inline]\n    fn div(self, rhs: F) -\u003e Self::Output {\n        Self {\n            amount: self.amount / rhs,\n            currency: self.currency,\n        }\n    }\n}\n\n// Type aliases for common Money types\n\n/// Money with `f64` amount - the default and recommended type for most calculations.\n///\n/// # Characteristics\n/// - **Precision**: ~15-17 significant decimal digits\n/// - **Range**: ±1.8 × 10^308\n/// - **Use cases**: General financial calculations, prices, exchange rates\n///\n/// # Example\n/// ```\n/// use rfin_core::MoneyF64;\n/// let price: MoneyF64 = MoneyF64::usd(99.99);\n/// ```\npub type MoneyF64 = Money\u003cf64\u003e;\n\n/// Money with `f32` amount - reduced precision but smaller memory footprint.\n///\n/// # Characteristics\n/// - **Precision**: ~6-9 significant decimal digits\n/// - **Range**: ±3.4 × 10^38\n/// - **Size**: 8 bytes total (vs 16 bytes for MoneyF64)\n/// - **Use cases**: Large datasets where precision isn't critical\n///\n/// # Example\n/// ```\n/// use rfin_core::MoneyF32;\n/// let price: MoneyF32 = MoneyF32::usd(99.99);\n/// ```\npub type MoneyF32 = Money\u003cf32\u003e;\n\n/// Money with `i64` amount - for exact integer calculations.\n///\n/// # Characteristics\n/// - **Precision**: Exact integer arithmetic\n/// - **Range**: ±9,223,372,036,854,775,807\n/// - **Use cases**: Representing amounts in smallest currency units (e.g., cents)\n///\n/// # Example\n/// ```\n/// use rfin_core::MoneyI64;\n/// // $99.99 represented as 9999 cents\n/// let price_cents: MoneyI64 = MoneyI64::usd(9999);\n/// ```\npub type MoneyI64 = Money\u003ci64\u003e;\n\n/// Money with `i32` amount - for exact integer calculations with smaller range.\n///\n/// # Characteristics\n/// - **Precision**: Exact integer arithmetic\n/// - **Range**: ±2,147,483,647\n/// - **Size**: 8 bytes total (vs 16 bytes for MoneyI64)\n/// - **Use cases**: Representing amounts in cents when range is sufficient\n///\n/// # Example\n/// ```\n/// use rfin_core::MoneyI32;\n/// // $99.99 represented as 9999 cents\n/// let price_cents: MoneyI32 = MoneyI32::usd(9999);\n/// ```\npub type MoneyI32 = Money\u003ci32\u003e;\n\n/// Money backed by `rust_decimal::Decimal` for arbitrary precision decimal arithmetic.\n///\n/// Requires the `decimal128` feature to be enabled.\n///\n/// # Characteristics\n/// - **Precision**: 28-29 significant decimal digits\n/// - **Range**: ±7.9 × 10^28\n/// - **Use cases**: Financial calculations requiring exact decimal representation\n///\n/// # Example\n/// ```ignore\n/// use rfin_core::MoneyDecimal;\n/// use rust_decimal_macros::dec;\n///\n/// let price: MoneyDecimal = MoneyDecimal::from_parts(dec!(99.99), Currency::USD);\n/// ```\n#[cfg(feature = \"decimal128\")]\npub type MoneyDecimal = Money\u003cDecimal\u003e;\n\n/// Convenient alias for the default money type (`f64`).\n///\n/// This is the recommended type for most use cases, providing a good balance\n/// of precision, range, and performance.\n///\n/// # Example\n/// ```\n/// use rfin_core::DefaultMoney;\n/// let price: DefaultMoney = DefaultMoney::usd(99.99);\n/// ```\npub type DefaultMoney = MoneyF64;\n\n// Prevent clippy warning about items after test module.\n#[cfg(test)]\n#[allow(clippy::items_after_test_module)]\nmod tests {\n    use super::*;\n    use core::mem;\n\n    #[cfg(feature = \"std\")]\n    use std::format;\n\n    #[test]\n    fn test_money_creation() {\n        let usd_money = Money::from_parts(100.0, Currency::USD);\n        assert_eq!(*usd_money.amount(), 100.0);\n        assert_eq!(usd_money.currency(), Currency::USD);\n    }\n\n    #[test]\n    fn test_money_convenience_constructors() {\n        let usd_money = Money::usd(50.0);\n        assert_eq!(*usd_money.amount(), 50.0);\n        assert_eq!(usd_money.currency(), Currency::USD);\n\n        let eur_money = Money::eur(75.0);\n        assert_eq!(*eur_money.amount(), 75.0);\n        assert_eq!(eur_money.currency(), Currency::EUR);\n    }\n\n    #[test]\n    fn test_money_addition_same_currency() {\n        let usd_100 = Money::usd(100.0);\n        let usd_50 = Money::usd(50.0);\n        let total = usd_100.checked_add(usd_50).unwrap();\n\n        assert_eq!(*total.amount(), 150.0);\n        assert_eq!(total.currency(), Currency::USD);\n    }\n\n    #[test]\n    fn test_money_subtraction_same_currency() {\n        let usd_100 = Money::from_parts(100.0, Currency::USD);\n        let usd_30 = Money::from_parts(30.0, Currency::USD);\n        let result = usd_100.checked_sub(usd_30).unwrap();\n\n        assert_eq!(*result.amount(), 70.0);\n        assert_eq!(result.currency(), Currency::USD);\n    }\n\n    #[test]\n    fn test_money_multiplication() {\n        let usd_100 = Money::from_parts(100.0, Currency::USD);\n        let result = usd_100 * 2.5;\n\n        assert_eq!(*result.amount(), 250.0);\n        assert_eq!(result.currency(), Currency::USD);\n    }\n\n    #[test]\n    fn test_money_division() {\n        let usd_100 = Money::from_parts(100.0, Currency::USD);\n        let result = usd_100 / 4.0;\n\n        assert_eq!(*result.amount(), 25.0);\n        assert_eq!(result.currency(), Currency::USD);\n    }\n\n    #[test]\n    fn test_money_addition_different_currency_error() {\n        let usd_100 = Money:: ey::from_parts(100.0, Currency::USD);\n        let eur_50 = Money::from_parts(50.0, Currency::EUR);\n        let result = usd_100.checked_add(eur_50);\n\n        assert!(result.is_err());\n        matches!(result.unwrap_err(), Error::CurrencyMismatch { .. });\n    }\n\n    #[test]\n    fn test_checked_sub_same_currency() {\n        let usd_100 = Money::from_parts(100.0, Currency::USD);\n        let usd_30 = Money::from_parts(30.0, Currency::USD);\n        let result = usd_100.checked_sub(usd_30).unwrap();\n\n        assert_eq!(*result.amount(), 70.0);\n        assert_eq!(result.currency(), Currency::USD);\n    }\n\n    #[test]\n    fn test_checked_sub_different_currency() {\n        let usd_100 = Money::from_parts(100.0, Currency::USD);\n        let eur_30 = Money::from_parts(30.0, Currency::EUR);\n        let result = usd_100.checked_sub(eur_30);\n\n        assert!(result.is_err());\n        matches!(result.unwrap_err(), Error::CurrencyMismatch { .. });\n    }\n\n    #[test]\n    fn test_money_with_different_numeric_types() {\n        let f32_money = Money::\u003cf32\u003e::from_parts(100.5, Currency::USD);\n        assert_eq!(*f32_money.amount(), 100.5f32);\n\n        let i64_money = Money::\u003ci64\u003e::from_parts(1000, Currency::EUR);\n        assert_eq!(*i64_money.amount(), 1000i64);\n    }\n\n    #[test]\n    fn test_type_aliases() {\n        let _f64_money: MoneyF64 = Money::from_parts(100.0, Currency::USD);\n        let _f32_money: MoneyF32 = Money::from_parts(100.0f32, Currency::USD);\n        let _i64_money: MoneyI64 = Money::from_parts(100i64, Currency::USD);\n        let _i32_money: MoneyI32 = Money::from_parts(100i32, Currency::USD);\n        let _default_money: DefaultMoney = Money::from_parts(100.0, Currency::USD);\n    }\n\n    #[cfg(feature = \"decimal128\")]\n    #[test]\n    fn test_money_decimal() {\n        use rust_decimal_macros::dec;\n        let decimal_money: MoneyDecimal = Money::from_parts(dec!(123.45), Currency::USD);\n        assert_eq!(*decimal_money.amount(), dec!(123.45));\n    }\n\n    #[cfg(feature = \"serde\")]\n    #[test]\n    fn test_money_serde() {\n        let money = Money::from_parts(123.45, Currency::USD);\n        let serialized = serde_json::to_string(\u0026money).unwrap();\n        let deserialized: Money\u003cf64\u003e = serde_json::from_str(\u0026serialized).unwrap();\n        assert_eq!(money, deserialized);\n    }\n\n    #[test]\n    #[cfg(feature = \"std\")]\n    fn test_money_performance() {\n        let usd_100 = Money::from_parts(100.0, Currency::USD);\n        let usd_50 = Money::from_parts(50.0, Currency::USD);\n\n        let start = std::time::Instant::now();\n        let mut total = usd_100;\n        for _ in 0..1000 {\n            total = total.checked_add(usd_50).unwrap();\n        }\n        let duration = start.elapsed();\n\n        assert!(duration.as_nanos() \u003c 1_000_000);\n        assert_eq!(*total.amount(), 100.0 + 50.0 * 1000.0);\n    }\n}\n\n//--- Trait conversions ------------------------------------------------------\n\n/// Converts a tuple of (amount, currency) into a `Money` value.\n///\n/// This provides a convenient way to create `Money` from tuples,\n/// especially useful when working with functions that return tuples.\n///\n/// # Examples\n///\n/// ```\n/// use rfin_core::{Money, Currency};\n///\n/// // Direct conversion\n/// let money: Money = (100.0, Currency::USD).into();\n/// assert_eq!(*money.amount(), 100.0);\n/// assert_eq!(money.currency(), Currency::USD);\n///\n/// // From function returning tuple\n/// fn calculate_price() -\u003e (f64, Currency) {\n///     (99.99, Currency::EUR)\n/// }\n/// let price: Money = calculate_price().into();\n/// ```\nimpl\u003cF: MoneyAmount\u003e From\u003c(F, Currency)\u003e for Money\u003cF\u003e {\n    #[inline]\n    fn from(value: (F, Currency)) -\u003e Self {\n        Money {\n            amount: value.0,\n            currency: value.1,\n        }\n    }\n}\n","traces":[{"line":54,"address":[],"length   CalendarKind::Gblo(cal) =\u003e cal.is_holiday(date),\n            CalendarKind::Union(list) =\u003e list.iter().any(|c| c.is_holiday(date)),\n        }\n    }\n\n    fn collect_refs\u003c'a\u003e(\u0026'a self, out: \u0026mut Vec\u003c\u0026'a dyn HolidayCalendar\u003e) {\n        match self {\n            CalendarKind::Target2(cal) =\u003e out.push(cal),\n            CalendarKind::Gblo(cal) =\u003e out.push(cal),\n            CalendarKind::Union(list) =\u003e {\n                for c in list {\n                    c.collect_refs(out);\n                }\n            }\n        }\n    }\n}\n\n/// Calendar wrapper exposed to Python.\n#[pyclass(name = \"Calendar\", module = \"rfin.dates\")]\n#[derive(Clone)]\npub struct PyCalendar {\n    kind: CalendarKind,\n}\n\n#[pymethods]\nimpl PyCalendar {\n    /// TARGET2 calendar (European settlement days).\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn target2(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCalendar {\n            kind: CalendarKind::Target2(Target2::new()),\n        }\n    }\n\n    /// U.K. inter-bank calendar (GBLO).\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn gblo(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCalendar {\n            kind: CalendarKind::Gblo(Gblo::new()),\n        }\n    }\n\n    /// Return a calendar that is the union of the supplied calendars.\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls, calendars)\")]\n    fn union(_cls: \u0026Bound\u003c'_, PyType\u003e, calendars: Vec\u003cPyCalendar\u003e) -\u003e Self {\n        let kinds = calendars.into_iter().map(|c| c.kind).collect();\n        PyCalendar {\n            kind: CalendarKind::Union(kinds),\n        }\n    }\n\n    /// Check whether a given date is a holiday (or weekend) in this calendar.\n    #[pyo3(text_signature = \"(self, date)\")]\n    fn is_holiday(\u0026self, date: \u0026PyDate) -\u003e bool {\n        self.kind.is_holiday(date.inner())\n    }\n\n    /// Adjust a date according to the specified business-day convention.\n    #[pyo3(text_signature = \"(self, date, convention)\")]\n    fn adjust(\u0026self, date: \u0026PyDate, convention: PyBusDayConv) -\u003e PyDate {\n        use rfin_core::dates::Date as CoreDate;\n        let adj: CoreDate = match \u0026self.kind {\n            CalendarKind::Target2(cal) =\u003e adjust(date.inner(), convention.into(), cal),\n            CalendarKind::Gblo(cal) =\u003e adjust(date.inner(), convention.into(), cal),\n            CalendarKind::Union(list) =\u003e {\n                let mut refs: Vec\u003c\u0026dyn HolidayCalendar\u003e = Vec::new();\n                for c in list {\n                    c.collect_refs(\u0026mut refs);\n                }\n                let comp = CompositeCalendar::merge(\u0026refs);\n                adjust(date.inner(), convention.into(), \u0026comp)\n            }\n        };\n        PyDate::from_core(adj)\n    }\n\n    fn __repr__(\u0026self) -\u003e \u0026'static str {\n        match self.kind {\n            CalendarKind::Target2(_) =\u003e \"Calendar('TARGET2')\",\n            CalendarKind::Gblo(_) =\u003e \"Calendar('GBLO')\",\n            CalendarKind::Union(_) =\u003e \"Calendar('Union')\",\n        }\n    }\n}\n\n// Separate inherent impl block for internal helpers (not exposed to Python)\nimpl PyCalendar {\n    /// Internal: obtain reference to underlying HolidayCalendar trait object.\n    pub(crate) fn hcal(\u0026self) -\u003e \u0026dyn HolidayCalendar {\n        self.kind.as_hcal()\n    }\n}\n\n// -----------------------------------------------------------------------------\n// Module-level helpers\n// -----------------------------------------------------------------------------\n\n/// Return list of built-in calendar identifiers available in this build.\n#[pyfunction(name = \"available_calendars\")]\npub fn py_available_calendars() -\u003e Vec\u003cString\u003e {\n    rfin_core::dates::available_calendars()\n 003e print(usd)\n    ///     USD\n    #[new]\n    #[pyo3(text_signature = \"(code)\")]\n    fn new(code: \u0026str) -\u003e PyResult\u003cSelf\u003e {\n        let currency = code.parse::\u003cCoreCurrency\u003e().map_err(|e| {\n            PyErr::new::\u003cpyo3::exceptions::PyValueError, _\u003e(format!(\"Invalid currency code: {}\", e))\n        })?;\n        Ok(PyCurrency { inner: currency })\n    }\n\n    /// Create a US Dollar (USD) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: USD currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e usd = Currency.usd()\n    ///     \u003e\u003e\u003e print(usd.code)\n    ///     USD\n    ///     \u003e\u003e\u003e print(usd.decimals)\n    ///     2\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn usd(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::USD,\n        }\n    }\n\n    /// Create a Euro (EUR) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: EUR currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e eur = Currency.eur()\n    ///     \u003e\u003e\u003e print(eur.numeric_code)\n    ///     978\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn eur(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::EUR,\n        }\n    }\n\n    /// Create a British Pound Sterling (GBP) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: GBP currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e gbp = Currency.gbp()\n    ///     \u003e\u003e\u003e print(gbp.code)\n    ///     GBP\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn gbp(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::GBP,\n        }\n    }\n\n    /// Create a Japanese Yen (JPY) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: JPY currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e jpy = Currency.jpy()\n    ///     \u003e\u003e\u003e print(jpy.decimals)\n    ///     0  # Yen has no decimal places\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn jpy(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::JPY,\n        }\n    }\n\n    /// Create a Swiss Franc (CHF) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: CHF currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e chf = Currency.chf()\n    ///     \u003e\u003e\u003e print(chf.code)\n    ///     CHF\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn chf(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::CHF,\n        }\n    }\n\n    /// Create an Australian Dollar (AUD) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: AUD currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e aud = Currency.aud()\n    ///     \u003e\u003e\u003e print(aud.numeric_code)\n    ///     36\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn aud(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::AUD,\n        }\n    }\n\n    /// Create a Canadian Dollar (CAD) currency instance.\n    ///\n    /// Returns:\n    ///     Currency: CAD currency\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e cad = Currency.cad()\n    ///     \u003e\u003e\u003e print(cad.code)\n    ///     CAD\n    #[classmethod]\n    #[pyo3(text_signature = \"(cls)\")]\n    fn cad(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        PyCurrency {\n            inner: CoreCurrency::CAD,\n        }\n    }\n\n    /// Get the 3-letter ISO 4217 currency code.\n    ///\n    /// Returns:\n    ///     str: The currency code (e.g., \"USD\", \"EUR\")\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e usd = Currency.usd()\n    ///     \u003e\u003e\u003e print(usd.code)\n    ///     USD\n    #[getter]\n    fn code(\u0026self) -\u003e String {\n        format!(\"{}\", self.inner)\n    }\n\n    /// Get the ISO 4217 numeric code for this currency.\n    ///\n    /// Each currency has a unique 3-digit numeric code assigned by ISO 4217.\n    ///\n    /// Returns:\n    ///     int: The numeric currency code\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e Currency.usd().numeric_code\n    ///     840\n    ///     \u003e\u003e\u003e Currency.eur().numeric_code\n    ///     978\n    ///     \u003e\u003e\u003e Currency.gbp().numeric_code\n    ///     826\n    #[getter]\n    fn numeric_code(\u0026self) -\u003e u16 {\n        self.inner as u16\n    }\n\n    /// Get the number of decimal places (minor units) for this currency.\n    ///\n    /// This indicates how many decimal places are typically used when\n    /// displaying monetary amounts in this currency according to ISO 4217.\n    ///\n    /// Returns:\n    ///     int: Number of decimal places (0, 2, or 3 for most currencies)\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e Currency.usd().decimals\n    ///     2  # US Dollar uses cents\n    ///     \u003e\u003e\u003e Currency.jpy().decimals  \n    ///     0  # Japanese Yen has no subunits\n    ///     \u003e\u003e\u003e Currency(\"BHD\").decimals\n    ///     3  # Bahraini Dinar uses 3 decimal places\n    #[getter]\n    fn decimals(\u0026self) -\u003e u8 {\n        self.inner.decimals()\n    }\n\n    /// Return the string representation of the currency.\n    ///\n    /// Returns:\n    ///     str: The 3-letter currency code\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e str(Currency.usd())\n    ///     'USD'\n    fn __str__(\u0026self) -\u003e String {\n        format!(\"{}\", self.inner)\n    }\n\n    /// Return the debug representation of the currency.\n    ///\n    /// Returns:\n    ///     str: A string like \"Currency('USD')\"\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e repr(Currency.usd())\n    ///     \"Currency('USD')\"\n    fn __repr__(\u0026self) -\u003e String {\n        format!(\"Currency('{}')\", self.inner)\n    }\n\n    /// Check equality between two Currency instances.\n    ///\n    /// Args:\n    ///     other: Another Currency instance\n    ///\n    /// Returns:\n    ///     bool: True if the currencies are the same\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e Currency.usd() == Currency(\"USD\")\n    ///     True\n    ///     \u003e\u003e\u003e Currency.usd() == Currency.eur()\n    ///     False\n    fn __eq__(\u0026self, other: \u0026PyCurrency) -\u003e bool {\n        self.inner == other.inner\n    }\n\n    /// Return hash of the currency for use in sets and dicts.\n    ///\n    /// Returns:\n    ///     int: Hash value\n    ///\n    /// Examples:\n    ///     \u003e\u003e\u003e from rfin import Currency\n    ///     \u003e\u003e\u003e currencies = {Currency.usd(), Currency.eur(), Currency.usd()}\n    ///     \u003e\u003e\u003e len(currencies)\n    ///     2  # USD appears only once\n    fn __hash__(\u0026self) -\u003e u64 {\n        use std::collections::h \nuse rfin_core::dates::DayCount as CoreDayCount; // need PyDate\n\n/// Python wrapper around the `DayCount` enum\n#[pyclass(name = \"DayCount\", module = \"rfin.dates\")]\n#[derive(Clone)]\npub struct PyDayCount {\n    inner: CoreDayCount,\n}\n\n#[pymethods]\nimpl PyDayCount {\n    // ---------------------------------------------------------------------\n    // Constructors / constants\n    // ---------------------------------------------------------------------\n    #[classmethod]\n    fn act360(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        Self {\n            inner: CoreDayCount::Act360,\n        }\n    }\n\n    #[classmethod]\n    fn act365f(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        Self {\n            inner: CoreDayCount::Act365F,\n        }\n    }\n\n    #[classmethod]\n    fn thirty360(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        Self {\n            inner: CoreDayCount::Thirty360,\n        }\n    }\n\n    #[classmethod]\n    fn thirty_e_360(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        Self {\n            inner: CoreDayCount::ThirtyE360,\n        }\n    }\n\n    #[classmethod]\n    fn actact(_cls: \u0026Bound\u003c'_, PyType\u003e) -\u003e Self {\n        Self {\n            inner: CoreDayCount::ActAct,\n        }\n    }\n\n    // ---------------------------------------------------------------------\n    // Methods\n    // ---------------------------------------------------------------------\n    /// Return day-count between two dates (number of days) following the convention.\n    #[pyo3(text_signature = \"(self, start, end)\")]\n    pub fn days(\u0026self, start: \u0026PyDate, end: \u0026PyDate) -\u003e PyResult\u003ci32\u003e {\n        self.inner\n            .days(start.inner(), end.inner())\n            .map_err(|e| PyErr::new::\u003cpyo3::exceptions::PyRuntimeError, _\u003e(e.to_string()))\n    }\n\n    /// Return year fraction between two dates following the convention.\n ),\n        (2025,4,21),\n        (2025,5,1),\n        (2025,12,25),\n        (2025,12,26),\n    ]);\n}\n\n#[test]\nfn defr_2024_2025() {\n    let cal = Defr::default();\n    // Same date set as TARGET2 plus May1\n    assert_holidays_exact!(cal, 2024, [\n        (2024,1,1), (2024,3,29), (2024,4,1), (2024,5,1), (2024,12,25), (2024,12,26)\n    ]);\n    assert_holidays_exact!(cal, 2025, [\n        (2025,1,1), (2025,4,18), (2025,4,21), (2025,5,1), (2025,12,25), (2025,12,26)\n    ]);\n}\n\n#[test]\nfn nyse_2024_2025() {\n    let cal = Nyse::default();\n    assert_holidays_exact!(cal, 2024, [\n        (2024,1,1), (2024,1,15), (2024,2,19), (2024,3,29), (2024,5,27),\n        (2024,6,19), (2024,7,4), (2024,9,2), (2024,11,28), (2024,12,25)\n    ]);\n    assert_holidays_exact!(cal, 2025, [\n        (2025,1,1), (2025,1,20), (2025,2,17), (2025,4,18), (2025,5,26),\n        (2025,6,19), (2025,7,4), (2025,9,1), (2025,11,27), (2025,12,25)\n    ]);\n}\n\n#[test]\nfn cme_2024_2025() {\n    let cal = Cme::default();\n    // CME mirrors NYSE\n    nyse_2024_2025(); // will panic if mismatched; reuse\n    // Additional direct check: ensure Good Friday 2024 is holiday\n    assert!(cal.is_holiday(make_date(2024,3,29)));\n}\n\n#[test]\nfn sifma_2024_2025() {\n    let cal = Sifma::default();\n    assert_holidays_exact!(cal, 2024, [\n        (2024,1,1), (2024,1,15), (2024,2,19), (2024,3,29), (2024,5,27),\n        (2024,6,19), (2024,7,4), (2024,9,2), (2024,10,14), (2024,11,11),\n        (2024,11,28), (2024,12,25)\n    ]);\n    assert_holidays_exact!(cal, 2025, [\n        (2025,1,1), (2025,1,20), (2025,2,17), (2025,4,18), (2025,5,26),\n        (2025,6,19), (2025,7,4), (2025,9,1), (2025,10,13), (2025,11,11),\n        (2025,11,27), (2025,12,25)\n    ]);\n}\n\n#[test]\nfn cato_2024_2025() {\n    let cal = Cato::default();\n    assert_holidays_exact!(cal, 2024, [\n        (2024,1,1), (2024,2,19), (2024,3,29), (2024,5,20), (2024,7,1),\n        (2024,8,5), (2024,9,2), (2024,9,30), (2024,10,14), (2024,     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      }
    };
  });

  return [
    ...folders,
    ...files.filter(file => file.path.length === 1),
  ];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener("hashchange", () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.substr(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(({current}) => {
      return {current: [...current, file.path[0]]};
    }, () => this.updateHash());
  }

  back(file) {
    this.setState(({current}) => {
      return {current: current.slice(0, current.length - 1)};
    }, () => this.updateHash());
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e('div', {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e('table', {className: 'files-list'},
      e('thead', {className: 'files-list__head'},
        e('tr', null,
          e('th', null, "Path"),
          e('th', null, "Coverage")
        )
      ),
      e('tbody', {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile}))
      )
    )
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? file.covered / file.coverable * 100 : -1;
  const coverageDelta = file.prevRun &&
    (file.covered / file.coverable * 100 - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('tr', {
      className: 'files-list__file'
        + (coverage >= 0 && coverage < 50 ? ' files-list__file_low': '')
        + (coverage >= 50 && coverage < 80 ? ' files-list__file_medium': '')
        + (coverage >= 80 ? ' files-list__file_high': '')
        + (file.is_folder ? ' files-list__file_folder': ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e('td', null,
      file.covered + ' / ' + file.coverable +
      (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'},
    e(FileHeader, {file, onBack}),
    e(FileContent, {file})
  );
}

function FileHeader({file, onBack}) {
  const coverage = file.covered / file.coverable * 100;
  const coverageDelta = file.prevRun && (coverage - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('div', {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e('div', {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable +
      (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function FileContent({file}) {
  return e('pre', {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      return e('code', {
          className: 'code-line'
            + (covered ? ' code-line_covered' : '')
            + (uncovered ? ' code-line_uncovered' : ''),
          title: trace ? JSON.stringify(trace.stats, null, 2) : null,
        }, line);
    })
  );
}

(function(){
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData && previousData.files.forEach((file) => {
    const path = file.path.slice(commonPath.length).join('/');
    prevFilesMap.set(path, file);
  });

  const files = data.files.map((file) => {
    const path = file.path.slice(commonPath.length);
    const { covered = 0, coverable = 0 } = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: { covered, coverable },
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    }
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));
}());
</script>
</body>
</html>
