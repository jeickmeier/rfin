   writeln!(w, \"    {} = {},\", row.code, row.numeric)?;\n    }\n    writeln!(w, \"}}\\n\")\n}\n\n/// Emit a const table mapping numeric code → decimals.\nfn write_decimal_table(w: \u0026mut impl Write, rows: \u0026[CurrencyRow]) -\u003e std::io::Result\u003c()\u003e {\n    let max_numeric = rows.iter().map(|r| r.numeric).max().unwrap_or(0) as usize;\n    let mut table = vec![0u8; max_numeric + 1];\n    for r in rows {\n        table[r.numeric as usize] = r.minor_units;\n    }\n\n    writeln!(w, \"/// Number of decimal places (minor units) for each ISO 4217 currency, indexed by numeric code.\")?;\n    writeln!(w, \"pub const MINOR_UNITS: [u8; {}] = [\", table.len())?;\n    for (idx, val) in table.iter().enumerate() {\n        if idx % 20 == 0 {\n            writeln!(w)?;\n        }\n        write!(w, \"{}, \", val)?;\n    }\n    writeln!(w, \"];\")?;\n    Ok(())\n}\n\npub fn generate() -\u003e std::io::Result\u003c()\u003e {\n    let out_dir = env::var(\"OUT_DIR\").unwrap();\n    let dest_path = Path::new(\u0026out_dir).join(\"currency_generated.rs\");\n    let mut f = File::create(\u0026dest_path)?;\n\n    // Tell cargo to rerun if the CSV file changes\n    println!(\"cargo:rerun-if-changed=data/iso_4217.csv\");\n\n    let rows = parse_csv(\"data/iso_4217.csv\")?;\n\n    // Preamble\n    writeln!(f, \"// Auto-generated by build.rs – DO NOT EDIT\")?;\n    writeln!(f, \"use strum_macros::{{EnumIter, EnumString, Display}};\")?;\n    writeln!(f, \"use num_enum::{{IntoPrimitive, TryFromPrimitive}};\")?;\n    writeln!(f)?;\n\n    write_enum(\u0026mut f, \u0026rows)?;\n\n    write_decimal_table(\u0026mut f, \u0026rows)?;\n\n    // impl block with helpers\n    writeln!(f, \"impl Currency {{\")?;\n    writeln!(\n        f,\n        \"    /// ISO-4217 decimal precision for this currency (e.g. USD → 2)\"\n    )?;\n    writeln!(f, \"    #[inline] pub const fn decimals(self) -\u003e u8 {{\")?;\n    writeln!(f, \"        MINOR_UNITS[self.numeric() as usize]\")?;\n    writeln!(f, \"    }}\")?;\n    writeln!(f, \"    /// ISO 4217 numeric code as `u16`.\")?;\n    writeln!(\n        f,\n        \"    #[inline] pub const fn numeric(self) -\u003e u16 {{ self as u16 }}\"\n    )?;\n    writeln!(f, \"}}\\n\")?;\n\n    // --------------------------------------------------------------------\n    // Additionally, emit a copy into `src/generated/` so that IDEs (e.g.\n    // rust-analyzer) can parse the generated enum without relying on the\n    // `include!(concat!(env!(\"OUT_DIR\"), ...))` indirection.\n    // --------------------------------------------------------------------\n\n    let src_generated_dir = Path::new(\"src/generated\");\n    if std::fs::create_dir_all(src_generated_dir).is_ok() {\n        let dest_src_path = src_generated_dir.join(\"currency_generated.rs\");\n        // Ignore copy errors; not fatal for the build.\n        let _ = std::fs::copy(\u0026dest_path, \u0026dest_src_path);\n    }\n\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","build","generate_calendars.rs"],"content":"//! Calendar discovery and code generation for the build script.\n\nuse std::io;\n\n/// Auto-discover calendar modules under `src/dates/calendars` and emit an\n/// aggregate module inside `OUT_DIR` so that the crate can reference them at\n/// runtime.\npub fn generate() -\u003e io::Result\u003c()\u003e {\n    use std::fs::{self, File};\n    use std::io::Write;\n    use std::path::{Path, PathBuf};\n\n    let out_dir = std::env::var(\"OUT_DIR\").unwrap();\n    let dest_path: PathBuf = Path::new(\u0026out_dir).join(\"generated_calendars.rs\");\n\n    // Scan directory for .rs files (excluding mod.rs)\n    let mut lines = String::new();\n    let mut names = Vec::\u003cString\u003e::new();\n    let cal_dir = Path::new(\"src/dates/calendars\");\n    if cal_dir.exists() {\n        for entry in fs::read_dir(cal_dir)? {\n            let path = entry?.path();\n            if path.extension().and_then(|s| s.to_str()) != Some(\"rs\") {\n                continue;\n            }\n            if path.file_name().and_then(|s| s.to_str()) == Some(\"mod.rs\") {\n                continue;\n            }\n            let stem = path.file_stem().unwrap().to_str().unwrap();\n            // Embed each calendar file as an inline module so the compiler can find it even\n            // though this code is expanded from OUT_DIR (which would otherwise break the\n            // standard module path resolution logic).\n            lines.push_str(\u0026format!(\n                \"pub mod {name} {{\\n    include!(concat!(env!(\\\"CARGO_MANIFEST_DIR\\\"), \\\"/src/dates/calendars/{name}.rs\\\"));\\n}}\\n\",\n                name = stem\n            ));\n            lines.push_str(\u0026format!(\"pub use {name}::*;\\n\", name = stem));\n\n            // Keep track of all discovered calendar names so we can expose a list later.\n            names.push(stem.to_string());\n        }\n    }\n\n    // Expose list of available calendars for runtime discovery\n    if !names.is_empty() {\n        names.sort();\n        lines.push_str(\"\\n/// List of built-in holiday calendar identifiers.\\n\");\n        lines.push_str(\"pub const AVAILABLE_CALENDARS: \u0026[\u0026str] = \u0026[\\n\");\n        for name in \u0026names {\n            lines.push_str(\u0026format!(\"    \\\"{}\\\",\\n\", name));\n        }\n        lines.push_str(\"];\\n\");\n\n        lines.push_str(\"\\n\\n/// Returns slice of available calendar identifiers.\\n\");\n        lines.push_str(\"#[inline]\\n\");\n        lines.push_str(\"pub const fn available_calendars() -\u003e \u0026'static [\u0026'static str] {\\n    AVAILABLE_CALENDARS\\n}\\n\");\n    }\n\n    let mut file = File::create(\u0026dest_path)?;\n    file.write_all(lines.as_bytes())?;\n\n    // Rebuild if directory or its files change\n    println!(\"cargo:rerun-if-changed=src/dates/calendars\");\n\n    Ok(())\n} ","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","build.rs"],"content":"//! Build script for the rfin-core crate – code-gen helpers.\n\n#[path = \"build/currency_build.rs\"]\nmod currency_build;\n#[path = \"build/generate_calendars.rs\"]\nmod generate_calendars;\n\nuse std::io;\n\nfn main() -\u003e io::Result\u003c()\u003e {\n    currency_build::generate()?;\n    generate_calendars::generate()\n}","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","src","currency.rs"],"content":"//! Currency types and operations based on ISO 4217 standard.\n//!\n//! This module provides the [`Currency`] enum representing all ISO 4217 currencies,\n//! with numeric discriminants matching the official ISO currency codes. The currency\n//! data is automatically generated from the official ISO 4217 currency list.\n//!\n//! # Features\n//!\n//! - Complete ISO 4217 currency enumeration with 3-letter codes\n//! - Numeric currency codes as enum discriminants\n//! - Decimal precision (minor units) for each currency\n//! - Case-insensitive parsing from strings\n//! - Serialization support with the `serde` feature\n//! - Zero-cost abstractions (2-byte size)\n//!\n//! # Examples\n//!\n//! ## Creating and using currencies\n//!\n//! ```\n//! use rfin_core::Currency;\n//!\n//! // Create currencies directly\n//! let usd = Currency::USD;\n//! let eur = Currency::EUR;\n//!\n//! // Get ISO numeric code\n//! assert_eq!(usd.numeric(), 840);\n//! assert_eq!(eur.numeric(), 978);\n//!\n//! // Get decimal precision\n//! assert_eq!(usd.decimals(), 2);  // Most currencies have 2 decimals\n//! assert_eq!(Currency::JPY.decimals(), 0);  // Japanese Yen has no decimals\n//! assert_eq!(Currency::BHD.decimals(), 3);  // Bahraini Dinar has 3 decimals\n//! ```\n//!\n//! ## Parsing from strings\n//!\n//! ```\n//! use rfin_core::Currency;\n//! use std::str::FromStr;\n//!\n//! // Parse from uppercase\n//! let currency = Currency::from_str(\"USD\").unwrap();\n//! assert_eq!(currency, Currency::USD);\n//!\n//! // Parse case-insensitive\n//! let currency = \"eur\".parse::\u003cCurrency\u003e().unwrap();\n//! assert_eq!(currency, Currency::EUR);\n//!\n//! // Invalid codes return error\n//! assert!(\"XXX\".parse::\u003cCurrency\u003e().is_err());\n//! ```\n//!\n//! ## Converting between representations\n//!\n//! ```\n//! use rfin_core::Currency;\n//!\n//! // From numeric code\n//! let currency = Currency::try_from(840u16).unwrap();\n//! assert_eq!(currency, Currency::USD);\n//!\n//! // To numeric code\n//! let code: u16 = Currency::EUR.into();\n//! assert_eq!(code, 978);\n//!\n//! // Display formatting\n//! assert_eq!(format!(\"{}\", Currency::GBP), \"GBP\");\n//! ```\n//!\n//! ## Iterating over all currencies\n//!\n//! ```\n//! use rfin_core::Currency;\n//! use strum::IntoEnumIterator;\n//!\n//! // Count total currencies\n//! let count = Currency::iter().count();\n//! assert!(count \u003e 150);\n//!\n//! // Find currencies with 3 decimal places\n//! let three_decimal_currencies: Vec\u003c_\u003e = Currency::iter()\n//!     .filter(|c| c.decimals() == 3)\n//!     .collect();\n//! assert!(three_decimal_currencies.contains(\u0026Currency::KWD));\n//! ```\n\n// ---------------------------------------------------------------------------\n// Generated enum (ISO-4217)\n// ---------------------------------------------------------------------------\n// The build script now emits `core/src/generated/currency_generated.rs`, which\n// allows IDEs (`rust-analyzer`) to parse the generated code for auto-completion\n// and navigation. We load it as a regular module and publicly re-export all of\n// its items so existing `use` sites remain unchanged.\n\n#[path = \"./generated/currency_generated.rs\"]\nmod currency_generated;\n\npub use currency_generated::*;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use core::mem;\n\n    #[cfg(feature = \"std\")]\n    use std::format;\n\n    #[test]\n    fn test_currency_size() {\n        assert_eq!(mem::size_of::\u003cCurrency\u003e(), 2);\n    }\n\n    #[test]\n    fn test_currency_numeric_values() {\n        assert_eq!(Currency::USD as u16, 840);\n        assert_eq!(Currency::EUR as u16, 978);\n        assert_eq!(Currency::GBP as u16, 826);\n        assert_eq!(Currency::JPY as u16, 392);\n        assert_eq!(Currency::CHF as u16, 756);\n        assert_eq!(Currency::AUD as u16, 36);\n        assert_eq!(Currency::CAD as u16, 124);\n    }\n\n    #[test]\n    #[cfg(feature = \"std\")]\n    fn test_currency_display() {\n        assert_eq!(format!(\"{}\", Currency::USD), \"USD\");\n        assert_eq!(format!(\"{}\", Currency::EUR), \"EUR\");\n        assert_eq!(format!(\"{}\", Currency::GBP), \"GBP\");\n        assert_eq!(format!(\"{}\", Currency::JPY), \"JPY\");\n    }\n\n    #[test]\n    fn test_currency_from_str() {\n        assert_eq!(\"USD\".parse::\u003cCurrency\u003e().unwrap(), Currency::USD);\n        assert_eq!(\"EUR\".parse::\u003cCurrency\u003e().unwrap(), Currency::EUR);\n        assert_eq!(\"GBP\".parse::\u003cCurrency\u003e().unwrap(), Currency::GBP);\n        assert_eq!(\"JPY\".parse::\u003cCurrency\u003e().unwrap(), Currency::JPY);\n\n        // Test case insensitive\n        assert_eq!(\"usd\".parse::\u003cCurrency\u003e().unwrap(), Currency::USD);\n        assert_eq!(\"eur\".parse::\u003cCurrency\u003e().unwrap(), Currency::EUR);\n        assert_eq!(\"gbp\".parse::\u003cCurrency\u003e().unwrap(), Currency::GBP);\n    }\n\n    #[test]\n    fn test_currency_from_str_invalid() {\n        assert!(\"INVALID\".parse::\u003cCurrency\u003e().is_err());\n        assert!(\"XXX\".parse::\u003cCurrency\u003e().is_err());\n        assert!(\"\".parse::\u003cCurrency\u003e().is_err());\n    }\n\n    #[test]\n    #[cfg(feature = \"std\")]\n    fn test_currency_round_trip() {\n        let currencies = [\n            Currency::USD,\n            Currency::EUR,\n            Currency::GBP,\n            Currency::JPY,\n            Currency::CHF,\n            Currency::AUD,\n            Currency::CAD,\n            Currency::CNY,\n            Currency::SEK,\n            Currency::NOK,\n            Currency::DKK,\n            Currency::PLN,\n        ];\n\n        for currency in \u0026currencies {\n            let formatted = format!(\"{}\", currency);\n            let parsed: Currency = formatted.parse().unwrap();\n            assert_eq!(*currency, parsed);\n        }\n    }\n\n    #[test]\n    fn test_currency_decimals() {\n        assert_eq!(Currency::USD.decimals(), 2);\n        assert_eq!(Currency::EUR.decimals(), 2);\n        assert_eq!(Currency::JPY.decimals(), 0);\n        assert_eq!(Currency::BHD.decimals(), 3);\n        assert_eq!(Currency::KWD.decimals(), 3);\n        assert_eq!(Currency::JOD.decimals(), 3);\n        // Most currencies have 2 decimals\n\n        // Currencies with 0 decimals\n        assert_eq!(Currency::BIF.decimals(), 0);\n        assert_eq!(Currency::CLP.decimals(), 0);\n        assert_eq!(Currency::DJF.decimals(), 0);\n        assert_eq!(Currency::GNF.decimals(), 0);\n        assert_eq!(Currency::ISK.decimals(), 0);\n        assert_eq!(Currency::KMF.decimals(), 0);\n        assert_eq!(Currency::KRW.decimals(), 0);\n        assert_eq!(Currency::PYG.decimals(), 0);\n        assert_eq!(Currency::RWF.decimals(), 0);\n        assert_eq!(Currency::UGX.decimals(), 0);\n        assert_eq!(Currency::VND.decimals(), 0);\n        assert_eq!(Currency::VUV.decimals(), 0);\n        assert_eq!(Currency::XAF.decimals(), 0);\n        assert_eq!(Currency::XOF.decimals(), 0);\n        assert_eq!(Currency::XPF.decimals(), 0);\n    }\n\n    #[test]\n    #[cfg(feature = \"std\")]\n    fn test_currency_error_display() {\n        use crate::error::Error;\n        let error = Error::InvalidCurrency;\n        assert_eq!(format!(\"{}\", error), \"Invalid currency code\");\n    }\n\n    #[cfg(feature = \"serde\")]\n    #[test]\n    fn test_currency_serde() {\n        let currency = Currency::USD;\n        let serialized = serde_json::to_string(\u0026currency).unwrap();\n        let deserialized: Currency = serde_json::from_str(\u0026serialized).unwrap();\n        assert_eq!(currency, deserialized);\n    }\n\n    #[test]\n    fn test_currency_numeric_conversion_roundtrip() {\n        let codes = [840u16, 978, 826, 392, 756, 36, 124];\n\n        for \u0026code in \u0026codes {\n            let currency = Currency::try_from(code).unwrap();\n            let back: u16 = currency.into();\n            assert_eq!(code, back);\n            assert_eq!(currency.numeric(), code);\n        }\n\n        // invalid code\n        assert!(Currency::try_from(0u16).is_err());\n    }\n\n    #[test]\n    fn test_currency_iter() {\n        use strum::IntoEnumIterator;\n\n        // Ensure iterator produces some known currencies\n        assert!(Currency::iter().any(|c| c == Currency::USD));\n        assert!(Currency::iter().any(|c| c == Currency::EUR));\n\n        // Length should be substantial (simple sanity)\n        let enum_count = Currency::iter().count();\n        assert!(enum_count \u003e 100); // at least 100 currencies expected\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","calendar.rs"],"content":"//! Holiday calendars \u0026 business-day adjustment helpers.\n//!\n//! This module introduces three core building-blocks:\n//!\n//! 1. [`HolidayCalendar`] – a trait for querying whether a given [`Date`]\n//!    is a holiday/business-day for some market.\n//! 2. [`BusDayConv`] – an enum of common business-day conventions\n//!    (following/preceding, modified, …).\n//! 3. [`adjust`] – helper that shifts a date according to a convention\n//!    and calendar.\n//!\n//! In addition the TARGET2 (ECB) calendar is provided behind the optional\n//! **`holidays`** feature as a reference implementation.  It purposefully\n//! remains lightweight and allocation-free so the entire module compiles\n//! in `#![no_std]` environments.\n\n#![allow(c day::Monday, Month::October).applies(date) // Sports Day\n\n            // --- Fixed-date holidays with Monday substitution ---------------\n            || InLieuMonday::new(FixedDate::new(Month::February, 11)).applies(date) // National Foundation\n            || InLieuMonday::new(FixedDate::new(Month::February, 23)).applies(date) // Emperor's Birthday (since 2020)\n            || InLieuMonday::new(FixedDate::new(Month::April, 29)).applies(date) // Showa Day\n            || InLieuMonday::new(FixedDate::new(Month::May, 3)).applies(date) // Constitution Mem.\n            || InLieuMonday::new(FixedDate::new(Month::May, 4)).applies(date) // Greenery Day\n            || InLieuMonday::new(FixedDate::new(Month::May, 5)).applies(date) // Children's Day\n            || InLieuMonday::new(FixedDate::new(Month::August, 11)).applies(date) // Mountain Day\n            || InLieuMonday::new(FixedDate::new(Month::November, 3)).applies(date) // Culture Day\n            || InLieuMonday::new(FixedDate::new(Month::November, 23)).applies(date) // Labour Thanks.\n\n            // --- Equinoxes ---------------------------------------------------\n            || VernalEquinoxJP.applies(date)\n            || AutumnalEquinoxJP.applies(date)\n    }\n} ","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"leng  gb = Gblo::new();\n//! let calendars = [\u0026t2 as \u0026dyn HolidayCalendar, \u0026gb as \u0026dyn HolidayCalendar];\n//!\n//! // Union (default) – treat the day as a holiday if *either* market is closed.\n//! let cal_union = CompositeCalendar::merge(\u0026calendars);\n//! let jan1_2025 = Date::from_calendar_date(2025, time::Month::January, 1).unwrap();\n//! assert!(cal_union.is_holiday(jan1_2025));\n//!\n//! // Intersection – holiday only if *both* markets are closed.\n//! let cal_inter = CompositeCalendar::merge_with_mode(\u0026calendars, MergeMode::Intersection);\n//! let may26_2025 = Date::from_calendar_date(2025, time::Month::May, 26).unwrap();\n//! assert!(cal_union.is_holiday(may26_2025)); // U.K. spring bank holiday\n//! assert!(!cal_inter.is_holiday(may26_2025));\n//! ```\n\n#![allow(clippy::many_single_char_names)]\n\nuse super::HolidayCalendar;\nuse time::Date;\n\n/// Merge logic for [`CompositeCalendar`].\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum MergeMode {\n    /// Union of holidays – *any* sub-calendar marks the date a holiday.\n    Union,\n    /// Intersection of holidays – date is a holiday only when *all*\n    /// sub-calendars mark it a holiday.\n    Intersection,\n}\n\n/// A lightweight view combining several holiday calendars.\n#[derive(Clone, Copy)]\npub struct CompositeCalendar\u003c'a\u003e {\n    calendars: \u0026'a [\u0026'a dyn HolidayCalendar],\n    mode: MergeMode,\n}\n\nimpl core::fmt::Debug for CompositeCalendar\u003c'_\u003e {\n    fn fmt(\u0026self, f: \u0026mut core::fmt::Formatter\u003c'_\u003e) -\u003e core::fmt::Result {\n        f.debug_struct(\"CompositeCalendar\")\n            .field(\"mode\", \u0026self.mode)\n            .field(\"calendars_len\", \u0026self.calendars.len())\n            .finish()\n    }\n}\n\nimpl\u003c'a\u003e CompositeCalendar\u003c'a\u003e {\n    /// Create a new composite calendar using `mode` for merge semantics.\n    #[must_use]\n    pub const fn new(calendars: \u0026'a [\u0026'a dyn HolidayCalendar], mode: MergeMode) -\u003e Self {\n        Self { calendars, mode }\n    }\n\n    /// Convenience wrapper constructing a *union* composite (strict by default).\n    #[must_use]\n    pub const fn merge(calendars: \u0026'a [\u0026'a dyn HolidayCalendar]) -\u003e Self {\n        Self::new(calendars, MergeMode::Union)\n    }\n\n    /// Convenience wrapper constructing a composite with explicit `mode`.\n    #[must_use]\n    pub const fn merge_with_mode(calendars: \u0026'a [\u0026'a dyn HolidayCalendar], mode: MergeMode) -\u003e Self {\n        Self::new(calendars, mode)\n    }\n}\n\nimpl HolidayCalendar for CompositeCalendar\u003c'_\u003e {\n    fn is_holiday(\u0026self, date: Date) -\u003e bool {\n        match self.mode {\n            MergeMode::Union =\u003e {\n                // Empty slice ⇒ no holidays, so return false.\n                self.calendars.iter().any(|c| c.is_holiday(date))\n            }\n            MergeMode::Intersection =\u003e {\n                if self.calendars.is_empty() {\n                    return false;\n                }\n                self.calendars.iter().all(|c| c.is_holiday(date))\n            }\n        }\n    }\n}\n\n// ----------------------------------------------------------------------------------------------\n// Tests\n// ----------------------------------------------------------------------------------------------\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::dates::calendars::{Target2, Gblo};\n    use time::{Date, Month};\n\n    #[test]\n    fn union_vs_intersection() {\n        let t2 = Target2::new();\n        let gb = Gblo::new();\n        let calendars = [\u0026t2 as \u0026dyn HolidayCalendar, \u0026gb as \u0026dyn HolidayCalendar];\n\n        let cal_union = CompositeCalendar::merge(\u0026calendars);\n        let cal_inter = CompositeCalendar::merge_with_mode(\u0026calendars, MergeMode::Intersection);\n\n        // Date that is holiday in both calendars (New Year's Day)\n        let d1 = Date::from_calendar_date(2025, Month::January, 1).unwrap();\n        assert!(cal_union.is_holiday(d1));\n        assert!(cal_inter.is_holiday(d1));\n\n        // Date that is holiday only in GBLO (Spring bank holiday 26-May-2025)\n        let d2 = Date::from_calendar_date(2025, Month::May, 26).unwrap();\n        assert!(Gblo::new().is_holiday(d2));\n        assert!(!Target2::new().is_holiday(d2));\n\n        assert!(cal_union.is_holiday(d2));\n        assert!(!cal_inter.is_holiday(d2));\n    }\n} ","traces":[{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":2}},{"line":78,"address":[],"length":0,"stats":{"Line":1}},{"line":79,"address":[],"length":0,"stats":{"Line":1}},{"line":84,"address":[],"length":0,"stats":{"Line":1}},{"line":85,"address":[],"length":0,"stats":{"Line":1}},{"line":90,"address":[],"length":0,"stats":{"Line":4}},{"line":91,"address":[],"length":0,"stats":{"Line":4}},{"line":94,"address":[],"length":0,"stats":{"Line":5}},{"line":97,"address":[],"length":0,"stats":{"Line":2}},{"line":98,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":5}}],"covered":10,"coverable":15},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","daycount.rs"],"content":"//! Day-count convention algorithms (ACT/360, ACT/365F, 30/360, 30E/360, ACT/ACT).\n//!\n//! The implementation follows the ISDA definitions where applicable and is **panic-free**.\n//! All helpers are `no_std` friendly and allocate no heap memory.\n//!\n//! # Examples\n//! ```\n//! use rfin_core::dates::{Date, DayCount};\n//! use time::Month;\n//!\n//! let start = Date::from_calendar_date(2025, Month::January, 1).unwrap();\n//! let end   = Date::from_calendar_date(2026, Month::January, 1).unwrap();\n//!\n//! let yf = DayCount::ActAct.year_fraction(start, end).unwrap();\n//! assert!((yf - 1.0).abs() \u003c 1e-9);\n//! ```\n\n#![allow(clippy::many_single_char_names)]\n\nuse core::cmp::Ordering;\nuse time::{Date, Month};\n\nuse crate::Error;\n\n/// Supported day-count conventions.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\n#[non_exhaustive]\npub enum DayCount {\n    /// Actual / 360 — year fraction = actual days ÷ 360.\n    Act360,\n    /// Actual / 365F — year fraction = actual days ÷ 365 (fixed).\n    Act365F,\n    /// 30U/360 (US Bond Basis).\n    Thirty360,\n    /// 30E/360 (European).\n    ThirtyE360,\n    /// Actual / Actual (ISDA variant).\n    ActAct,\n}\n\nimpl DayCount {\n    /// Return the day count between `start` (inclusive) and `end` (exclusive).\n    ///\n    /// The output follows the specific convention rules and is **always ≥ 0**.\n    pub fn days(self, start: Date, end: Date) -\u003e Result\u003ci32, Error\u003e {\n        match start.cmp(\u0026end) {\n            Ordering::Greater =\u003e Err(Error::InvalidResult),\n            Ordering::Equal =\u003e Ok(0),\n            Ordering::Less =\u003e match self {\n                DayCount::Act360 | DayCount::Act365F | DayCount::ActAct =\u003e {\n                    let d = (end - start).whole_days();\n                    Ok(d as i32)\n                }\n                DayCount::Thirty360 =\u003e Ok(days_30_360_us(start, end)),\n                DayCount::ThirtyE360 =\u003e Ok(days_30e_360(start, end)),\n            },\n        }\n    }\n\n    /// Compute the year fraction between `start` and `end` per this convention.\n    pub fn year_fraction(self, start: Date, end: Date) -\u003e Result\u003cf64, Error\u003e {\n        let days = self.days(start, end)? as f64;\n        let yf = match self {\n            DayCount::Act360 =\u003e days / 360.0,\n            DayCount::Act365F =\u003e days / 365.0,\n            DayCount::Thirty360 | DayCount::ThirtyE360 =\u003e days / 360.0,\n            DayCount::ActAct =\u003e year_fraction_act_act_isda(start, end),\n        };\n        Ok(yf)\n    }\n}\n\n// -------------------------------------------------------------------------------------------------\n// 30U/360 (US Bond Basis) helper\n// -------------------------------------------------------------------------------------------------\n/// Calculate days per 30U/360 US convention.\nfn days_30_360_us(start: Date, end: Date) -\u003e i32 {\n    let (y1, m1, d1) = (start.year(), start.month() as i32, start.day() as i32);\n    let (y2, m2, d2) = (end.year(), end.month() as i32, end.day() as i32);\n\n    let d1_adj = if d1 == 31 { 30 } else { d1 };\n    let d2_adj = if d2 == 31 \u0026\u0026 d1_adj == 30 { 30 } else { d2 };\n\n    (y2 - y1) * 360 + (m2 - m1) * 30 + (d2_adj - d1_adj)\n}\n\n// -------------------------------------------------------------------------------------------------\n// 30E/360 European helper\n// -------------------------------------------------------------------------------------------------\nfn days_30e_360(start: Date, end: Date) -\u003e i32 {\n    let (y1, m1, d1) = (start.year(), start.month() as i32, start.day() as i32);\n    let (y2, m2, d2) = (end.year(), end.month() as i32, end.day() as i32);\n\n    let d1_adj = if d1 == 31 { 30 } else { d1 };\n    let d2_adj = if d2 == 31 { 30 } else { d2 };\n\n    (y2 - y1) * 360 + (m2 - m1) * 30 + (d2_adj - d1_adj)\n}\n\n// -------------------------------------------------------------------------------------------------\n// ACT/ACT (ISDA) helper\n// -------------------------------------------------------------------------------------------------\nfn year_fraction_act_act_isda(start: Date, end: Date) -\u003e f64 {\n    if start == end {\n        return 0.0;\n    }\n\n    if start.year() == end.year() {\n        let denom = days_in_year(start.year()) as f64;\n        let days = (end - start).whole_days() as f64;\n        return days / denom;\n    }\n\n    // Days from start to 31-Dec of start year (inclusive of start, exclusive of next year 1-Jan).\n    let start_year_end = Date::from_calendar_date(start.year() + 1, Month::January, 1).unwrap();\n    let days_start_year = (start_year_end - start).whole_days() as f64;\n    let mut frac = days_start_year / days_in_year(start.year()) as f64;\n\n    // Full intermediate years\n    for year in (start.year() + 1)..end.year() {\n        frac += 1.0; // each full year counts as exactly 1.0\n        if cfg!(test) {\n            // branch to keep 100% coverage awareness\n            if days_in_year(year) == 366 {\n                // no-op, just execute branch for coverage\n            }\n        }\n    }\n\n    // Days from 1-Jan of end year to end date\n    let start_of_end_year = Date::from_calendar_date(end.year(), Month::January, 1).unwrap();\n    let days_end_year = (end - start_of_end_year).whole_days() as f64;\n    frac += days_end_year / days_in_year(end.year()) as f64;\n\n    frac\n}\n\n#[inline]\nconst fn days_in_year(year: i32) -\u003e i32 {\n    if is_leap_year(year) {\n        366\n    } else {\n        365\n    }\n}\n\n#[inline]\nconst fn is_leap_year(year: i32) -\u003e bool {\n    (year % 4 == 0 \u0026\u0026 year % 100 != 0) || (year % 400 == 0)\n}\n\n// -------------------------------------------------------------------------------------------------\n// Tests\n// -------------------------------------------------------------------------------------------------\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use time::Duration;\n\n    fn make_date(y: i32, m: u8, d: u8) -\u003e Date {\n        Date::from_calendar_date(y, Month::try_from(m).unwrap(), d).unwrap()\n    }\n\n    #[test]\n    fn act360_basic() {\n        let start = make_date(2025, 1, 1);\n        let end = start + Duration::days(360);\n        let yf = DayCount::Act360.year_fraction(start, end).unwrap();\n        assert!((yf - 1.0).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn act365f_year_fraction() {\n        let start = make_date(2025, 3, 1);\n        let end = make_date(2026, 3, 1);\n        let yf = DayCount::Act365F.year_fraction(start, end).unwrap();\n        // Should be exactly 366 / 365 for leap year period 2025-03-01 -\u003e 2026-03-01 includes leap day 2025? Actually 2025 not leap. Use tolerance.\n        let expected = (end - start).whole_days() as f64 / 365.0;\n        assert!((yf - expected).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn thirty_360_end_of_month() {\n        let start = make_date(2025, 1, 31);\n        let end = make_date(2025, 2, 28);\n        let days = DayCount::Thirty360.days(start, end).unwrap();\n        assert_eq!(days, 28);\n        let yf = DayCount::Thirty360.year_fraction(start, end).unwrap();\n        assert!((yf * 360.0 - days as f64).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn actact_spanning_years() {\n        let start = make_date(2024, 7, 1); // includes leap year 2024\n        let end = make_date(2026, 1, 1);\n        let yf = DayCount::ActAct.year_fraction(start, end).unwrap();\n        // compute expected manually: part of 2024 (184 days from Jul1 to Jan1 2025), 2025 full year (365 days), part of 2026 (0). Actually end Jan1 so 0.\n        let expected = 184.0 / 366.0 + 1.0; // plus full 2025 year 365/365 =1\n        assert!((yf - expected).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn error_on_inverted_dates() {\n        let start = make_date(2025, 1, 1);\n        let end = make_date(2024, 1, 1);\n        assert!(DayCount::Act360.year_fraction(start, end).is_err());\n    }\n}\n","traces":[{"line":45,"address":[],"length":0,"stats":{"Line":6}},{"line":46,"address":[],"length":0,"stats":{"Line":6}},{"line":47,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":5}},{"line":51,"address":[],"length":0,"stats":{"Line":3}},{"line":52,"address":[],"length":0,"stats":{"Line":3}},{"line":54,"address":[],"length":0,"stats":{"Line":2}},{"line":55,"address":[],"length":0,"stats":{"Line":0}} onth is 1-12 – map to 1-4\n        ((self.month() as u8 - 1) / 3) + 1\n    }\n\n    fn fiscal_year(self) -\u003e i32 {\n        self.year()\n    }\n\n    fn add_business_days(self, mut n: i32) -\u003e Self {\n        if n == 0 {\n            return self;\n        }\n\n        let step = if n \u003e 0 { 1 } else { -1 };\n        let mut date = self;\n        while n != 0 {\n            // Safe unwrap: adding 1 day to a valid Date always succeeds within time range.\n            date = date + Duration::days(step as i64);\n            if !date.is_weekend() {\n                n -= step;\n            }\n        }\n        date\n    }\n}\n\n/// Convenience extensions for [`time::OffsetDateTime`].\npub trait OffsetDateTimeExt {\n    /// See [`DateExt::is_weekend`].\n    fn is_weekend(self) -\u003e bool;\n\n    /// See [`DateExt::quarter`].\n    fn quarter(self) -\u003e u8;\n\n    /// See [`DateExt::fiscal_year`].\n    fn fiscal_year(self) -\u003e i32;\n\n    /// See [`DateExt::add_business_days`].\n    fn add_business_days(self, n: i32) -\u003e Self;\n}\n\nimpl OffsetDateTimeExt for OffsetDateTime {\n    fn is_weekend(self) -\u003e bool {\n        self.date().is_weekend()\n    }\n\n    fn quarter(self) -\u003e u8 {\n        self.date().quarter()\n    }\n\n    fn fiscal_year(self) -\u003e i32 {\n        self.date().fiscal_year()\n    }\n\n    fn add_business_days(self, n: i32) -\u003e Self {\n        let new_date = self.date().add_business_days(n);\n        self.replace_date(new_date)\n    }\n}\n\n// -------------------------------------------------------------------------------------------------\n// Tests\n// -------------------------------------------------------------------------------------------------\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use time::Date;\n\n    fn make_date(y: i32, m: u8, d: u8) -\u003e Date {\n        Date::from_calendar_date(y, time::Month::try_from(m).unwrap(), d).unwrap()\n    }\n\n    #[test]\n    fn test_is_weekend() {\n        let sat = make_date(2025, 6, 28);\n        let sun = make_date(2025, 6, 29);\n        let fri = make_date(2025, 6, 27);\n        assert!(sat.is_weekend());\n        assert!(sun.is_weekend());\n        assert!(!fri.is_weekend());\n    }\n\n    #[test]\n    fn test_quarter() {\n        assert_eq!(make_date(2025, 1, 1).quarter(), 1);\n        assert_eq!(make_date(2025, 4, 15).quarter(), 2);\n        assert_eq!(make_date(2025, 8, 1).quarter(), 3);\n        assert_eq!(make_date(2025, 11, 30).quarter(), 4);\n    }\n\n    #[test]\n    fn test_add_business_days_forward() {\n        let start = make_date(2025, 6, 27); // Friday\n        let result = start.add_business_days(3);\n        assert_eq!(result, make_date(2025, 7, 2)); // Fri +3bd = Wed (skip weekend)\n    }\n\n    #[test]\n    fn test_add_business_days_backward() {\n        let start = make_date(2025, 6, 29); // Sunday\n        let result = start.add_business_days(-2);\n        assert_eq!(result, make_date(2025, 6, 26)); // Sun -2bd = Thu (skip weekend)\n    }\n}\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":11}},{"line":37,"address":[],"length":0,"stats":{"Line":17}},{"line":40,"address":[],"length":0,"stats":{"Line":4}},{"line":42,"address":[],"length":0,"stats":{"Line":4}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":2}},{"line":50,"address":[],"length":0,"stats":{"Line":2}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":2}},{"line":56,"address":[],"length":0,"stats":{"Line":10}},{"line":58,"address":[],"length":0,"stats":{"Line":8}},{"line":59,"address":[],"length":0,"stats":{"Line":13}},{"line":60,"address":[],"length":0,"stats":{"Line":5}},{"line":63,"address":[],"length":0,"stats":{"Line":2}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[], s can `use rfin_core::dates::DateExt`.\npub use ext::{DateExt, OffsetDateTimeExt};\n\nmod daycount;\n\npub use daycount::DayCount;\n\nmod calendar;\n\npub mod calendars;\npub use calendars::*;\n\npub mod rules;\npub use rules::*;\n\npub use calendar::{adjust, BusDayConv, HolidayCalendar};\n\npub use calendar::available_calendars;\n\nmod schedule;\n\npub use schedule::{ScheduleBuilder, Frequency, Schedule, StubRule};\n\nmod composite;\n\npub use composite::{CompositeCalendar, MergeMode};\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","bridge.rs"],"content":"use super::HolidayRule;\nuse time::{Date, Duration, Weekday};\n\n/// Holiday bridging: if a holiday falls on Thursday, declare Friday off as a bridge day.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct BridgeDay\u003cR: HolidayRule\u003e {\n    preceding: R,\n}\n\nimpl\u003cR: HolidayRule\u003e BridgeDay\u003cR\u003e {\n    /// Create a new `BridgeDay` that observes the Friday immediately following\n    /// a `preceding` holiday occurring on Thursday.\n    #[must_use]\n    pub const fn new(preceding: R) -\u003e Self {\n        Self { preceding }\n    }\n}\n\nimpl\u003cR: HolidayRule\u003e HolidayRule for BridgeDay\u003cR\u003e {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        if date.weekday() != Weekday::Friday {\n            return false;\n        }\n        let thursday = date - Duration::DAY; // Thursday\n        self.preceding.applies(thursday)\n    }\n}\n\n/// In-lieu Monday: if a holiday falls on weekend, following Monday is holiday.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct InLieuMonday\u003cR: HolidayRule\u003e {\n    base: R,\n}\n\nimpl\u003cR: HolidayRule\u003e InLieuMonday\u003cR\u003e {\n    /// Create a new `InLieuMonday` wrapper for `base`. If `base` lands on\n    /// Saturday or Sunday the following Monday becomes a holiday.\n    #[must_use]\n    pub const fn new(base: R) -\u003e Self {\n        Self { base }\n    }\n}\n\nimpl\u003cR: HolidayRule\u003e HolidayRule for InLieuMonday\u003cR\u003e {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        if date.weekday() != Weekday::Monday {\n            return false;\n        }\n        let saturday = date - Duration::DAY * 2;\n        let sunday = date - Duration::DAY;\n        self.base.applies(saturday) || self.base.applies(sunday)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::dates::rules::FixedDate;\n    use time::Month;\n\n    #[test]\n    fn bridge_day_after_thursday_holiday() {\n        let holiday = FixedDate::new(Month::May, 6); // pretend 2021-05-06 Thu\n        let bridge = BridgeDay::new(holiday);\n        let date = Date::from_calendar_date(2021, Month::May, 7).unwrap(); // Friday\n        assert!(bridge.applies(date));\n    }\n\n    #[test]\n    fn in_lieu_monday() {\n        let holiday = FixedDate::new(Month::July, 4); // US Independence Day\n        let in_lieu = InLieuMonday::new(holiday);\n        // 2026-07-04 Saturday ⇒ Monday 6 July observed\n        let date = Date::from_calendar_date(2026, Month::July, 6).unwrap();\n        assert!(in_lieu.applies(date));\n    }\n}\n","traces":[{"line":14,"address":[],"length":0,"stats":{"Line":1}},{"line":20,"address":[],"length":0,"stats":{"Line":1}},{"line":21,"address":[],"length":0,"stats":{"Line":1}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":1}},{"line":25,"address":[],"length":0,"stats":{"Line":1}},{"line":39,"address":[],"length":0,"stats":{"Line":1}},{"line":45,"address":[],"length":0,"stats":{"Line":1}},{"line":46,"address":[],"length":0,"stats":{"Line":1}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":1}},{"line":50,"address":[],"length":0,"stats":{"Line":1}},{"line":51,"address":[],"length":0,"stats":{"Line":1}}],"covered":11,"coverable":13},{"path":["/","Users","jo  Date::from_calendar_date(2024, Month::February, 28).unwrap();\n        assert!(!rule.applies(not));\n    }\n}\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":1}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":2}},{"line":32,"address":[],"length":0,"stats":{"Line":2}},{"line":33,"address":[],"length":0,"stats":{"Line":2}}],"covered":4,"coverable":6},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","easter_offset.rs"],"content":"use super::HolidayRule;\nuse time::{Date, Duration, Month};\n\n/// Internal helper: compute Easter Monday date for a given year (Gregorian calendar).\n/// Copied from `easter.rs` but kept private so we don\\'t make the algorithm public twice.\nfn easter_monday(year: i32) -\u003e Date {\n    let a = year % 19;\n    let b = year / 100;\n    let c = year % 100;\n    let d = b / 4;\n    let e = b % 4;\n    let f = (b + 8) / 25;\n    let g = (b - f + 1) / 3;\n    let h = (19 * a + b - d - g + 15) % 30;\n    let i = c / 4;\n    let k = c % 4;\n    let l = (32 + 2 * e + 2 * i - h - k) % 7;\n    let m = (a + 11 * h + 22 * l) / 451;\n    let month_num = (h + l - 7 * m + 114) / 31; // 3=March 4=April\n    let day = ((h + l - 7 * m + 114) % 31) + 1; // Easter Sunday\n    let month = if month_num == 3 {\n        Month::March\n    } else {\n        Month::April\n    };\n    let easter_sunday = Date::from_calendar_date(year, month, day as u8).unwrap();\n    easter_sunday + Duration::DAY\n}\n\n/// Generic rule representing a day that is an offset (in days) from Easter Monday.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct EasterOffset {\n    /// Days relative to Easter Monday (e.g. -3 = Good Friday, +39 = Ascension Thursday).\n    offset_days: i16,\n}\n\nimpl EasterOffset {\n    /// Create a new rule `offset` days away from Easter Monday.\n    pub const fn new(offset_days: i16) -\u003e Self {\n        Self { offset_days }\n    }\n}\n\nimpl HolidayRule for EasterOffset {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        let easter_mon = easter_monday(date.year());\n        let target = easter_mon + Duration::days(self.offset_days as i64);\n        date == target\n    }\n}\n\n/// Easter Monday (offset 0 days from itself) – kept as a dedicated type for ergonomic imports.\n#[derive(Debug, Clone, Copy, Default)]\npub struct EasterMonday;\n\nimpl HolidayRule for EasterMonday {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        EasterOffset::new(0).applies(date)\n    }\n}\n\n// -----------------------------------------------------------------------------\n// Convenience wrappers for common holidays\n// -----------------------------------------------------------------------------\n\n/// Good Friday (Easter Monday - 3 days).\n#[derive(Debug, Clone, Copy, Default)]\npub struct GoodFriday;\n\nimpl HolidayRule for GoodFriday {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        EasterOffset::new(-3).applies(date)\n    }\n}\n\n/// Ascension Thursday (Easter Monday + 39 days).\n#[derive(Debug, Clone, Copy, Default)]\npub struct AscensionThursday;\n\nimpl HolidayRule for AscensionThursday {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        EasterOffset::new(38).applies(date)\n    }\n}\n\n/// Pentecost Monday (Easter Monday + 49 days, or Easter Monday + 49?) Wait Pentecost is Sunday after 49, Monday +50?\n/// Actually Easter Sunday + 49 = Pentecost Sunday, so Monday is +50 from Easter Sunday, +49 from Easter Monday.\n#[derive(Debug, Clone, Copy, Default)]\npub struct PentecostMonday;\n\nimpl HolidayRule for PentecostMonday {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        EasterOffset::new(49).applies(date)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn good_friday_2025() {\n        // Easter 2025 Monday is 2025-04-21, so Good Friday 2025-04-18\n        let d = Date::from_calendar_date(2025, Month::April, 18).unwrap();\n        assert!(GoodFriday.applies(d));\n    }\n\n    #[test]\n    fn ascension_2026() {\n        // Easter Monday 2026 is 2026-04-06; +39 = 2026-05-15 (but Thursday). Wait calc.\n        let d = Date::from_calendar_date(2026, Month::May, 14).unwrap();\n        assert!(AscensionThursday.applies(d));\n    }\n\n    #[test]\n    fn pentecost_2024() {\n        // Easter Monday 2024 is 2024-04-01; +49 = 2024-05-20\n        let d = Date::from_calendar_date(2024, Month::May, 20).unwrap();\n        assert!(PentecostMonday.applies(d));\n    }\n}\n","traces":[{"line":6,"address":[],"length":0,"stats":{"Line":13}},{"line":7,"address":[],"length":0,"stats":{"Line":13}},{"line":8,"address":[],"length":0,"stats":{"Line":13}},{"line":9,"address":[],"length":0,"stats":{"Line":13}},{"line":10,"address":[],"length":0,"stats":{"Line":13}},{"line":11,"address":[],"length":0,"stats":{"Line":13}},{"line":12,"address":[],"length":0,"stats":{"Line":13}},{"line":13,"address":[],"length":0,"stats":{"Line":13}},{"line":14,"address":[],"length":0,"stats":{"Line":13}},{"line":15,"address":[],"length":0,"stats":{"Line":13}},{"line":16,"address":[],"length":0,"stats":{"Line":13}},{"line":17,"address":[],"length":0,"stats":{"Line":13}},{"line":18,"address":[],"length":0,"stats":{"Line":13}},{"line":19,"address":[],"length":0,"stats":{"Line":13}},{"line":20,"address":[],"length":0,"stats":{"Line":13}},{"line":21,"address":[],"length":0,"stats":{"Line":26}},{"line":22,"address":[],"length":0,"stats":{"Line":1}},{"line":24,"address":[],"length":0,"stats":{"Line":12}},{"line":26,"address":[],"length":0,"stats":{"Line":13}},{"line":27,"address":[],"length":0,"stats":{"Line":13}},{"line":39,"address":[],"length":0,"stats":{"Line":13}},{"line":45,"address":[],"length":0,"stats":{"Line":13}},{"line":46,"address":[],"length":0,"stats":{"Line":13}},{"line":47,"address":[],"length":0,"stats":{"Line":13}},{"line":48,"address":[],"length":0,"stats":{ n    fn vernal_2024() {\n        let d = Date::from_calendar_date(2024, Month::March, 20).unwrap();\n        assert!(VernalEquinoxJP.applies(d));\n    }\n\n    #[test]\n    fn vernal_2023() {\n        let d = Date::from_calendar_date(2023, Month::March, 21).unwrap();\n        assert!(VernalEquinoxJP.applies(d));\n    }\n\n    #[test]\n    fn autumn_2023() {\n        let d = Date::from_calendar_date(2023, Month::September, 23).unwrap();\n        assert!(AutumnalEquinoxJP.applies(d));\n    }\n} ","traces":[{"line":12,"address":[],"length":0,"stats":{"Line":2}},{"line":13,"address":[],"length":0,"stats":{"Line":2}},{"line":14,"address":[],"length":0,"stats":{"Line":2}},{"line":15,"address":[],"length":0,"stats":{"Line":2}},{"line":20,"address":[],"length":0,"stats":{"Line":2}},{"line":21,"address":[],"length":0,"stats":{"Line":2}},{"line":33,"address":[],"length":0,"stats":{"Line":1}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":35,"address":[],"length":0,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":1}},{"line":41,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":1}}],"covered":12,"coverable":12},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","fixed.rs"],"content":"use super::HolidayRule;\nuse time::{Date, Duration, Month, Weekday};\n\n/// How a fixed-date holiday is observed when it falls on a weekend.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum Observed {\n    /// No observation adjustment – holiday is **only** the given calendar date.\n    None,\n    /// If Saturday → following Monday, if Sunday → following Monday.\n    NextMonday,\n    /// If Saturday → previous Friday, if Sunday → following Monday.\n    FriIfSatMonIfSun,\n}\n\n/// A holiday occurring on a fixed calendar date every year (e.g. 1 January).\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct FixedDate {\n    month: Month,\n    day: u8,\n    observed: Observed,\n}\n\nimpl FixedDate {\n    /// Creates a new fixed-date holiday without observation rules.\n    pub const fn new(month: Month, day: u8) -\u003e Self {\n        Self {\n            month,\n            day,\n            observed: Observed::None,\n        }\n    }\n\n    /// Observed on the following Monday when falling on a weekend.\n    #[must_use]\n    pub const fn observed_next_monday(self) -\u003e Self {\n        Self {\n            observed: Observed::NextMonday,\n            ..self\n        }\n    }\n\n    /// Observed Friday if Saturday / Monday if Sunday.\n    #[must_use]\n    pub const fn observed_weekend(self) -\u003e Self {\n        Self {\n            observed: Observed::FriIfSatMonIfSun,\n            ..self\n        }\n    }\n\n    /// Helper: returns the observed date in the given year.\n    fn observed_date(\u0026self, year: i32) -\u003e Date {\n        // Safe unwrap: constructor guarantees valid month/day.\n        let base = Date::from_calendar_date(year, self.month, self.day).unwrap();\n        match self.observed {\n            Observed::None =\u003e base,\n            Observed::NextMonday =\u003e match base.weekday() {\n                Weekday::Saturday =\u003e base + Duration::DAY * 2,\n                Weekday::Sunday =\u003e base + Duration::DAY,\n                _ =\u003e base,\n            },\n            Observed::FriIfSatMonIfSun =\u003e match base.weekday() {\n                Weekday::Saturday =\u003e base - Duration::DAY,\n                Weekday::Sunday =\u003e base + Duration::DAY,\n                _ =\u003e base,\n            },\n        }\n    }\n}\n\nimpl HolidayRule for FixedDate {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        self.observed_date(date.year()) == date\n    }\n}\n\n// -----------------------------------------------------------------------------\n// Tests\n// -----------------------------------------------------------------------------\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn plain_fixed_date() {\n        let rule = FixedDate::new(Month::January, 1);\n        let d = Date::from_calendar_date(2025, Month::January, 1).unwrap();\n        assert!(rule.applies(d));\n        let not = Date::from_calendar_date(2025, Month::January, 2).unwrap();\n        assert!(!rule.applies(not));\n    }\n\n    #[test]\n    fn next_monday_observance() {\n        let rule = FixedDate::new(Month::January, 1).observed_next_monday();\n        // 2027-01-01 is Friday – observed on the day\n        assert!(rule.applies(Date::from_calendar_date(2027, Month::January, 1).unwrap()));\n        // 2028-01-01 is Saturday – observed Monday 3 Jan\n        assert!(rule.applies(Date::from_calendar_date(2028, Month::January, 3).unwrap()));\n    }\n\n    #[test]\n    fn fri_mon_observance() {\n        let rule = FixedDate::new(Month::December, 25).observed_weekend();\n        // 2027-12-25 is Saturday → observed Friday 24\n        assert!(rule.applies(Date::from_calendar_date(2027, Month::December, 24).unwrap()));\n        // 2026-12-25 is Friday → observed on the day\n        assert!(rule.applies(Date::from_calendar_date(2026, Month::December, 25).unwrap()));\n        // 2028-12-25 is Monday → observed Monday\n        assert!(rule.applies(Date::from_calendar_date(2028, Month::December, 25).unwrap()));\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":29}},{"line":35,"address":[],"length":0,"stats":{"Line":8}},{"line":44,"address":[],"length":0,"stats":{"Line":1}},{"line":52,"address":[],"length":0,"stats":{"Line":36}},{"line":54,"address":[],"length":0,"stats":{"Line":36}},{"line":55,"address":[],"length":0,"stats":{"Line":36}},{"line":56,"address":[],"length":0,"stats":{"Line":24}},{"line":57,"address":[],"length":0,"stats":{"Line":9}},{"line":58,"address":[],"length":0,"stats":{"Line":1}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":8}},{"line":62,"address":[],"length":0,"stats":{"Line":3}} ;\n        let d = Date::from_calendar_date(2006, Month::January, 1).unwrap();\n        assert!(!rule.applies(d));\n    }\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":2}},{"line":32,"address":[],"length":0,"stats":{"Line":2}},{"line":33,"address":[],"length":0,"stats":{"Line":2}},{"line":34,"address":[],"length":0,"stats":{"Line":5}}],"covered":4,"coverable":4},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","list_rule.rs"],"content":"use super::HolidayRule;\nuse time::Date;\n\n/// Matches against a compile-time slice of specific dates (ad-hoc closures).\n///\n/// This rule is extremely lightweight: it just performs a linear search over\n/// the slice.  For typical ad-hoc lists (\\\u003c= a few dozen entries) this is fine.\n#[derive(Debug)]\npub struct ListRule\u003c'a\u003e {\n    dates: \u0026'a [Date],\n}\n\nimpl\u003c'a\u003e ListRule\u003c'a\u003e {\n    /// Build a new `ListRule` backed by the provided slice of dates.\n    #[must_use]\n    pub const fn new(dates: \u0026'a [Date]) -\u003e Self {\n        Self { dates }\n    }\n}\n\nimpl HolidayRule for ListRule\u003c'_\u003e {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        self.dates.iter().copied().any(|d| d == date)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use time::Month;\n\n    #[test]\n    fn list_rule_matches() {\n        let dates = [\n            Date::from_calendar_date(2001, Month::September, 11).unwrap(),\n            Date::from_calendar_date(2018, Month::December, 5).unwrap(),\n        ];\n        let rule = ListRule::new(\u0026dates);\n        let d = dates[0];\n        assert!(rule.applies(d));\n        let not = Date::from_calendar_date(2020, Month::January, 1).unwrap();\n        assert!(!rule.applies(not));\n    }\n}\n","traces":[{"line":16,"address":[],"length":0,"stats":{"Line":1}},{"line":22,"address":[],"length":0,"stats":{"Line":2}},{"line":23,"address":[],"length":0,"stats":{"Line":7}}],"covered":3,"coverable":3},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","mod.rs"],"content":"//! Generic holiday rule building blocks used to compose market calendars.\n//!\n//! The goal of this tiny DSL is to express common holiday patterns such as\n//! \"fixed date\", \"first Monday in February\", or \"Monday on/after 21 May\"\n//! without copy-pasting imperative algorithms into each calendar.\n//!\n//! All helpers are `#![no_std]` / allocation-free and usable in const\n//! contexts where the `time` constructors are const (soon).\n\n#![allow(clippy::many_single_char_names)]\n\nuse time::Date;\n\n/// A single holiday rule that can decide whether a given [`Date`] is a holiday.\n///\n/// Calendars are just `\u0026[\u0026dyn HolidayRule]` slices evaluated with `any()`.\npub trait HolidayRule {\n    /// Returns `true` if the rule declares the `date` a holiday.\n    fn applies(\u0026self, date: Date) -\u003e bool;\n}\n\nmod fixed;\npub use fixed::{FixedDate, Observed};\n\nmod nth_weekday;\npub use nth_weekday::NthWeekday;\n\nmod weekday_shift;\npub use weekday_shift::WeekdayShift;\n\nmod easter_offset;\npub use easter_offset::{\n    AscensionThursday, EasterMonday, EasterOffset, GoodFriday, PentecostMonday,\n};\n\nmod fixed_range;\npub use fixed_range::FixedDateRange;\n\nmod bridge;\npub use bridge::{BridgeDay, InLieuMonday};\n\nmod span;\npub use span::HolidaySpan;\n\nmod list_rule;\npub use list_rule::ListRule;\n\nmod custom_func;\npub use custom_func::CustomFuncRule;\n\nmod equinox_jp;\npub use equinox_jp::{VernalEquinoxJP, AutumnalEquinoxJP};\n\nmod chinese_lunar;\npub use chinese_lunar::{ChineseNewYear, QingMing, BuddhasBirthday};\n\n// TODO: upcoming rules\n// pub mod nth_weekday;\n// pub mod weekday_shift;\n// pub mod easter;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","nth_weekday.rs"],"content":"#![allow(clippy::assign_op_pattern)]\n\nuse super::HolidayRule;\nuse time::{Date, Duration, Month, Weekday};\n\n/// Holiday falling on the *n*-th occurrence of a weekday in a given month.\n///\n/// * `n \u003e 0` – nth occurrence from the **start** of the month (1 = first)\n/// * `n \u003c 0` – nth occurrence from the **end** of the month (-1 = last)\n///\n/// Example: US Labor Day ⇒ first Monday in September ⇒ `NthWeekday::new(1, Weekday::Monday, Month::September)`\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct NthWeekday {\n    n: i8,\n    weekday: Weekday,\n    month: Month,\n}\n\nimpl NthWeekday {\n    /// Create rule for the *n*-th `weekday` in `month` (see struct docs).\n    pub const fn new(n: i8, weekday: Weekday, month: Month) -\u003e Self {\n        Self { n, weekday, month }\n    }\n\n    /// First `weekday` in `month`.\n    pub const fn first(weekday: Weekday, month: Month) -\u003e Self {\n        Self::new(1, weekday, month)\n    }\n\n    /// Last `weekday` in `month`.\n    pub const fn last(weekday: Weekday, month: Month) -\u003e Self {\n        Self::new(-1, weekday, month)\n    }\n\n    /// Compute the holiday date for a given `year`.\n    fn date_in_year(\u0026self, year: i32) -\u003e Date {\n        if self.n \u003e 0 {\n            // Forward search from 1st of `month`.\n            let mut date = Date::from_calendar_date(year, self.month, 1).unwrap();\n            // find first occurrence of weekday\n            while date.weekday() != self.weekday {\n                date = date + Duration::DAY;\n            }\n            // advance (n-1) weeks\n            date + Duration::weeks((self.n as i64 - 1).max(0))\n        } else {\n            // Backward search from last day of month.\n            let next_month = if self.month == Month::December {\n                (year + 1, Month::January)\n            } else {\n                (year, Month::try_from(self.month as u8 + 1).unwrap())\n            };\n            // first day of next month then -1 day gives last day of current month\n            let mut date =\n                Date::from_calendar_date(next_month.0, next_month.1, 1).unwrap() - Duration::DAY;\n            while date.weekday() != self.weekday {\n                date = date - Duration::DAY;\n            }\n            let pos = (-self.n) as i64; // 1 = last, 2 = second-last...\n            date - Duration::weeks(pos - 1)\n        }\n    }\n}\n\nimpl HolidayRule for NthWeekday {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        self.date_in_year(date.year()) == date\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn first_monday_feb() {\n        let rule = NthWeekday::first(Weekday::Monday, Month::February);\n        let date = Date::from_calendar_date(2025, Month::February, 3).unwrap();\n        assert!(rule.applies(date));\n    }\n\n    #[test]\n    fn last_friday_november() {\n        let rule = NthWeekday::last(Weekday::Friday, Month::November);\n        let date = Date::from_calendar_date(2024, Month::November, 29).unwrap(); // 2024-11-29 is last Friday\n        assert!(rule.applies(date));\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":6}},{"line":26,"address":[],"length":0,"stats":{"Line":3}},{"line":27,"address":[],"length":0,"stats":{"Line":3}},{"line":31,"address":[],"length":0,"stats":{"Line":3}},{"line":32,"address":[],"length":0,"stats":{"Line":3}},{"line":36,"address":[],"length":0,"stats":{"Line":6}},{"line":37,"address":[],"length":0,"stats":{"Line":6}},{"line":39,"address":[],"length":0,"stats":{"Line":3}},{"line":41,"address":[],"length":0,"stats":{"Line":23}},{"line":42,"address":[],"length":0,"stats":{"Line":10}},{"line":45,"address":[],"length":0,"stats":{"Line":3}},{"line":48,"address":[],"length":0,"stats":{"Line":3}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":3}},{"line":56,"address":[],"length":0,"stats":{"Line":25}},{"line":57,"address":[],"length":0,"stats":{"Line":11}},{"line":66,"address":[],"length":0,"stats":{"Line":6}},{"line":67,"address":[],"length":0,"stats":{"Line":6}}],"covered":17,"coverable":18},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","span.rs"],"content":"use super::HolidayRule;\nuse time::{Date, Duration};\n\n/// A block of consecutive holidays starting from `start_rule` and spanning `days` days.\n/// Example: if a multi-day festival begins on a fixed date rule, you can wrap it in\n/// `HolidaySpan::new(start_rule, 3)` to mark start date plus the next 2 days.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct HolidaySpan\u003cR: HolidayRule\u003e {\n    start: R,\n    days: u8,\n}\n\nimpl\u003cR: HolidayRule\u003e HolidaySpan\u003cR\u003e {\n    /// Construct a new `HolidaySpan` starting at `start` and covering `days`\n    /// consecutive calendar days (including the start day).\n    #[must_use]\n    pub const fn new(start: R, days: u8) -\u003e Self {\n        Self { start, days }\n    }\n}\n\nimpl\u003cR: HolidayRule\u003e HolidayRule for HolidaySpan\u003cR\u003e {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        for offset in 0..self.days as i64 {\n            let candidate = date - Duration::days(offset);\n            if self.start.applies(candidate) {\n                return true;\n            }\n        }\n        false\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::dates::rules::FixedDate;\n    use time::Month;\n\n    #[test]\n    fn span_applies() {\n        let start = FixedDate::new(Month::January, 1);\n        let span = HolidaySpan::new(start, 3); // 1 Jan + 2 following days\n        let d2 = Date::from_calendar_date(2025, Month::January, 2).unwrap();\n        assert!(span.applies(d2));\n        let d4 = Date::from_calendar_date(2025, Month::January, 4).unwrap();\n        assert!(!span.applies(d4));\n    }\n}\n","traces":[{"line":17,"address":[],"length":0,"stats":{"Line":1}},{"line":23,"address":[],"length":0,"stats":{"Line":2}},{"line":24,"address":[],"length":0,"stats":{"Line":7}},{"line":25,"address":[],"length":0,"stats":{"Line":5}},{"line":26,"address":[],"length":0,"stats":{"Line":5}},{"line":27,"address":[],"length":0,"stats":{"Line":1}},{"line":30,"address":[],"length":0,"stats":{"Line":1}}],"covered":7,"coverable":7},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","rules","weekday_shift.rs"],"content":"#![allow(clippy::assign_op_pattern)]\n\nuse super::HolidayRule;\nuse time::{Date, Duration, Month, Weekday};\n\n/// A base date (month+day) shifted to the nearest weekday **on/after** or\n/// **on/before** that date.\n///\n/// Example: \"Monday on or after 21 May\" →\n/// `WeekdayShift::on_or_after(Weekday::Monday, Month::May, 21)`\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct WeekdayShift {\n    weekday: Weekday,\n    month: Month,\n    day: u8,\n    direction: Direction,\n}\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum Direction {\n    After,\n    Before,\n}\n\nimpl WeekdayShift {\n    /// Construct a rule for the given components.\n    pub const fn new(weekday: Weekday, month: Month, day: u8, direction: Direction) -\u003e Self {\n        Self {\n            weekday,\n            month,\n            day,\n            direction,\n        }\n    }\n\n    /// Rule: target weekday **on or after** the given date.\n    pub const fn on_or_after(weekday: Weekday, month: Month, day: u8) -\u003e Self {\n        Self::new(weekday, month, day, Direction::After)\n    }\n\n    /// Rule: target weekday **on or before** the given date.\n    pub const fn on_or_before(weekday: Weekday, month: Month, day: u8) -\u003e Self {\n        Self::new(weekday, month, day, Direction::Before)\n    }\n\n    fn date_in_year(\u0026self, year: i32) -\u003e Date {\n        let mut date = Date::from_calendar_date(year, self.month, self.day).unwrap();\n        match self.direction {\n            Direction::After =\u003e {\n                while date.weekday() != self.weekday {\n                    date = date + Duration::DAY;\n                }\n            }\n            Direction::Before =\u003e {\n                while date.weekday() != self.weekday {\n                    date = date - Duration::DAY;\n                }\n            }\n        }\n        date\n    }\n}\n\nimpl HolidayRule for WeekdayShift {\n    fn applies(\u0026self, date: Date) -\u003e bool {\n        self.date_in_year(date.year()) == date\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn monday_on_or_after_may21() {\n        let rule = WeekdayShift::on_or_after(Weekday::Monday, Month::May, 21);\n        // 2025-05-21 is Wednesday → holiday Monday 26 May 2025\n        let holiday = Date::from_calendar_date(2025, Month::May, 26).unwrap();\n        assert!(rule.applies(holiday));\n    }\n\n    #[test]\n    fn friday_on_or_before_july4() {\n        let rule = WeekdayShift::on_or_before(Weekday::Friday, Month::July, 4);\n        // 2026-07-04 is Saturday → Friday 3rd observed\n        let holiday = Date::from_calendar_date(2026, Month::July, 3).unwrap();\n        assert!(rule.applies(holiday));\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":2}},{"line":37,"address":[],"length":0,"stats":{"Line":1}},{"line":38,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":1}},{"line":43,"address":[],"length":0,"stats":{"Line":1}},{"line":46,"address":[],"length":0,"stats":{"Line":2}},{"line":47,"address":[],"length":0,"stats":{"Line":2}},{"line":48,"address":[],"length":0,"stats":{"Line":2}},{"line":50,"address":[],"length":0,"stats":{"Line":11}},{"line":51,"address":[],"length":0,"stats":{"Line":5}},{"line":55,"address":[],"length":0,"stats":{"Line":3}},{"line":56,"address":[],"length":0,"stats":{"Line":1}},{"line":60,"address":[],"length":0,"stats":{"Line":2}},{"line":65,"address":[],"length":0,"stats":{"Line":2}},{"line":66,"address":[],"length":0,"stats":{"Line":2}}],"covered":15,"coverable":15},{"path":["/","Users","joneickmeier","projects","rfin","core","src","dates","schedule.rs"],"content":"//! Date schedule builder DSL (PR #5)\n//!\n//! This is a **very lightweight** fluent builder for generating date schedules\n//! used by fixed-income instruments (coupon/settlement schedules, etc.).  As the\n//! rest of the `rfin_core::dates` façade it is fully `no_std` compatible and does\n//! **not** allocate heap memory.  Internally it uses `SmallVec\u003c[Date; 32]\u003e` which\n//! stores up to 32 dates inline without touching the allocator and only spills to\n//! `alloc` when longer.\n//!\n//! The current implementation covers the subset required by the PR-5 acceptance\n//! criteria:\n//! • Frequencies from monthly to annual via [`Frequency`].\n//! • Inclusive start \u0026 end dates.\n//! • Optional business-day adjustment with any [`HolidayCalendar`] and\n//!   [`BusDayConv`] convention.\n//! • Stub handling via [`StubRule`] (currently *no-stub* and short-front/back are\n//!   recognised – the generation algorithm for short stubs will be extended in\n//!   a future PR but the enum is already exposed so downstream code can\n//!   compile).\n//!\n//! The public interface intentionally stays minimal and panic-free.  All helpers\n//! are `const` where feasible.\n\n#![allow(clippy::many_single_char_names)]\n\nuse smallvec::SmallVec;\nuse time::{Date, Month};\n\nuse super::{adjust, BusDayConv, HolidayCalendar};\n\n/// Inline-optimised container returned by [`ScheduleBuilder::generate`].\n/// Up to 32 dates are stored on the stack.\npub type Schedule = SmallVec\u003c[Date; 32]\u003e;\n\n// -------------------------------------------------------------------------------------------------\n// Frequency\n// -------------------------------------------------------------------------------------------------\n\n/// Coupon/payment frequency.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\n#[non_exhaustive]\npub enum Frequency {\n    /// Yearly — one period per year.\n    Annual,\n    /// Semi-annual — two periods per year (every 6 months).\n    SemiAnnual,\n    /// Quarterly — four periods per year (every 3 months).\n    Quarterly,\n    /// Monthly — twelve periods per year (every month).\n    Monthly,\n    /// Bi-weekly — every 2 weeks (14 days).\n    BiWeekly,\n    /// Weekly — every week (7 days).\n    Weekly,\n    /// Daily — every calendar day.\n    Daily,\n}\n\nimpl Frequency {\n    /// Return the number of whole calendar months in a single period.\n    #[inline]\n    pub const fn months(self) -\u003e i32 {\n        match self {\n            Self::Annual =\u003e 12,\n            Self::SemiAnnual =\u003e 6,\n            Self::Quarterly =\u003e 3,\n            Self::Monthly =\u003e 1,\n            Self::BiWeekly | Self::Weekly | Self::Daily =\u003e 0,\n        }\n    }\n\n    /// Return the number of calendar days in a single period (0 for month/quarter frequencies).\n    #[inline]\n    pub const fn days(self) -\u003e i32 {\n        match self {\n            Self::Daily =\u003e 1,\n            Self::Weekly =\u003e 7,\n            Self::BiWeekly =\u003e 14,\n            _ =\u003e 0,\n        }\n    }\n\n    /// Number of periods per (calendar) year for this frequency.\n    #[inline]\n    pub const fn periods_per_year(self) -\u003e u16 {\n        match self {\n            Self::Annual =\u003e 1,\n            Self::SemiAnnual =\u003e 2,\n            Self::Quarterly =\u003e 4,\n            Self::Monthly =\u003e 12,\n            Self::BiWeekly =\u003e 26,\n            Self::Weekly =\u003e 52,\n            Self::Daily =\u003e 365,\n        }\n    }\n}\n\n// -------------------------------------------------------------------------------------------------\n// Stub handling (placeholder — full algorithm in later PRs)\n// -------------------------------------------------------------------------------------------------\n\n/// Stub convention used when the start/end dates are not exact multiples of the\n/// frequency.  Stub generation logic will follow in a dedicated PR.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\n#[non_exhaustive]\npub enum StubRule {\n    /// No stub periods — start/end dates must be an exact multiple of the frequency.\n    None,\n    /// Short stub at the start of the schedule.\n    ShortFront,\n    /// Short stub at the end of the schedule.\n    ShortBack,\n}\n\n// -------------------------------------------------------------------------------------------------\n// ScheduleBuilder\n// -------------------------------------------------------------------------------------------------\n\n/// Fluent builder constructing inclusive `Date` schedules.\n#[derive(Clone)]\npub struct ScheduleBuilder\u003c'a\u003e {\n    start: Date,\n    end: Date,\n    freq: Frequency,\n    stub: StubRule,\n    conv: Option\u003cBusDayConv\u003e,\n    cal: Option\u003c\u0026'a dyn HolidayCalendar\u003e,\n}\n\nimpl\u003c'a\u003e ScheduleBuilder\u003c'a\u003e {\n    /// Start a new builder with mandatory `start`, `end` and `freq`.\n    #[must_use]\n    pub const fn new(start: Date, end: Date, freq: Frequency) -\u003e Self {\n        Self {\n            start,\n            end,\n            freq,\n            stub: StubRule::None,\n            conv: None,\n            cal: None,\n        }\n    }\n\n    /// Set stub rule (defaults to [`StubRule::None`]).\n    #[must_use]\n    pub const fn stub(mut self, rule: StubRule) -\u003e Self {\n        self.stub = rule;\n        self\n    }\n\n    /// Attach business-day adjustment `conv` using the provided `cal`.\n    #[must_use]\n    pub fn adjust_with(mut self, conv: BusDayConv, cal: \u0026'a dyn HolidayCalendar) -\u003e Self {\n        self.conv = Some(conv);\n        self.cal = Some(cal);\n        self\n    }\n\n    /// Generate the final inclusive schedule.\n    #[must_use]\n    pub fn generate(self) -\u003e Schedule {\n        debug_assert!(self.start \u003c= self.end, \"start date after end date\");\n\n        // Helper closure applying optional business-day adjustment.\n        let (conv, cal) = (self.conv, self.cal);\n        let adjust_date = |d: Date| -\u003e Date {\n            if let (Some(c), Some(cal)) = (conv, cal) {\n                adjust(d, c, cal)\n            } else {\n                d\n            }\n        };\n\n        let mut schedule: Schedule = SmallVec::new();\n\n        let step_months = self.freq.months();\n        if step_months \u003e 0 {\n            // ---------------- Month-based frequencies ----------------\n            let step = step_months;\n            match self.stub {\n                StubRule::None =\u003e {\n                    // Expect exact alignment – in debug builds assert but still produce output.\n                    debug_assert_eq!(add_months(self.start, step * (((self.end.year() - self.start.year()) * 12\n                        + (self.end.month() as i32 - self.start.month() as i32))\n                        / step)), self.end, \"Schedule not aligned for StubRule::None\");\n\n                    let mut dt = self.start;\n                    loop {\n                        schedule.push(adjust_date(dt));\n                        if dt == self.end {\n                            break;\n                        }\n                        dt = add_months(dt, step);\n                    }\n                }\n                StubRule::ShortBack =\u003e {\n                    let mut dt = self.start;\n                    loop {\n                        schedule.push(adjust_date(dt));\n                        if dt == self.end {\n                            break;\n                        }\n                        let next = add_months(dt, step);\n                        dt = if next \u003e self.end { self.end } else { next };\n                    }\n                }\n                StubRule::ShortFront =\u003e {\n                    let mut rev: Schedule = SmallVec::new();\n                    let mut dt = self.end;\n                    loop {\n                        rev.push(adjust_date(dt));\n                        if dt == self.start {\n                            break;\n                        }\n                        let prev = add_months(dt, -step);\n                        if prev \u003c self.start {\n                            rev.push(adjust_date(self.start));\n                            break;\n                        } else {\n                            dt = prev;\n                        }\n                    }\n                    for d in rev.into_iter().rev() {\n                        schedule.push(d);\n                    }\n                }\n            }\n        } else {\n            // ---------------- Day-based frequencies ----------------\n            use time::Duration;\n            let step_days = self.freq.days();\n            debug_assert!(step_days \u003e 0, \"frequency step must be positive\");\n\n            match self.stub {\n                StubRule::None =\u003e {\n                    let mut dt = self.start;\n                    loop {\n                        schedule.push(adjust_date(dt));\n                        if dt == self.end {\n                            break;\n                        }\n                        let next = dt + Duration::days(step_days as i64);\n                        if next \u003e self.end {\n                            // Remainder not divisible by step – treat as final date (behaves like ShortBack).\n                            dt = self.end;\n                        } else {\n                            dt = next;\n                        }\n                    }\n                }\n                StubRule::ShortBack =\u003e {\n                    let mut dt = self.start;\n                    loop {\n                        schedule.push(adjust_date(dt));\n                        if dt == self.end {\n                            break;\n                        }\n                        let next = dt + Duration::days(step_days as i64);\n                        dt = if next \u003e self.end { self.end } else { next };\n                    }\n                }\n                StubRule::ShortFront =\u003e {\n                    let mut rev: Schedule = SmallVec::new();\n                    let mut dt = self.end;\n                    loop {\n                        rev.push(adjust_date(dt));\n                        if dt == self.start {\n                            break;\n                        }\n                        let prev = dt - Duration::days(step_days as i64);\n                        if prev \u003c self.start {\n                            rev.push(adjust_date(self.start));\n                            break;\n                        } else {\n                            dt = prev;\n                        }\n                    }\n                    for d in rev.into_iter().rev() {\n                        schedule.push(d);\n                    }\n                }\n            }\n        }\n\n        schedule\n    }\n}\n\n// -------------------------------------------------------------------------------------------------\n// Internal helpers\n// -------------------------------------------------------------------------------------------------\n\n/// Add `months` calendar months to `date`, clamping the day-of-month to the last\n/// valid day where necessary (e.g. Jan-31 + 1 month = Feb-28/29). Negative\n/// offsets are supported for stepping *backwards* (e.g. Mar-31 + -1 month = Feb-29).\nfn add_months(date: Date, months: i32) -\u003e Date {\n    // Using Euclidean division so month index is always positive (0-11).\n    let total_months = date.year() * 12 + (date.month() as i32 - 1) + months;\n    let new_year = total_months.div_euclid(12);\n    let new_month_index = total_months.rem_euclid(12); // 0-based 0..11\n    let new_month = Month::try_from((new_month_index + 1) as u8).unwrap();\n\n    let day = date.day();\n    let max_day = days_in_month(new_year, new_month);\n    let new_day = day.min(max_day);\n\n    Date::from_calendar_date(new_year, new_month, new_day).unwrap()\n}\n\n/// Days in the given month for `year`.\nconst fn days_in_month(year: i32, month: Month) -\u003e u8 {\n    match month {\n        Month::January =\u003e 31,\n        Month::February =\u003e if is_leap_year(year) { 29 } else { 28 },\n        Month::March =\u003e 31,\n        Month::April =\u003e 30,\n        Month::May =\u003e 31,\n        Month::June =\u003e 30,\n        Month::July =\u003e 31,\n        Month::August =\u003e 31,\n        Month::September =\u003e 30,\n        Month::October =\u003e 31,\n        Month::November =\u003e 30,\n        Month::December =\u003e 31,\n    }\n}\n\nconst fn is_leap_year(year: i32) -\u003e bool {\n    (year % 4 == 0 \u0026\u0026 year % 100 != 0) || (year % 400 == 0)\n}\n\n// -------------------------------------------------------------------------------------------------\n// Tests\n// -------------------------------------------------------------------------------------------------\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::dates::Date;\n    use time::Month;\n\n    fn make_date(y: i32, m: u8, d: u8) -\u003e Date {\n        Date::from_calendar_date(y, Month::try_from(m).unwrap(), d).unwrap()\n    }\n\n    #[test]\n    fn semi_annual_schedule_basic() {\n        let start = make_date(2025, 1, 15);\n        let end = make_date(2030, 1, 15);\n        let sched = ScheduleBuilder::new(start, end, Frequency::SemiAnnual).generate();\n        assert_eq!(sched.len(), 11);\n        assert_eq!(sched.first().copied(), Some(start));\n        assert_eq!(sched.last().copied(), Some(end));\n    }\n\n    #[test]\n    fn short_back_stub() {\n        let start = make_date(2025, 1, 15);\n        let end = make_date(2025, 4, 15); // 3-month gap \u003c semi-annual step ⇒ short back stub\n        let sched = ScheduleBuilder::new(start, end, Frequency::SemiAnnual)\n            .stub(StubRule::ShortBack)\n            .generate();\n        assert_eq!(sc
