[package]
name = "finstack-py"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "finstack"
crate-type = ["cdylib"]

[dependencies]
finstack-core = { path = "../finstack/core" }
finstack-valuations = { path = "../finstack/valuations", features = ["mc"] }
finstack-statements = { path = "../finstack/statements", features = ["dataframes"] }
finstack-scenarios = { path = "../finstack/scenarios" }
finstack-portfolio = { path = "../finstack/portfolio", features = ["scenarios"] }
pyo3 = { version = "0.25", features = ["extension-module"] }
pyo3-polars = "0.24"
serde_json = "1"
indexmap = "2"
pythonize = "0.25"

# Needed for Month enum used in Date bindings
time = { version = "0.3", default-features = false }
strum = { workspace = true }

[features]
default = ["scenarios"]
scenarios = []
