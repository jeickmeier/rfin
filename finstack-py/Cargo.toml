[package]
name = "finstack-py"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "finstack"
crate-type = ["cdylib"]

[dependencies]
finstack-core = { path = "../finstack/core" }
finstack-valuations = { path = "../finstack/valuations", features = ["mc"] }
finstack-statements = { path = "../finstack/statements", features = ["dataframes"] }
finstack-scenarios = { path = "../finstack/scenarios" }
finstack-portfolio = { path = "../finstack/portfolio", features = ["scenarios"] }
finstack-io = { path = "../finstack/io", default-features = false }
pyo3 = { version = "0.26", features = ["extension-module"] }
pyo3-polars = "0.25"
polars = { version = "0.52", default-features = false }
serde_json = { workspace = true }
indexmap = { workspace = true }
pythonize = "0.26"

# Needed for Month enum used in Date bindings
time = { workspace = true }
strum = { workspace = true }
rayon = "1.11.0"
rust_decimal = { workspace = true }

# Async runtime for IO operations
tokio = { version = "1", features = ["rt-multi-thread"] }

[features]
default = ["scenarios", "sqlite"]
scenarios = []
sqlite = ["finstack-io/sqlite"]
postgres = ["finstack-io/postgres"]
turso = ["finstack-io/turso"]
