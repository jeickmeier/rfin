# Finstack Python-Rust Structural Parity Contract
#
# This file is the authoritative source-of-truth for the canonical mapping
# between Rust crates/modules and Python packages/modules.
#
# Rules:
#   - Only `pub` items at the crate boundary are in scope. `pub(crate)` and
#     `pub(super)` are excluded.
#   - Each public Rust crate re-exported from finstack/src/lib.rs maps to one
#     Python subpackage under `finstack`.
#   - Audit scripts must read this file as the source-of-truth.
#   - No audit script may write to tracked repository files.

[meta]
version = "1.0.0"
description = "Canonical Rust→Python structural parity contract"
umbrella_crate = "finstack"
umbrella_lib = "finstack/src/lib.rs"

# ---------------------------------------------------------------------------
# finstack-core  →  finstack.core
# ---------------------------------------------------------------------------
[crates.core]
rust_crate = "finstack-core"
rust_lib   = "finstack/core/src/lib.rs"
python_package = "finstack.core"
visibility = "pub"
status = "exists"  # Python package already present

[crates.core.modules]
cashflow     = { python = "finstack.core.cashflow",     status = "missing", note = "Core cashflow APIs are not yet materialized as a dedicated Python submodule" }
config       = { python = "finstack.core.config",       status = "exists" }
credit       = { python = "finstack.core.credit",       status = "exists" }
currency     = { python = "finstack.core.currency",     status = "exists" }
dates        = { python = "finstack.core.dates",        status = "exists" }
error        = { python = "finstack.core.error",        status = "missing" }
explain      = { python = "finstack.core.explain",      status = "missing", note = "Explain helpers are not yet surfaced as a dedicated Python submodule" }
expr         = { python = "finstack.core.expr",         status = "missing", note = "Expression APIs are not yet surfaced as a dedicated Python submodule" }
factor_model = { python = "finstack.core.factor_model", status = "missing" }
market_data  = { python = "finstack.core.market_data",  status = "exists" }
math         = { python = "finstack.core.math",         status = "exists" }
money        = { python = "finstack.core.money",        status = "exists" }
prelude      = { python = "finstack.core.prelude",      status = "missing" }
types        = { python = "finstack.core.types",        status = "exists" }
validation   = { python = "finstack.core.validation",   status = "missing" }
# golden is feature-gated test-only — excluded (see [exclusions])

# ---------------------------------------------------------------------------
# finstack-analytics  →  finstack.analytics
# ---------------------------------------------------------------------------
[crates.analytics]
rust_crate = "finstack-analytics"
rust_lib   = "finstack/analytics/src/lib.rs"
python_package = "finstack.analytics"
visibility = "pub"
status = "exists"
# NOTE: the Python surface for finstack-analytics is intentionally flat — all
# functions and classes live directly under `finstack.analytics` regardless of
# their Rust submodule. Submodules below are recorded for traceability, with
# status="flattened" signalling the agreed single-pathway convention rather
# than a missing shim.

[crates.analytics.modules]
aggregation  = { python = "finstack.analytics", status = "flattened", note = "PeriodStats / period_stats / group_by_period exposed flat on finstack.analytics; period_stats_from_grouped (grouped-returns variant) is available from the Rust crate only" }
backtesting  = { python = "finstack.analytics", status = "flattened", note = "VaR backtesting functions exposed flat on finstack.analytics" }
benchmark    = { python = "finstack.analytics", status = "flattened", note = "Benchmark-relative metrics exposed flat on finstack.analytics" }
drawdown     = { python = "finstack.analytics", status = "flattened", note = "Drawdown analytics exposed flat on finstack.analytics" }
lookback     = { python = "finstack.analytics", status = "flattened", note = "Lookback window helpers exposed flat on finstack.analytics" }
performance  = { python = "finstack.analytics", status = "flattened", note = "Performance class and helpers exposed flat on finstack.analytics" }
returns      = { python = "finstack.analytics", status = "flattened", note = "Return transform helpers exposed flat on finstack.analytics" }
risk_metrics = { python = "finstack.analytics", status = "flattened", note = "Risk-metric scalars and rolling series exposed flat on finstack.analytics" }
timeseries   = { python = "finstack.analytics", status = "flattened", note = "GARCH-family models and diagnostics exposed flat on finstack.analytics" }

