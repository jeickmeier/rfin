# Finstack Python-Rust Structural Parity Contract
#
# This file is the authoritative source-of-truth for the canonical mapping
# between Rust crates/modules and Python packages/modules.
#
# Rules:
#   - Only `pub` items at the crate boundary are in scope. `pub(crate)` and
#     `pub(super)` are excluded.
#   - Each public Rust crate re-exported from finstack/src/lib.rs maps to one
#     Python subpackage under `finstack`.
#   - Audit scripts must read this file as the source-of-truth.
#   - No audit script may write to tracked repository files.

[meta]
version = "1.0.0"
description = "Canonical Rust→Python structural parity contract"
umbrella_crate = "finstack"
umbrella_lib = "finstack/src/lib.rs"

# ---------------------------------------------------------------------------
# finstack-core  →  finstack.core
# ---------------------------------------------------------------------------
[crates.core]
rust_crate = "finstack-core"
rust_lib   = "finstack/core/src/lib.rs"
python_package = "finstack.core"
visibility = "pub"
status = "exists"  # Python package already present

[crates.core.modules]
cashflow     = { python = "finstack.core.cashflow",     status = "exists" }
config       = { python = "finstack.core.config",       status = "exists" }
currency     = { python = "finstack.core.currency",     status = "exists" }
dates        = { python = "finstack.core.dates",        status = "exists" }
error        = { python = "finstack.core.error",        status = "missing" }
explain      = { python = "finstack.core.explain",      status = "exists" }
expr         = { python = "finstack.core.expr",         status = "exists" }
factor_model = { python = "finstack.core.factor_model", status = "missing" }
market_data  = { python = "finstack.core.market_data",  status = "exists" }
math         = { python = "finstack.core.math",         status = "exists" }
money        = { python = "finstack.core.money",        status = "exists" }
prelude      = { python = "finstack.core.prelude",      status = "missing" }
types        = { python = "finstack.core.types",        status = "exists" }
validation   = { python = "finstack.core.validation",   status = "missing" }
# golden is feature-gated test-only — excluded (see [exclusions])

# ---------------------------------------------------------------------------
# finstack-analytics  →  finstack.analytics
# ---------------------------------------------------------------------------
[crates.analytics]
rust_crate = "finstack-analytics"
rust_lib   = "finstack/analytics/src/lib.rs"
python_package = "finstack.analytics"
visibility = "pub"
status = "exists"   # Wave 2: finstack/analytics/ canonical package created

[crates.analytics.modules]
aggregation  = { python = "finstack.analytics.aggregation",  status = "missing" }
benchmark    = { python = "finstack.analytics.benchmark",    status = "missing" }
consecutive  = { python = "finstack.analytics.consecutive",  status = "missing" }
drawdown     = { python = "finstack.analytics.drawdown",     status = "missing" }
lookback     = { python = "finstack.analytics.lookback",     status = "missing" }
performance  = { python = "finstack.analytics.performance",  status = "missing" }
returns      = { python = "finstack.analytics.returns",      status = "missing" }
risk_metrics = { python = "finstack.analytics.risk_metrics", status = "missing" }

# ---------------------------------------------------------------------------
# finstack-margin  →  finstack.margin
# ---------------------------------------------------------------------------
[crates.margin]
rust_crate = "finstack-margin"
rust_lib   = "finstack/margin/src/lib.rs"
python_package = "finstack.margin"
visibility = "pub"
status = "missing"  # Deferred to Wave 3 — margin types scattered in portfolio/valuations

[crates.margin.modules]
calculators = { python = "finstack.margin.calculators", status = "missing" }
config      = { python = "finstack.margin.config",      status = "missing" }
constants   = { python = "finstack.margin.constants",   status = "missing" }
metrics     = { python = "finstack.margin.metrics",     status = "missing" }
registry    = { python = "finstack.margin.registry",    status = "missing" }
traits      = { python = "finstack.margin.traits",      status = "missing" }
types       = { python = "finstack.margin.types",       status = "missing" }
xva         = { python = "finstack.margin.xva",         status = "missing" }

# ---------------------------------------------------------------------------
# finstack-valuations  →  finstack.valuations
# ---------------------------------------------------------------------------
[crates.valuations]
rust_crate = "finstack-valuations"
rust_lib   = "finstack/valuations/src/lib.rs"
python_package = "finstack.valuations"
visibility = "pub"
status = "exists"
# NOTE: valuations lib.rs is large; module-level detail deferred to Wave 3 symbol audit.

[crates.valuations.modules]
# Top-level public modules — detailed symbol mapping to follow in Wave 3
attribution  = { python = "finstack.valuations",              status = "exists", note = "JSON-first helpers and the PnlAttribution wrapper are flattened onto finstack.valuations" }
instruments  = { python = "finstack.valuations.instruments",  status = "exists" }
calibration  = { python = "finstack.valuations.calibration",  status = "exists" }
correlation  = { python = "finstack.valuations.correlation",  status = "exists", note = "Former standalone finstack-correlation crate; nested under valuations" }
# All other valuations submodules are deferred pending detailed lib.rs audit (Wave 3)

# ---------------------------------------------------------------------------
# finstack-statements  →  finstack.statements
# ---------------------------------------------------------------------------
[crates.statements]
rust_crate = "finstack-statements"
rust_lib   = "finstack/statements/src/lib.rs"
python_package = "finstack.statements"
visibility = "pub"
status = "exists"

[crates.statements.modules]
adjustments      = { python = "finstack.statements.adjustments",       status = "exists" }
builder          = { python = "finstack.statements.builder",           status = "exists" }
capital_structure = { python = "finstack.statements.capital_structure", status = "exists" }
checks           = { python = "finstack.statements.checks",            status = "exists" }
dsl              = { python = "finstack.statements.dsl",               status = "exists" }
error            = { python = "finstack.statements.error",             status = "missing" }
evaluator        = { python = "finstack.statements.evaluator",         status = "exists" }
extensions       = { python = "finstack.statements.extensions",        status = "exists" }
forecast         = { python = "finstack.statements.forecast",          status = "exists" }
prelude          = { python = "finstack.statements.prelude",           status = "missing" }
registry         = { python = "finstack.statements.registry",          status = "exists" }
types            = { python = "finstack.statements.types",             status = "exists" }
utils            = { python = "finstack.statements.utils",             status = "missing" }

# ---------------------------------------------------------------------------
# finstack-statements-analytics  →  finstack.statements.{analysis,templates,extensions}
#
# The statements-analytics crate's Rust submodules surface directly under
# finstack.statements via the umbrella extension module — there is no separate
# finstack.statements_analytics Python package.
# ---------------------------------------------------------------------------
[crates.statements_analytics]
rust_crate = "finstack-statements-analytics"
rust_lib   = "finstack/statements-analytics/src/lib.rs"
python_package = "finstack.statements"
visibility = "pub"
status = "exists"

[crates.statements_analytics.modules]
analysis                    = { python = "finstack.statements.analysis",                    status = "exists" }
extensions                  = { python = "finstack.statements.extensions",                  status = "exists" }
templates                   = { python = "finstack.statements.templates",                   status = "exists" }

# ---------------------------------------------------------------------------
# finstack-portfolio  →  finstack.portfolio
# ---------------------------------------------------------------------------
[crates.portfolio]
rust_crate = "finstack-portfolio"
rust_lib   = "finstack/portfolio/src/lib.rs"
python_package = "finstack.portfolio"
visibility = "pub"
status = "exists"

[crates.portfolio.modules]
attribution  = { python = "finstack.portfolio.attribution",  status = "exists" }
book         = { python = "finstack.portfolio.book",         status = "exists" }
builder      = { python = "finstack.portfolio.builder",      status = "exists" }
cashflows    = { python = "finstack.portfolio.cashflows",    status = "exists" }
dataframe    = { python = "finstack.portfolio.dataframe",    status = "exists",  note = "Exposes table-envelope helpers" }
dependencies = { python = "finstack.portfolio.dependencies", status = "missing" }
error        = { python = "finstack.portfolio.error",        status = "missing" }
factor_model = { python = "finstack.portfolio.factor_model", status = "exists" }
grouping     = { python = "finstack.portfolio.grouping",     status = "exists" }
margin       = { python = "finstack.portfolio.margin",       status = "exists",  note = "Shim → finstack.margin after Wave 3" }
metrics      = { python = "finstack.portfolio.metrics",      status = "exists" }
optimization = { python = "finstack.portfolio.optimization", status = "exists" }
portfolio    = { python = "finstack.portfolio.portfolio",    status = "exists" }
position     = { python = "finstack.portfolio.position",     status = "missing" }
prelude      = { python = "finstack.portfolio.prelude",      status = "missing" }
results      = { python = "finstack.portfolio.results",      status = "exists" }
types        = { python = "finstack.portfolio.types",        status = "exists" }
valuation    = { python = "finstack.portfolio.valuation",    status = "exists" }
scenarios    = { python = "finstack.portfolio.scenarios",    status = "exists",  note = "Feature-gated: scenarios" }

# ---------------------------------------------------------------------------
# finstack-scenarios  →  finstack.scenarios
# ---------------------------------------------------------------------------
[crates.scenarios]
rust_crate = "finstack-scenarios"
rust_lib   = "finstack/scenarios/src/lib.rs"
python_package = "finstack.scenarios"
visibility = "pub"
status = "exists"

[crates.scenarios.modules]
# Scenario symbols are exposed flat on finstack.scenarios — the Rust crate's
# internal engine/spec/enums/reports partitioning is not surfaced as a
# separate Python import path to keep a single pathway.
adapters  = { python = "finstack.scenarios.adapters",  status = "missing" }
templates = { python = "finstack.scenarios.templates", status = "missing" }
utils     = { python = "finstack.scenarios.utils",     status = "missing" }

# ---------------------------------------------------------------------------
# Explicit exclusions
#
# Items intentionally not mapped to Python.
# ---------------------------------------------------------------------------
[exclusions]
"finstack_core::golden"          = "Test-only module, feature-gated `golden`; not part of public API"
"finstack_core::validation"      = "Internal validation helpers; not exposed in Python bindings"
"finstack_statements::utils"     = "Internal utilities; not part of public Python surface"
"finstack_portfolio::scenarios"  = "Feature-gated `scenarios`; available through finstack.scenarios instead"
"finstack-cashflows"             = "Internal crate; not re-exported from umbrella"
"finstack-monte-carlo"           = "Internal crate; not re-exported from umbrella"
"finstack-valuations-macros"     = "Proc-macro crate; compile-time only, no Python surface"
