[package]
name = "finstack-statements"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core", features = ["serde"] }
finstack-valuations = { path = "../valuations", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
thiserror = "1"
nom = "7"
polars = { version = "0.44", optional = true, default-features = false }

[dev-dependencies]
indexmap = { version = "2", features = ["serde"] }
time = { version = "0.3", features = ["macros"] }
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = []
polars_export = ["dep:polars"]
full = ["polars_export"]

[[bench]]
name = "statements_operations"
harness = false
