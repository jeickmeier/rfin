[package]
name = "finstack-statements"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core", features = ["serde"] }
finstack-valuations = { path = "../valuations" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
thiserror = "1"
nom = "7"
polars = { version = "0.44", optional = true, default-features = false }

[dev-dependencies]
indexmap = { version = "2", features = ["serde"] }
time = { version = "0.3", features = ["macros"] }

[features]
default = []
parallel = ["finstack-core/parallel"]
polars_export = ["dep:polars"]
full = ["parallel", "polars_export"]

[[example]]
name = "statements_phase1_example"
path = "../../examples/rust/statements_phase1_example.rs"

[[example]]
name = "statements_phase2_example"
path = "../../examples/rust/statements_phase2_example.rs"

[[example]]
name = "statements_phase3_example"
path = "../../examples/rust/statements_phase3_example.rs"

[[example]]
name = "statements_phase4_example"
path = "../../examples/rust/statements_phase4_example.rs"

[[example]]
name = "statements_phase5_example"
path = "../../examples/rust/statements_phase5_example.rs"

[[example]]
name = "statements_phase6_example"
path = "../../examples/rust/statements_phase6_example.rs"

[[example]]
name = "statements_phase7_example"
path = "../../examples/rust/statements_phase7_example.rs"
required-features = ["polars_export"]

[[example]]
name = "capital_structure_dsl_example"
path = "../../examples/rust/capital_structure_dsl_example.rs"

[[example]]
name = "lbo_model_complete"
path = "../../examples/rust/lbo_model_complete.rs"
