[package]
name = "finstack-statements"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core", features = ["serde"] }
finstack-valuations = { path = "../valuations", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
thiserror = "1"
nom = "7"
log = "0.4"
polars = { version = "0.51", optional = true, default-features = false }
time = { version = "0.3" }

[dev-dependencies]
time = { version = "0.3", features = ["macros"] }
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"

[features]
default = []
dataframes = ["dep:polars"]

[[bench]]
name = "statements_operations"
harness = false
