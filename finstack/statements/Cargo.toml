[package]
name = "finstack-statements"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
finstack-core = { path = "../core", features = ["golden"] }
finstack-valuations = { path = "../valuations" }
serde = { workspace = true }
serde_json = { workspace = true }
indexmap = { workspace = true, features = ["serde"] }
thiserror = { workspace = true }
nom = "8.0"
tracing = { version = "0.1", default-features = false }
polars = { version = "0.53", optional = true, default-features = false }
rayon = { version = "1.11", optional = true }
time = { workspace = true }
rust_decimal = { workspace = true }

[dev-dependencies]
time = { workspace = true, features = ["macros"] }
criterion = { workspace = true }
proptest = "1"

[features]
default = []
dataframes = ["dep:polars"]
parallel = ["dep:rayon"]

[[bench]]
name = "statements_operations"
harness = false
