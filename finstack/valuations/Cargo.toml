[package]
name = "finstack-valuations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core" }
once_cell = "1.18"
hashbrown = "0.14"
indexmap = { version = "2.0", features = ["serde"] }
rayon = { version = "1.10", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3" }
paste = "1.0"
num-traits = "0.2"
rust_decimal = { version = "1.36", optional = true, features = ["serde-float"] }
rand = "0.8"
rand_pcg = "0.3"
rand_distr = "0.4"

[dev-dependencies]
time = { version = "0.3", features = ["macros"] }

[[example]]
name = "bond_custom_cashflows_example"
path = "../../examples/rust/bond_custom_cashflows_example.rs"

[features]
default = ["serde", "decimal128"]
parallel = ["dep:rayon"]
serde = ["finstack-core/serde", "hashbrown/serde"]
index = []
decimal128 = ["finstack-core/decimal128", "dep:rust_decimal"]
