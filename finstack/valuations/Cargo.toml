[package]
name = "finstack-valuations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core" }
finstack-valuations-macros = { path = "macros" }
once_cell = "1.18"
inventory = "0.3"
hashbrown = "0.14"
indexmap = { version = "2.0", features = ["serde"] }
smallvec = { version = "1.11", default-features = false, features = ["serde"] }
rayon = { version = "1.10", optional = true }
ordered-float = { version = "4.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3" }
paste = "1.0"
num-traits = "0.2"
rand = { version = "0.8", optional = true }
rand_pcg = { version = "0.3", optional = true }
rand_distr = { version = "0.4", optional = true }
ndarray = { version = "0.15", default-features = false }
ndarray-linalg = { version = "0.16", optional = true }
tracing = { version = "0.1", default-features = false }
dyn-clone = "1.0"
thiserror = "1.0"

[dev-dependencies]
time = { version = "0.3", features = ["macros"] }


[[example]]
name = "bond_custom_cashflows_example"
path = "../../examples/rust/bond_custom_cashflows_example.rs"

[[example]]
name = "enhanced_builders_example"
path = "../../examples/rust/enhanced_builders_example.rs"

[[example]]
name = "calibration_report_builder_example"
path = "../../examples/rust/calibration_report_builder_example.rs"

[[example]]
name = "multi_curve_framework_example"
path = "../../examples/rust/multi_curve_framework_example.rs"

[[example]]
name = "tranche_valuation_example"
path = "../../examples/rust/tranche_valuation_example.rs"

[features]
default = ["serde"]
parallel = ["dep:rayon"]
serde = ["finstack-core/serde", "hashbrown/serde"]
index = []
stochastic-models = ["dep:rand", "dep:rand_pcg", "dep:rand_distr"]
linear-algebra = ["dep:ndarray-linalg"]
