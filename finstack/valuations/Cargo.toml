[package]
name = "finstack-valuations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core" }
finstack-valuations-macros = { path = "macros" }
hashbrown = "0.16"
indexmap = { version = "2.12", features = ["serde"] }
smallvec = { version = "1.15", default-features = false, features = ["serde"] }
rayon = { version = "1.11", optional = true }
ordered-float = { version = "4.6", features = ["serde"] }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", features = ["raw_value"], optional = true }
time = { version = "0.3" }
rust_decimal = { version = "1.39" }
nalgebra = { version = "0.34", optional = true }
tracing = { version = "0.1", default-features = false }
thiserror = "2.0"
num-complex = "0.4"
statrs = { version = "0.18", default-features = false }
ts-rs = { version = "10", optional = true, features = ["serde-compat", "no-serde-warnings"] }
bitflags = "2.4"

[dev-dependencies]
time = { version = "0.3", features = ["macros"] }
proptest = "1.9"
criterion = { version = "0.8", features = ["html_reports"] }



[features]
default = ["serde", "parallel"]
serde = ["dep:serde", "dep:serde_json", "finstack-core/serde", "hashbrown/serde"]
parallel = ["dep:rayon"]
mc = ["dep:nalgebra"]
slow = []  # Enable slow-running tests (200k+ MC paths, jump-diffusion, etc.)
strict_validation = []  # Enforce no-arbitrage checks as hard errors in validators
ts_export = ["dep:ts-rs"]

[[bench]]
name = "bond_pricing"
harness = false

