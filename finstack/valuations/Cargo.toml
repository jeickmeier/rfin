[package]
name = "finstack-valuations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core" }
finstack-valuations-macros = { path = "macros" }
hashbrown = "0.14"
indexmap = { version = "2.0", features = ["serde"] }
smallvec = { version = "1.11", default-features = false, features = ["serde"] }
rayon = { version = "1.10", optional = true }
ordered-float = { version = "4.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3" }
rand = { version = "0.8", optional = true }
rand_pcg = { version = "0.3", optional = true }
rand_distr = { version = "0.4", optional = true }
tracing = { version = "0.1", default-features = false }
thiserror = "1.0"

[dev-dependencies]
time = { version = "0.3", features = ["macros"] }
proptest = "1.0"
criterion = { version = "0.5", features = ["html_reports"] }



[features]
default = ["serde", "parallel"]
serde = ["finstack-core/serde", "hashbrown/serde"]
parallel = ["dep:rayon", "finstack-core/parallel"]
stochastic = ["dep:rand", "dep:rand_pcg", "dep:rand_distr"]

# Deprecated (will be removed in 0.4.0)
stochastic-models = ["stochastic"]

[[bench]]
name = "bond_pricing"
harness = false

[[bench]]
name = "swap_pricing"
harness = false

[[bench]]
name = "option_pricing"
harness = false

[[bench]]
name = "cds_pricing"
harness = false

[[bench]]
name = "cashflow_generation"
harness = false

[[bench]]
name = "cds_option_pricing"
harness = false

[[bench]]
name = "cds_tranche_pricing"
harness = false

[[bench]]
name = "swaption_pricing"
harness = false

[[bench]]
name = "cds_index_pricing"
harness = false

[[bench]]
name = "structured_credit_pricing"
harness = false

[[bench]]
name = "convertible_pricing"
harness = false

[[bench]]
name = "calibration"
harness = false
