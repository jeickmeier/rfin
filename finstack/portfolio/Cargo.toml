[package]
name = "finstack-portfolio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core" }
finstack-valuations = { path = "../valuations" }
finstack-scenarios = { path = "../scenarios", optional = true }
finstack-statements = { path = "../statements", optional = true }

thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
tracing = "0.1"
time = { version = "0.3", features = ["macros", "serde", "parsing", "formatting"] }
polars = { version = "0.46", default-features = false, features = ["fmt", "dtype-date"], optional = true }

[features]
default = ["scenarios", "dataframe"]
scenarios = ["dep:finstack-scenarios", "dep:finstack-statements"]
dataframe = ["dep:polars"]

