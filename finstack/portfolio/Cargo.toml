[package]
name = "finstack-portfolio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
finstack-core = { path = "../core" }
finstack-valuations = { path = "../valuations" }
finstack-scenarios = { path = "../scenarios", optional = true }
finstack-statements = { path = "../statements", optional = true }

thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
tracing = "0.1"
time = { version = "0.3", features = ["macros", "serde", "parsing", "formatting"] }
polars = { version = "0.51", default-features = false, features = ["fmt", "dtype-date"], optional = true }
rayon = { version = "1.10", optional = true }
good_lp = { version = "1.14", default-features = false, features = ["microlp"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = ["scenarios", "dataframes", "parallel"]
scenarios = ["dep:finstack-scenarios", "dep:finstack-statements"]
dataframes = ["dep:polars"]
parallel = ["dep:rayon"]

[[bench]]
name = "portfolio_valuation"
harness = false

