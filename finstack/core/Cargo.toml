[package]
name = "finstack-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "1.0", default-features = false, features = ["rc"], optional = true }
serde_json = { version = "1.0", optional = true }
strum = { workspace = true }
strum_macros = { workspace = true }
thiserror = { version = "2.0", default-features = false }
time = { version = "0.3", default-features = false, features = ["macros", "formatting", "parsing", "serde-human-readable", "wasm-bindgen"] }
smallvec = { version = "1.15", default-features = false }
phf = { version = "0.13", features = ["macros"], default-features = false }
hashbrown = "0.16"
rustc-hash = { workspace = true }
parking_lot = "0.12"
lru = "0.16"
rust_decimal = { version = "1.39", default-features = false, features = ["serde-with-str"] }
statrs = { version = "0.18", default-features = false }

[build-dependencies]
serde = { version = "1.0", features = ["derive"], default-features = false }
serde_json = "1.0"
time = { version = "0.3", default-features = false, features = ["macros", "formatting", "parsing", "serde-human-readable"] }

[dev-dependencies]
serde_json = "1.0"
criterion = "0.8"

[features]
default = ["serde"]
serde = ["dep:serde", "dep:serde_json", "serde/derive", "time/serde", "time/serde-human-readable", "hashbrown/serde"]

[[bench]]
name = "money_operations"
harness = false

[[bench]]
name = "daycount_operations"
harness = false

[[bench]]
name = "calendar_operations"
harness = false

[[bench]]
name = "interpolation"
harness = false

[[bench]]
name = "curve_operations"
harness = false

[[bench]]
name = "expr_dag"
harness = false

[[bench]]
name = "rolling"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
