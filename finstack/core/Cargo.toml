[package]
name = "finstack-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "1.0", default-features = false, features = ["rc"], optional = true }
strum = { workspace = true }
strum_macros = { workspace = true }
thiserror = { version = "1.0", default-features = false }
num_enum = { version = "0.7", default-features = false }
num-traits = { version = "0.2", default-features = false, features = ["libm"] }
time = { version = "0.3", default-features = false }
smallvec = { version = "1.11", default-features = false }
phf = { version = "0.11", features = ["macros"], default-features = false }
once_cell = "1.18"
hashbrown = "0.14"
indexmap = { version = "2.0" }
rayon = { version = "1.10", optional = true }
ndarray = { version = "0.15", default-features = false }
ndarray-linalg = { version = "0.16", optional = true }
polars = { workspace = true }


[build-dependencies]
phf_codegen = "0.11"
csv = "1.3"

[dev-dependencies]
serde_json = "1.0"
criterion = "0.5"

[features]
default = ["std"]
std = ["serde?/std"]
serde = ["dep:serde", "serde/derive", "time/serde", "hashbrown/serde", "indexmap/serde"]
parallel = ["dep:rayon"]
linear-algebra = ["dep:ndarray-linalg"]
# Controls deterministic vs. performance-optimized execution paths
deterministic = []


[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]