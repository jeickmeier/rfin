[package]
name = "finstack-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "1.0", default-features = false, optional = true }
rust_decimal = { version = "1.36", default-features = false, optional = true }
strum = "0.25"
strum_macros = "0.25"
thiserror = { version = "1.0", default-features = false }
num_enum = { version = "0.7", default-features = false }
num-traits = { version = "0.2", default-features = false, features = ["libm"] }
time = { version = "0.3", default-features = false }
smallvec = { version = "1.11", default-features = false }
phf = { version = "0.11", features = ["macros"], default-features = false }
once_cell = "1.18"
hashbrown = "0.14"
rayon = { version = "1.10", optional = true }
ndarray = { version = "0.15", default-features = false }
polars = { workspace = true }


[dev-dependencies]
serde_json = "1.0"
rust_decimal_macros = "1.36"
criterion = "0.5"

[features]
default = ["std"]
std = ["serde?/std"]
decimal128 = ["dep:rust_decimal"]
serde = ["dep:serde", "serde/derive", "time/serde", "hashbrown/serde", "rust_decimal?/serde"]
parallel = ["dep:rayon"]
index = []
deterministic = []
asof_join = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]