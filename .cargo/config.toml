# Cargo configuration for CI and local builds

[build]
# Limit jobs to prevent resource exhaustion on CI
# jobs = 1  # Uncomment if needed

[target.x86_64-unknown-linux-gnu]
# Force single-threaded linking to prevent memory exhaustion on CI
rustflags = ["-C", "link-arg=-Wl,--no-threads"]

[target.aarch64-unknown-linux-gnu]
# Force single-threaded linking to prevent memory exhaustion on CI
rustflags = ["-C", "link-arg=-Wl,--no-threads"]
